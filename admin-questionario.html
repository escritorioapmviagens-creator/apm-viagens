<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Registos de Reservas</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#E8395A;--blue:#3B5BDB;--navy:#1A1D2E;--bg:#F5F6FA;
  --surface:#fff;--muted:#8B92A5;--border:rgba(0,0,0,0.07);
  --radius:12px;--shadow:0 2px 8px rgba(0,0,0,0.06)
}
body{font-family:'Inter',sans-serif;font-size:14px;color:var(--navy);background:var(--bg);min-height:100vh}
header{background:var(--surface);border-bottom:3px solid var(--coral);padding:14px 28px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
header img{height:44px;object-fit:contain}
header h1{font-family:'Poppins',sans-serif;font-size:17px;font-weight:700}
header span{font-size:12px;color:var(--muted)}
.container{max-width:1300px;margin:0 auto;padding:28px 20px 60px}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--surface);border-radius:var(--radius);padding:6px;box-shadow:var(--shadow);margin-bottom:24px}
.tab{flex:1;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;transition:all .15s;text-align:center}
.tab.active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(59,91,219,0.3)}
.panel{display:none}.panel.active{display:block}

/* Cards de métricas */
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.metric{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;border-left:4px solid var(--blue)}
.metric.coral{border-left-color:var(--coral)}
.metric.green{border-left-color:#22c55e}
.metric.amber{border-left-color:#f59e0b}
.metric-val{font-family:'Poppins',sans-serif;font-size:28px;font-weight:700;color:var(--navy)}
.metric-lbl{font-size:12px;color:var(--muted);margin-top:2px}

/* Filtros */
.filters{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;margin-bottom:20px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:140px}
.filter-group label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.filter-group input,.filter-group select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;color:var(--navy);outline:none;background:#fff}
.filter-group input:focus,.filter-group select:focus{border-color:var(--blue)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .18s}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#3251c4}
.btn-coral{background:var(--coral);color:#fff}.btn-coral:hover{background:#d02f4e}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--navy)}.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:5px 12px;font-size:12px}

/* Tabela */
.table-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.table-wrap table{width:100%;border-collapse:collapse}
.table-wrap th{background:#F5F6FA;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border)}
.table-wrap td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.table-wrap tr:last-child td{border-bottom:none}
.table-wrap tr:hover td{background:#fafbff}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}
.badge-amber{background:#fef9c3;color:#854d0e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f3f4f6;color:#374151}

/* Gráficos simples */
.charts{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:24px}
.chart-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
.chart-title{font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;margin-bottom:16px;color:var(--navy)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--muted);min-width:90px;text-align:right}
.bar-track{flex:1;background:#F5F6FA;border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--blue);transition:width .5s ease}
.bar-val{font-size:12px;font-weight:600;color:var(--navy);min-width:30px}

.empty{text-align:center;padding:48px;color:var(--muted)}
.loading{text-align:center;padding:32px;color:var(--muted);font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(59,91,219,.3);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>
<header>
  <img src="https://ezycourse.b-cdn.net/3064/cmbzo7qfw08hhth9nfjwpb7sw.png" alt="APM">
  <div><h1>Admin — Registos de Reservas</h1><span>Questionário de perfil de cliente</span></div>
</header>
<div class="container">

  <div class="tabs">
    <button class="tab active" onclick="switchTab('pendentes',this)">⏳ Pendentes / Não encontrados</button>
    <button class="tab" onclick="switchTab('associados',this)">✅ Associados a Reservas</button>
    <button class="tab" onclick="switchTab('stats',this)">📊 Estatísticas</button>
  </div>

  <!-- PENDENTES -->
  <div id="panel-pendentes" class="panel active">
    <div class="metrics" id="metrics-pend"></div>
    <div class="filters">
      <div class="filter-group">
        <label>Pesquisar</label>
        <input type="text" id="pend-search" placeholder="Consultor, localizador..." oninput="renderPendentes()">
      </div>
      <div class="filter-group">
        <label>Estado</label>
        <select id="pend-estado" onchange="renderPendentes()">
          <option value="">Todos</option>
          <option value="nao_encontrado">Não encontrado</option>
          <option value="multiplos">Múltiplos resultados</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Nicho</label>
        <select id="pend-nicho" onchange="renderPendentes()">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Faixa etária</label>
        <select id="pend-faixa" onchange="renderPendentes()">
          <option value="">Todas</option>
          <option>18-24</option><option>25-34</option><option>35-44</option>
          <option>45-54</option><option>55-64</option><option>65+</option>
        </select>
      </div>
      <button class="btn btn-outline btn-sm" onclick="exportCSV('pendentes')">⬇ Exportar CSV</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Consultor</th>
            <th>Localizador</th>
            <th>Fornecedor</th>
            <th>Faixa Etária</th>
            <th>Passageiros</th>
            <th>Nicho</th>
            <th>Distrito</th>
            <th>Profissão</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tbody-pend"><tr><td colspan="10" class="loading"><span class="spinner"></span>A carregar...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- ASSOCIADOS -->
  <div id="panel-associados" class="panel">
    <div class="filters">
      <div class="filter-group">
        <label>Pesquisar</label>
        <input type="text" id="assoc-search" placeholder="Nome, localizador..." oninput="renderAssociados()">
      </div>
      <div class="filter-group">
        <label>Nicho</label>
        <select id="assoc-nicho" onchange="renderAssociados()">
          <option value="">Todos</option>
        </select>
      </div>
      <button class="btn btn-outline btn-sm" onclick="exportCSV('associados')">⬇ Exportar CSV</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Reserva</th>
            <th>Faixa Etária</th>
            <th>Adultos</th>
            <th>Crianças</th>
            <th>Nicho</th>
            <th>Distrito</th>
            <th>Profissão</th>
          </tr>
        </thead>
        <tbody id="tbody-assoc"><tr><td colspan="7" class="loading"><span class="spinner"></span>A carregar...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- STATS -->
  <div id="panel-stats" class="panel">
    <div class="metrics" id="metrics-stats"></div>
    <div class="charts" id="charts-area"></div>
  </div>

</div>
<script>
const SB_URL = 'https://uiaorfcgvqwxjezgisps.supabase.co'
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpYW9yZmNndnF3eGplemdpc3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTE1MzAsImV4cCI6MjA5MTk4NzUzMH0.2AzDuZHLXsQ9NAK96b26ovu29I5xRh-UzNSNph02YhU'
const { createClient } = supabase
const sb = createClient(SB_URL, SB_KEY)

let pendentes = [], associados = []

async function init() {
  const [{ data: pend }, { data: assoc }] = await Promise.all([
    sb.from('localizadores_servicos').select('*').order('created_at', { ascending: false }),
    sb.from('reservas').select('id,localizador_principal,localizador,faixa_etaria_titular,num_adultos,num_criancas,tipo_viagem,profissao_titular,distrito_residencia').neq('faixa_etaria_titular','')
  ])
  pendentes = pend || []
  associados = assoc || []

  // Popular selects de nicho
  const nichos = [...new Set([...pendentes.map(r=>r.nicho), ...associados.map(r=>r.tipo_viagem)].filter(Boolean))]
  nichos.forEach(n => {
    ['pend-nicho','assoc-nicho'].forEach(id => {
      const opt = document.createElement('option')
      opt.value = opt.textContent = n
      document.getElementById(id).appendChild(opt)
    })
  })

  renderPendentes()
  renderAssociados()
  renderStats()
}

function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  document.getElementById('panel-'+id).classList.add('active')
  btn.classList.add('active')
}

function fmtData(str) {
  if(!str) return '—'
  return new Date(str).toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
}

function estadoBadge(estado) {
  if(estado==='nao_encontrado') return '<span class="badge badge-amber">Não encontrado</span>'
  if(estado==='multiplos') return '<span class="badge badge-red">Múltiplos</span>'
  return '<span class="badge badge-gray">'+estado+'</span>'
}

function renderPendentes() {
  const search = document.getElementById('pend-search').value.toLowerCase()
  const estado = document.getElementById('pend-estado').value
  const nicho = document.getElementById('pend-nicho').value
  const faixa = document.getElementById('pend-faixa').value

  let filtered = pendentes.filter(r => {
    if(search && !JSON.stringify(r).toLowerCase().includes(search)) return false
    if(estado && r.estado !== estado) return false
    if(nicho && r.nicho !== nicho) return false
    if(faixa && r.faixa_etaria !== faixa) return false
    return true
  })

  // Métricas
  document.getElementById('metrics-pend').innerHTML = `
    <div class="metric"><div class="metric-val">${pendentes.length}</div><div class="metric-lbl">Total de registos</div></div>
    <div class="metric amber"><div class="metric-val">${pendentes.filter(r=>r.estado==='nao_encontrado').length}</div><div class="metric-lbl">Não encontrados</div></div>
    <div class="metric coral"><div class="metric-val">${pendentes.filter(r=>r.estado==='multiplos').length}</div><div class="metric-lbl">Múltiplos resultados</div></div>
    <div class="metric green"><div class="metric-val">${filtered.length}</div><div class="metric-lbl">Filtrados</div></div>
  `

  const tbody = document.getElementById('tbody-pend')
  if(!filtered.length) { tbody.innerHTML = '<tr><td colspan="10" class="empty">Sem registos</td></tr>'; return }
  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td style="white-space:nowrap">${fmtData(r.created_at)}</td>
      <td><strong>${r.consultor_nome||'—'}</strong></td>
      <td><code style="background:#f3f4f6;padding:2px 7px;border-radius:5px;font-size:12px">${r.localizador||'—'}</code></td>
      <td>${r.fornecedor||'—'}</td>
      <td>${r.faixa_etaria||'—'}</td>
      <td>${r.num_passageiros||'—'} (${r.num_adultos||0}A + ${r.num_criancas||0}C)</td>
      <td>${r.nicho||'—'}</td>
      <td>${r.distrito||'—'}</td>
      <td>${r.profissao||'—'}</td>
      <td>${estadoBadge(r.estado)}</td>
    </tr>`).join('')
}

function renderAssociados() {
  const search = document.getElementById('assoc-search').value.toLowerCase()
  const nicho = document.getElementById('assoc-nicho').value

  let filtered = associados.filter(r => {
    if(search && !JSON.stringify(r).toLowerCase().includes(search)) return false
    if(nicho && r.tipo_viagem !== nicho) return false
    return true
  })

  const tbody = document.getElementById('tbody-assoc')
  if(!filtered.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">Sem registos</td></tr>'; return }
  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td><code style="background:#f3f4f6;padding:2px 7px;border-radius:5px;font-size:12px">${r.localizador_principal||r.localizador||'—'}</code></td>
      <td>${r.faixa_etaria_titular||'—'}</td>
      <td>${r.num_adultos||'—'}</td>
      <td>${r.num_criancas||'—'}</td>
      <td>${r.tipo_viagem||'—'}</td>
      <td>${r.distrito_residencia||'—'}</td>
      <td>${r.profissao_titular||'—'}</td>
    </tr>`).join('')
}

function renderStats() {
  const todos = [
    ...pendentes.map(r=>({nicho:r.nicho,faixa:r.faixa_etaria,distrito:r.distrito,fonte:'localizadores'})),
    ...associados.map(r=>({nicho:r.tipo_viagem,faixa:r.faixa_etaria_titular,distrito:r.distrito_residencia,fonte:'reservas'}))
  ]
  const total = todos.length

  document.getElementById('metrics-stats').innerHTML = `
    <div class="metric"><div class="metric-val">${total}</div><div class="metric-lbl">Total de respostas</div></div>
    <div class="metric blue"><div class="metric-val">${pendentes.length}</div><div class="metric-lbl">Em localizadores_servicos</div></div>
    <div class="metric green"><div class="metric-val">${associados.length}</div><div class="metric-lbl">Associados a reservas</div></div>
  `

  function barChart(title, data, colorVar='var(--blue)') {
    const sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0,8)
    const max = sorted[0]?.[1]||1
    return `<div class="chart-card">
      <div class="chart-title">${title}</div>
      ${sorted.map(([k,v])=>`
        <div class="bar-row">
          <div class="bar-label">${k||'—'}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%;background:${colorVar}"></div></div>
          <div class="bar-val">${v}</div>
        </div>`).join('')}
      ${!sorted.length?'<div style="color:var(--muted);font-size:13px">Sem dados</div>':''}
    </div>`
  }

  const byNicho = {}, byFaixa = {}, byDistrito = {}
  todos.forEach(r => {
    if(r.nicho) byNicho[r.nicho]=(byNicho[r.nicho]||0)+1
    if(r.faixa) byFaixa[r.faixa]=(byFaixa[r.faixa]||0)+1
    if(r.distrito) byDistrito[r.distrito]=(byDistrito[r.distrito]||0)+1
  })

  document.getElementById('charts-area').innerHTML =
    barChart('Por Nicho', byNicho, 'var(--blue)') +
    barChart('Por Faixa Etária', byFaixa, 'var(--coral)') +
    barChart('Por Distrito', byDistrito, '#22c55e')
}

function exportCSV(tipo) {
  const data = tipo==='pendentes' ? pendentes : associados
  if(!data.length) return
  const keys = Object.keys(data[0])
  const csv = [keys.join(','), ...data.map(r=>keys.map(k=>'"'+(r[k]??'').toString().replace(/"/g,'""')+'"').join(','))].join('\n')
  const a = document.createElement('a')
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv)
  a.download = 'registos_'+tipo+'_'+new Date().toISOString().slice(0,10)+'.csv'
  a.click()
}

init()
</script>
</body>
</html>
