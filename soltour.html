<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📄 Contrato de Viagem · APM Viagens</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',system-ui,sans-serif}
body{background:#F5F6FA;color:#1A1D2E;font-size:14px;padding:20px}
.wrap{max-width:800px;margin:0 auto}
.card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:12px;padding:24px;margin-bottom:16px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
h2{font-size:18px;font-weight:600;margin:20px 0 12px}
h3{font-size:15px;font-weight:600;margin:16px 0 8px;color:#3B5BDB}
.sub{color:#8B92A5;font-size:13px;margin-bottom:18px}
.divider{border:none;border-top:2px solid #E5E7EB;margin:16px 0}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F3F4F6;flex-wrap:wrap}
.info-row .label{color:#8B92A5;font-weight:500}
.info-row .value{font-weight:600}
.total-price{font-size:28px;font-weight:800;color:#E8395A;margin:8px 0}
.net-price{font-size:20px;font-weight:700;color:#2E7D32}
.checkbox-group{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #F3F4F6}
.checkbox-group input[type="checkbox"]{margin-top:3px;width:18px;height:18px;cursor:pointer;flex-shrink:0}
.checkbox-group label{font-size:14px;line-height:1.5;cursor:pointer}
.checkbox-group label strong{color:#1A1D2E}
.required{color:#C62828;font-weight:700;margin-left:4px}
.assinatura-area{background:#FAFBFC;border:2px dashed #D1D5DB;border-radius:8px;padding:16px;margin:12px 0}
.assinatura-area canvas{width:100%;height:150px;background:#fff;border-radius:4px;cursor:crosshair;touch-action:none}
.assinatura-area .hint{font-size:12px;color:#8B92A5;text-align:center;margin-top:8px}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:#3B5BDB;color:#fff}.btn-primary:hover{background:#2a4ac7}
.btn-success{background:#0F6E56;color:#fff}.btn-success:hover{background:#0a4f3d}
.btn-outline{background:transparent;border:1.5px solid #D1D5DB;color:#1A1D2E}.btn-outline:hover{background:#F3F4F6}
.btn-danger{background:#E8395A;color:#fff}.btn-danger:hover{background:#c92a4a}
.btn:disabled{opacity:.5;cursor:not-allowed}
.status-bar{padding:12px 16px;border-radius:8px;margin:12px 0;display:none}
.status-bar.show{display:block}
.status-bar.success{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7}
.status-bar.error{background:#FFEBEE;color:#C62828;border:1px solid #FFCDD2}
.footer-notes{font-size:12px;color:#8B92A5;margin-top:20px;line-height:1.8}
@media (max-width:600px){body{padding:10px}.card{padding:16px}.total-price{font-size:22px}.btn{width:100%;justify-content:center}}
</style>
</head>
<body>
<div class="wrap" id="app">
  <!-- Cabeçalho -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <div>
        <h1>📄 Contrato de Viagem</h1>
        <div class="sub">APM Viagens · Proposta vinculativa</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:#8B92A5">Nº Proposta</div>
        <div style="font-weight:700;font-size:16px" id="proposta-id">#---</div>
      </div>
    </div>
  </div>

  <!-- Detalhes da Viagem -->
  <div class="card">
    <h2>✈️ Detalhes da Viagem</h2>
    <div id="detalhes-viagem">
      <div class="info-row"><span class="label">Destino</span><span class="value" id="destino">---</span></div>
      <div class="info-row"><span class="label">Hotel</span><span class="value" id="hotel">---</span></div>
      <div class="info-row"><span class="label">Check-in</span><span class="value" id="checkin">---</span></div>
      <div class="info-row"><span class="label">Check-out</span><span class="value" id="checkout">---</span></div>
      <div class="info-row"><span class="label">Noites</span><span class="value" id="noites">---</span></div>
      <div class="info-row"><span class="label">Regime</span><span class="value" id="regime">---</span></div>
      <div class="info-row"><span class="label">Operador</span><span class="value" id="operador">---</span></div>
    </div>
  </div>

  <!-- Preços -->
  <div class="card">
    <h2>💰 Preços</h2>
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-size:14px;color:#8B92A5">Preço Bruto (PVP)</div>
        <div class="total-price" id="pvp">---</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:14px;color:#8B92A5">Valor Líquido (NET)</div>
        <div class="net-price" id="net">---</div>
      </div>
    </div>
    <div style="margin-top:8px;font-size:13px;color:#8B92A5">
      Margem: <span id="margem">---</span>
    </div>
  </div>

  <!-- ACEITAÇÃO - TODOS OS CAMPOS OBRIGATÓRIOS
