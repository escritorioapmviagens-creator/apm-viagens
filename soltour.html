function normalize(str) {
  if (!str) return ''
  return String(str).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, ' ').trim()
}

function findDest(input) {
  if (!input || input.trim() === '') return null
  const normalized = normalize(input)
  for (const d of DEST_MAP) {
    if (normalize(d.label) === normalized) return d
  }
  for (const d of DEST_MAP) {
    if (normalize(d.label).startsWith(normalized) || normalized.startsWith(normalize(d.label))) return d
  }
  for (const d of DEST_MAP) {
    if (normalize(d.label).includes(normalized) || normalized.includes(normalize(d.label))) return d
  }
  return null
}

async function call(path, body) {
  const r = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON}` },
    body: JSON.stringify({ path, token, body })
  })
  return r.json()
}

async function ensureLogin() {
  if (token) return token
  const l = await call('login/login', LOGIN)
  if (!l.sessionToken) throw new Error('Login falhou')
  token = l.sessionToken
  return token
}

// ============================================================

async function pkSoap(action, body) {
  const wrap = `<?xml version="1.0" encoding="UTF-8"?><soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:ns1="http://www3.optitravel.net/optitravel/export/wbs/pkt/" xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:SOAP-ENC="http://schemas.xmlsoap.org/soap/encoding/" soapenv:encodingStyle="http://schemas.xmlsoap.org/soap/encoding/"><soapenv:Header/><soapenv:Body>${body}</soapenv:Body></soapenv:Envelope>`
  const r = await fetch(SOLTROPICO_PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON}` },
    body: JSON.stringify({ soapAction: action, soapBody: wrap })
  })
  const data = await r.json()
  if (!r.ok) throw new Error(`Falha proxy (${r.status})`)
  if (data.error || data.proxyError) throw new Error(data.error || data.proxyError)
  const doc = new DOMParser().parseFromString((data.xml || '').replace(/^\uFEFF/, '').trim(), 'text/xml')
  if (doc.querySelector('parsererror')) throw new Error('XML inválido')
  const f = doc.querySelector('faultstring')
  if (f) throw new Error(f.textContent)
  return doc
}
function pkCredXML() { return `<Credentials xsi:type="ns1:CredentialsStruct"><System xsi:type="xsd:int">808</System><Client xsi:type="xsd:int">289363</Client><Username xsi:type="xsd:string">admin@apmviagens.pt</Username><Password xsi:type="xsd:string">JA622875</Password></Credentials>` }
function pkTxt(el, tag) { if (!el) return ''; for (let i = 0; i < el.children.length; i++) { const c = el.children[i], l = c.localName || c.tagName.split(':').pop(); if (l === tag) return c.textContent.trim() } const n = el.getElementsByTagName('*'); for (let i = 0; i < n.length; i++) { const l = n[i].localName || n[i].tagName.split(':').pop(); if (l === tag) return n[i].textContent.trim() } return '' }
function pkAll(el, tag) { if (!el) return []; const o = [], n = el.getElementsByTagName('*'); for (let i = 0; i < n.length; i++) { const l = n[i].localName || n[i].tagName.split(':').pop(); if (l === tag) o.push(n[i]) } return o }
function pkItems(c) { return c ? pkAll(c, 'item') : [] }
function pkDirectChildren(el, tag) { if (!el) return []; const o = []; for (let i = 0; i < el.children.length; i++) { const c = el.children[i], l = c.localName || c.tagName.split(':').pop(); if (l === tag) o.push(c) } return o }

// ============================================================
// BUSCAR CALENDÁRIO SOLTOUR - RÁPIDO (1 chamada availability + 1 calendário)
// ============================================================
async function getSoltourCalendar(destCode, origin, year, month, nights, adults, childAges = []) {
  await ensureLogin()

  const pax = Array(adults).fill({ age: 30, type: 'ADULT' })
  childAges.forEach(age => pax.push({ age: age, type: 'CHILD' }))

  // Datas-semente espalhadas pelo MÊS INTEIRO (2 em 2 dias), testadas em LOTES
  // PARALELOS de 5 — muito mais rápido que uma a uma. Para assim que um lote
  // encontra disponibilidade, usando a data mais cedo desse lote.
  const lastDay = new Date(year, month, 0).getDate()
  const seedDays = []
  for (let d = 1; d <= lastDay; d += 2) seedDays.push(d)

  const buildBody = (sd) => {
    const sDate = `${year}-${String(month).padStart(2, '0')}-${String(sd).padStart(2, '0')}`
    const ed = new Date(sDate); ed.setDate(ed.getDate() + nights); const eStr = ed.toISOString().slice(0, 10)
    return { sDate, eStr, body: {
      productType: 'PACKAGE', languageCode: 'PT',
      criteria: { order: { direction: 'ASC', type: 'PRICE' }, pagination: { firstItem: 0, itemCount: 10 } },
      params: {
        startDate: sDate, endDate: eStr, numNights: nights, residentType: 'NONE',
        accomodation: { rooms: [{ passengers: pax }] },
        hotelParams: { destinationCode: destCode },
        flightParams: { directFlightsOnly: false, itineraries: [
          { origins: [origin], destinations: [destCode], flightDate: sDate },
          { origins: [destCode], destinations: [origin], flightDate: eStr }
        ] }
      }
    }}
  }

  let av = null, startDate = null, endStr = null
  const BATCH = 5
  for (let i = 0; i < seedDays.length && !av; i += BATCH) {
    const lote = seedDays.slice(i, i + BATCH)
    const resultados = await Promise.all(lote.map(async (sd) => {
      const { sDate, eStr, body } = buildBody(sd)
      try {
        const r = await call('booking/availability', body)
        return (r && r.availToken) ? { sd, sDate, eStr, r } : null
      } catch (e) { return null }
    }))
    // usar a data mais cedo do lote que teve disponibilidade
    const ok = resultados.filter(Boolean).sort((a, b) => a.sd - b.sd)[0]
    if (ok) { av = ok.r; startDate = ok.sDate; endStr = ok.eStr }
  }
  if (!av || !av.availToken) return []  // nenhuma data-semente do mês teve disponibilidade

  // 2) Calendário do mês inteiro
  const cal = await call('booking/getPriceCalendar', {
    availToken: av.availToken,
    destinationCode: destCode,
    originCode: origin,
    productType: 'PACKAGE',
    languageCode: 'PT',
    month: { year, month },
    numNights: nights,
    onlyDirectFlights: false
  })

  // Mapa de hotéis
  const hotelMap = {}
  if (av.hotels) {
    for (const h of av.hotels) {
      const c = h.code || h.numericCode || h.id
      if (c != null) hotelMap[String(c)] = {
        name: h.name || h.fullName || '',
        stars: h.categoryCode,
        image: h.mainImage || (h.images && h.images[0]) || '',
        images: (h.images || []).slice(0, 4)
      }
    }
  }

  const days = (cal.days || [])
  return days.map(d => {
    const code = (d.additionalInformation && d.additionalInformation.hotel) || ''
    const info = hotelMap[String(code)] || {}
    const precoDia = parseFloat(d.bestPrice || d.price) || 0
    return {
      date: d.day,
      price: precoDia,
      currency: d.currencyCode || 'EUR',
      hotelName: info.name || code || 'Hotel',
      hotelCode: code,
      stars: info.stars || 0,
      board: (d.additionalInformation && d.additionalInformation.mealPlan) || '',
      direct: !!d.directFlight,
      brand: 'SOLTOUR',
      image: info.image || '',
      images: info.images || [],
      available: !d.unavailable && precoDia > 0,
      nights: d.numNights || nights
    }
  })
}

// ============================================================
// BUSCAR CALENDÁRIO SOLTRÓPICO
// ============================================================
async function getSoltropicoCalendar(destCode, origin, year, month, nights, adults, childAges = []) {
  const results = []

  try {
    const pdoc = await pkSoap('DynGetProductParameters',
      `<ns1:DynGetProductParameters><DynProductParametersRequest>${pkCredXML()}<Productcode xsi:type="xsd:int">${destCode}</Productcode></DynProductParametersRequest></ns1:DynGetProductParameters>`)

    const itemsIn = (c) => { const w = pkAll(pdoc, c)[0]; return w ? pkItems(w) : [] }
    const dates = itemsIn('DepartureDates').map(it => pkTxt(it, 'Date')).filter(Boolean)
    const locals = itemsIn('DepartureLocals').map(it => ({ code: pkTxt(it, 'Code'), name: pkTxt(it, 'Name') })).filter(l => l.code)
    const roomTypes = itemsIn('RoomTypes').map(r => ({ code: pkTxt(r, 'Code'), name: pkTxt(r, 'Name') })).filter(r => r.code)
    const baseLocals = itemsIn('BaseLocals').map(b => ({ code: pkTxt(b, 'Code'), min: pkTxt(b, 'MinNights') || String(nights) })).filter(b => b.code)

    const startDate = `${year}-${String(month).padStart(2, '0')}-01`
    const depDate = dates.find(d => String(d).startsWith(startDate.slice(0, 7))) || dates[0] || startDate
    const depLocal = locals.find(l => l.code === origin)?.code || locals[0]?.code || origin
    // ESCOLHER a configuração de ocupação certa (os "RoomTypes" são ocupações:
    // "1 Adulto", "2 Adultos", "2 Adultos + 2 Crianças"...). Usar a que corresponde
    // ao nº de adultos e crianças pesquisado — NÃO a primeira (que é "1 Adulto").
    const nCri = childAges.length
    function escolherOcupacao() {
      // normalizar nome -> {adultos, criancas}
      const parse = nome => {
        const a = (nome.match(/(\d+)\s*Adulto/i) || [])[1]
        const c = (nome.match(/(\d+)\s*Crian/i) || [])[1]
        return { a: a ? parseInt(a) : 0, c: c ? parseInt(c) : 0 }
      }
      // match exato adultos+crianças
      let m = roomTypes.find(r => { const p = parse(r.name); return p.a === adults && p.c === nCri })
      if (m) return m.code
      // match só adultos (sem crianças no nome) se não houver crianças
      if (nCri === 0) { m = roomTypes.find(r => { const p = parse(r.name); return p.a === adults && p.c === 0 }); if (m) return m.code }
      // fallback: primeira que tenha pelo menos os adultos certos
      m = roomTypes.find(r => parse(r.name).a === adults)
      return (m || roomTypes[0])?.code || '437'
    }
    const roomCode = escolherOcupacao()
    const baseXML = (baseLocals.length ? baseLocals : [{ code: '0' }]).map(b => `<Local><Code>${b.code}</Code><Nights>${nights}</Nights></Local>`).join('')
    const roomsXML = `<RoomTypeOption><RoomNum>0</RoomNum><Code>${roomCode}</Code><ChildAges>${childAges.join(',')}</ChildAges></RoomTypeOption>`

    const doc = await pkSoap('DynSearchProductAvailableServices',
      `<ns1:DynSearchProductAvailableServices><DynProductAvailableServicesRequest>${pkCredXML()}<ProductCode xsi:type="xsd:int">${destCode}</ProductCode><DepartureDate xsi:type="xsd:string">${depDate}</DepartureDate><DepartureLocal xsi:type="xsd:string">${depLocal}</DepartureLocal><RoomTypes>${roomsXML}</RoomTypes><BaseLocals>${baseXML}</BaseLocals><ExtraNights xsi:type="xsd:int">0</ExtraNights></DynProductAvailableServicesRequest></ns1:DynSearchProductAvailableServices>`)

    const itinC = pkAll(doc, 'Itinerary')[0]
    const itins = itinC ? pkItems(itinC) : []

    const harvest = (h) => {
      const price = parseFloat(pkTxt(h, 'PriceFrom')) || 0
      const name = pkTxt(h, 'Name') || pkTxt(h, 'Code')
      if (!name || price === 0) return
      const img = pkTxt(h, 'Image') || pkTxt(h, 'ImageUrl') || pkTxt(h, 'Photo') || ''
      results.push({
        date: depDate,
        price: price,
        currency: 'EUR',
        hotelName: name,
        hotelCode: destCode,
        stars: parseInt(pkTxt(h, 'Rating')) || 0,
        board: '',
        direct: true,
        brand: 'SOLTRÓPICO',
        image: img,
        images: img ? [img] : [],
        available: true,
        nights: nights
      })
    }

    if (itins.length) {
      itins.forEach(itin => {
        const hc = pkDirectChildren(itin, 'HotelOption')[0]
        if (hc) pkItems(hc).forEach(harvest)
      })
    }

    if (!results.length) {
      const hc = pkAll(doc, 'HotelOption')[0]
      if (hc) pkItems(hc).forEach(harvest)
    }

    return results

  } catch (e) {
    console.warn('Soltrópico:', e.message)
    return []
  }
}

// ============================================================
// FUNÇÃO PRINCIPAL
// ============================================================
async function run() {
  const btn = $('go')
  if (btn.disabled) return

  btn.disabled = true
  const calContainer = $('calendar-container')
  const detailContainer = $('detail-container')
  calContainer.innerHTML = ''
  detailContainer.innerHTML = ''

  try {
    const destInput = $('dest').value.trim()
    const origin = $('origin').value
    const monthVal = $('month').value
    const nights = +$('nights').value
    const adults = +$('adults').value || 1
    const childAges = ($('criancas').value || '').split(/[,;\s]+/).map(s => parseInt(s, 10)).filter(n => !isNaN(n) && n >= 0 && n < 18)

    if (!destInput || !monthVal || !nights) {
      st('err', '⚠️ Preenche todos os campos obrigatórios.')
      return
    }

    const [year, month] = monthVal.split('-').map(Number)

    const destInfo = findDest(destInput)
    if (!destInfo) {
      st('err', `❌ Destino "${esc(destInput)}" não reconhecido.`)
      return
    }

    st('loading', `🔍 A carregar calendário para ${destInfo.label}...`, true)

    const promises = []
    const allDays = []

    if (destInfo.soltour) {
      promises.push(
        getSoltourCalendar(destInfo.soltour, origin, year, month, nights, adults, childAges)
          .then(days => { 
            allDays.push(...days) 
          })
          .catch(e => console.warn('Soltour:', e.message))
      )
    }

    if (destInfo.soltropico) {
      promises.push(
        getSoltropicoCalendar(destInfo.soltropico, origin, year, month, nights, adults, childAges)
          .then(days => { 
            allDays.push(...days) 
          })
          .catch(e => console.warn('Soltrópico:', e.message))
      )
    }

    await Promise.all(promises)

    if (!allDays.length) {
      st('err', `❌ Sem disponibilidade para ${destInfo.label} em ${month}/${year}.`)
      return
    }

    // Agrupar por dia, guardando o melhor preço de CADA operador (não esconder nenhum)
    const bestByDay = {}
    for (const day of allDays) {
      if (!day.available) continue
      const date = day.date
      if (!bestByDay[date]) bestByDay[date] = { date, soltour: null, soltropico: null }
      const slot = bestByDay[date]
      if (day.brand === 'SOLTOUR') {
        if (!slot.soltour || day.price < slot.soltour.price) slot.soltour = day
      } else {
        if (!slot.soltropico || day.price < slot.soltropico.price) slot.soltropico = day
      }
      // 'price' e 'brand' do slot = o mais barato dos dois (para ordenar/destacar)
      const candidates = [slot.soltour, slot.soltropico].filter(Boolean)
      const cheapest = candidates.sort((a, b) => a.price - b.price)[0]
      slot.price = cheapest.price
      slot.brand = cheapest.brand
      slot.available = true
    }

    renderCalendar(year, month, bestByDay, destInfo)

    const originLabel = { LIS: 'Lisboa', OPO: 'Porto', FAO: 'Faro' }[origin] || origin
    st('ok', `✅ ${Object.keys(bestByDay).length} dias com disponibilidade para ${destInfo.label} desde ${originLabel}`)

  } catch (e) {
    st('err', '❌ ' + e.message)
    console.error(e)
  } finally {
    btn.disabled = false
  }
}

// ============================================================
// RENDERIZAR CALENDÁRIO
// ============================================================
function renderCalendar(year, month, bestByDay, destInfo) {
  const container = $('calendar-container')
  const daysInMonth = new Date(year, month, 0).getDate()
  const firstDay = new Date(year, month - 1, 1).getDay()

  const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro']
  const dayNames = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb']

  let html = `<div class="card">
    <div class="cal-month-nav">
      <span class="month">${monthNames[month-1]} ${year}</span>
      <span style="font-size:13px;color:#8B92A5">${destInfo.label} · ${Object.keys(bestByDay).length} dias disponíveis</span>
    </div>
    <div class="calendar">`

  for (const name of dayNames) {
    html += `<div class="cal-header">${name}</div>`
  }

  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-day unavailable"></div>`
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`
    const dayData = bestByDay[dateStr]

    if (dayData) {
      const st_ = dayData.soltour, sp_ = dayData.soltropico
      const temAmbos = st_ && sp_
      const cellClass = temAmbos ? 'ambos' : (st_ ? 'soltour' : 'soltropico')

      let linhas = ''
      if (st_) {
        linhas += `<div class="op-line"><span class="price" style="color:#E8395A">${eur(st_.price)}</span><span class="op op-soltour">Soltour</span></div>`
      }
      if (sp_) {
        linhas += `<div class="op-line"><span class="price" style="color:#0F6E56">${eur(sp_.price)}</span><span class="op op-soltropico">Soltrópico</span></div>`
      }

      html += `
        <div class="cal-day ${cellClass}" onclick="selectDay('${dateStr}')" data-date="${dateStr}">
          <div class="day">${day}</div>
          ${linhas}
        </div>
      `
    } else {
      html += `<div class="cal-day unavailable"><div class="day" style="color:#ccc">${day}</div></div>`
    }
  }

  html += `</div></div>`
  container.innerHTML = html

  window._calendarData = { bestByDay, destInfo }
}

// ============================================================
// SELECIONAR DIA - COM NET REAL
// ============================================================
async function selectDay(dateStr) {
  const detailContainer = $('detail-container')
  const data = window._calendarData
  if (!data) return

  const dayData = data.bestByDay[dateStr]
  if (!dayData) return

  document.querySelectorAll('.cal-day').forEach(el => {
    el.classList.toggle('selected', el.dataset.date === dateStr)
  })

  detailContainer.innerHTML = `<div class="card"><div class="spinner"></div> A carregar detalhes...</div>`

  try {
    const origin = $('origin').value
    const nights = +$('nights').value
    const adults = +$('adults').value || 1
    const destInfo = data.destInfo

    let detailData = null

    // o dia pode ter os dois operadores; usar o mais barato (dayData.brand) e ler
    // os dados do sub-objeto correto (soltour/soltropico), não do topo
    const op = (dayData.brand === 'SOLTOUR') ? dayData.soltour : dayData.soltropico
    if (!op) { detailContainer.innerHTML = `<div class="card">Sem dados para este dia.</div>`; return }

    if (dayData.brand === 'SOLTOUR' && destInfo.soltour) {
      const end = new Date(dateStr)
      end.setDate(end.getDate() + nights)
      const endStr = end.toISOString().slice(0, 10)

      const pax = Array(adults).fill({ age: 30, type: 'ADULT' })
      const _chAges = ($('criancas').value || '').split(/[,;\s]+/).map(s => parseInt(s, 10)).filter(n => !isNaN(n) && n >= 0 && n < 18)
      _chAges.forEach(age => pax.push({ age: age, type: 'CHILD' }))

      const availBody = {
        productType: 'PACKAGE',
        languageCode: 'PT',
        criteria: { order: { direction: 'ASC', type: 'PRICE' }, pagination: { firstItem: 0, itemCount: 5 } },
        params: {
          startDate: dateStr,
          endDate: endStr,
          numNights: nights,
          residentType: 'NONE',
          accomodation: { rooms: [{ passengers: pax }] },
          hotelParams: { destinationCode: destInfo.soltour },
          flightParams: {
            directFlightsOnly: false,
            itineraries: [
              { origins: [origin], destinations: [destInfo.soltour], flightDate: dateStr },
              { origins: [destInfo.soltour], destinations: [origin], flightDate: endStr }
            ]
          }
        }
      }

      const av = await call('booking/availability', availBody)
      const budgets = av.budgets || []

      if (budgets.length && budgets[0].budgetId && av.availToken) {
        const q = await call('booking/quote', {
          availToken: av.availToken,
          budgetIds: [budgets[0].budgetId],
          productType: 'PACKAGE',
          languageCode: 'PT'
        })

        const qpb = (q.budget && q.budget.priceBreakdown) || {}
        const details = Array.isArray(qpb.priceBreakdownDetails) ? qpb.priceBreakdownDetails : []

        let totalPvp = 0, totalNet = 0, totalCom = 0
        const rows = []

        if (details.length) {
          for (const det of details) {
            const pi = det.priceInfo || det
            const pvp = parseFloat(pi.pvp || pi.amount || 0)
            // CONFIRMADO com o site: o net por linha é netAmount (base+tasas+desconto somados = Importe neto TOTAL)
            const net = parseFloat(pi.netAmount != null ? pi.netAmount : (pi.net || 0))
            totalPvp += pvp
            totalNet += net
            rows.push({
              name: det.description || det.priceBreakdownType || 'Componente',
              pvp, net, com: pvp - net
            })
          }
          totalCom = totalPvp - totalNet
        } else {
          totalPvp = parseFloat(qpb.pvp || qpb.amount || op.price)
          totalNet = parseFloat(qpb.netAmount || qpb.net || 0)
          totalCom = totalPvp - totalNet
          rows.push({ name: 'Pacote', pvp: totalPvp, net: totalNet, com: totalCom })
        }

        // Condições de cancelamento do operador, com TETO no PVP aplicado ao cliente
        const cancelamento = extrairCancelamento(q.budget, totalPvp)

        detailData = {
          brand: 'SOLTOUR',
          hotelName: op.hotelName,
          hotelCode: op.hotelCode,
          stars: op.stars || 0,
          board: op.board || '',
          checkIn: dateStr,
          checkOut: endStr,
          nights,
          image: op.image || '',
          images: op.images || (op.image ? [op.image] : []),
          totalPvp,
          totalNet,
          totalCom,
          cancelamento,
          rows
        }
      }
    } else if (dayData.brand === 'SOLTRÓPICO' && destInfo.soltropico) {
      const bruto = op.price
      const comissaoPct = 15
      const comissaoEuro = bruto * 0.15
      const net = bruto - comissaoEuro

      detailData = {
        brand: 'SOLTRÓPICO',
        hotelName: op.hotelName,
        hotelCode: destInfo.soltropico,
        stars: op.stars || 0,
        board: op.board || '',
        checkIn: dateStr,
        checkOut: '—',
        nights,
        image: op.image || '',
        images: op.images || (op.image ? [op.image] : []),
        totalPvp: bruto,
        totalNet: net,
        totalCom: comissaoEuro,
        rows: [{ name: 'Pacote Soltrópico', pvp: bruto, net, com: comissaoEuro }]
      }
    }

    if (detailData) {
      detailContainer.innerHTML = renderDetail(detailData, destInfo.label, origin)
    } else {
      detailContainer.innerHTML = `<div class="card"><span style="color:#C62828">❌ Não foi possível obter os detalhes da oferta.</span></div>`
    }

  } catch (e) {
    detailContainer.innerHTML = `<div class="card"><span style="color:#C62828">❌ ${esc(e.message)}</span></div>`
    console.error(e)
  }
}

// GERAR ORÇAMENTO / CONTRATO — guarda na Supabase e abre o documento
// ============================================================
async function gerarDocumento(tipo, dataJson, destLabel, origin) {
  let data; try { data = JSON.parse(dataJson) } catch(e) { alert('Erro nos dados da oferta.'); return }
  const originLabel = { LIS: 'Lisboa', OPO: 'Porto', FAO: 'Faro' }[origin] || origin
  const fmtPt = s => { if(!s || s==='—') return ''; try { return new Date(s+'T12:00:00').toLocaleDateString('pt-PT') } catch(e){ return s } }
  const up = new URLSearchParams(location.search)
  const cid = up.get('cid') || ''
  const cnome = up.get('cnome') || ''
  const subtitulo = [fmtPt(data.checkIn), data.nights ? data.nights + ' noites' : '', destLabel].filter(Boolean).join(' · ')
  // data de regresso: usa a do operador; se faltar (Soltrópico), calcula partida+noites
  let regresso = (data.checkOut && data.checkOut !== '—') ? data.checkOut : ''
  if (!regresso && data.checkIn && data.nights) {
    try { const r = new Date(data.checkIn); r.setDate(r.getDate() + parseInt(data.nights)); regresso = r.toISOString().slice(0,10) } catch(e) {}
  }

  // Passar tudo por parâmetros no link (as fotos são URLs curtas, cabe bem).
  // O motor NÃO grava nada — o registo oficial é criado quando o consultor
  // clica "Gerar" DENTRO do orçamento (fluxo normal intacto).
  const p = new URLSearchParams()
  p.set('motor', '1')
  p.set('dest', `${data.hotelName} · ${destLabel}`)
  p.set('hotel', data.hotelName || '')
  p.set('sub', subtitulo)
  p.set('part', data.checkIn || '')              // ISO AAAA-MM-DD para o campo type=date
  p.set('regresso', regresso)
  p.set('noites', data.nights || '')
  p.set('regime', data.board || '')              // regime separado (NÃO vai para f-reg/regresso)
  p.set('fornecedor', data.brand || '')
  p.set('drest', originLabel)
  p.set('pvp', data.totalPvp || '')
  p.set('net', data.totalNet || '')
  p.set('cnome', cnome)
  if(cid) p.set('cid', cid)

  // Condições de pagamento — regra FIXA da APM (sobrepõe-se ao prazo do operador)
  // Condições de pagamento: SÓ preenche se o operador as fornecer.
  // Se vierem, aplica o reajuste dos 30 dias (nenhum prazo pode ser mais tarde
  // que 30 dias antes da partida). Se o operador não dá (ex: Soltour na cotação),
  // deixa em branco — o consultor preenche/escolhe template à mão.
  if (Array.isArray(data.pagamento) && data.pagamento.length) {
    const linhas = ajustarPagamento(data.pagamento, data.checkIn)
    if (linhas) p.set('condpag', linhas)
  }

  // Condições de cancelamento — do operador, já com teto no PVP do cliente
  if (Array.isArray(data.cancelamento) && data.cancelamento.length) {
    const eurStr = v => '€' + Number(v).toLocaleString('pt-PT', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
    const linhas = data.cancelamento.map(f => {
      const quando = f.fim ? ('Até ' + f.fim) : (f.desc || 'Cancelamento')
      return `${quando}: ${eurStr(f.valor)}`
    })
    p.set('cancel', linhas.join('\n'))
  }
  const fotos = (data.images && data.images.length) ? data.images : (data.image ? [data.image] : [])
  fotos.slice(0, 4).forEach((f, i) => { if(f) p.set('foto' + (i+1), f) })

  const base = 'https://escritorioapmviagens-creator.github.io/apm-viagens/'
  // ambos abrem o ORÇAMENTO (ponto de entrada). O orçamento depois gera o contrato.
  const url = base + 'orcamento.html?' + p.toString() + (tipo === 'contrato' ? '&modo=contrato' : '')
  window.open(url, '_blank')
}

// ============================================================
// CONDIÇÕES DE CANCELAMENTO do operador, com TETO no PVP do cliente.
// Cada faixa (até tal data = X€) é limitada ao PVP aplicado: se a penalização
// do operador exceder o que o cliente pagou, mostra-se o PVP do cliente.
// ============================================================
// Reajusta os prazos de pagamento do operador: nenhuma data de pagamento pode
// ser mais tarde que 30 dias antes da partida (regra APM). Datas que violem isso
// são encurtadas para "30 dias antes da partida".
function ajustarPagamento(faixas, checkIn) {
  if (!Array.isArray(faixas) || !faixas.length) return ''
  let limite30 = null
  if (checkIn) { try { const d = new Date(checkIn); d.setDate(d.getDate() - 30); limite30 = d } catch(e) {} }
  const fmtD = dt => { try { return new Date(dt).toLocaleDateString('pt-PT') } catch(e){ return dt } }
  const eurStr = v => '€' + Number(v).toLocaleString('pt-PT', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
  const linhas = faixas.map(f => {
    let dataPag = f.dueDate || f.date || null
    let quando
    if (dataPag && limite30) {
      const dp = new Date(dataPag)
      // se a data de pagamento for DEPOIS do limite (mais perto da viagem que 30 dias), encurta
      quando = (dp > limite30) ? ('Até ' + fmtD(limite30) + ' (30 dias antes)') : ('Até ' + fmtD(dataPag))
    } else if (dataPag) {
      quando = 'Até ' + fmtD(dataPag)
    } else {
      quando = f.label || f.desc || 'Pagamento'
    }
    const valor = (f.amount != null) ? (': ' + eurStr(f.amount)) : (f.pct != null ? (': ' + f.pct + '%') : '')
    return quando + valor
  })
  return linhas.join('\n')
}

function extrairCancelamento(budget, pvpCliente) {
  const cargos = (budget && (budget.cancellationChargeServices || budget.cancellationCharges)) || []
  const fmtD = s => { if(!s) return ''; try { return new Date(s).toLocaleDateString('pt-PT') } catch(e){ return s } }
  const teto = parseFloat(pvpCliente) || 0
  const faixas = []
  for (const c of cargos) {
    const pi = c.priceInfo || c
    let valorOperador = parseFloat(pi.totalAmount != null ? pi.totalAmount : (pi.pvp != null ? pi.pvp : (pi.amount || 0)))
    // TETO: a penalização nunca excede o PVP que o cliente pagou
    const valorFinal = (teto > 0 && valorOperador > teto) ? teto : valorOperador
    faixas.push({
      desc: c.description || '',
      inicio: fmtD(c.startDate),
      fim: fmtD(c.endDate),
      valorOperador,
      valor: valorFinal,
      ajustado: valorFinal !== valorOperador
    })
  }
  return faixas
}

          ${rowsHtml}
          <tr class="total-row">
            <td style="padding:6px 10px;font-weight:700">TOTAL</td>
            <td style="padding:6px 10px;text-align:right;font-family:monospace;font-weight:700">${eur(data.totalPvp)}</td>
            <td style="padding:6px 10px;text-align:right;font-family:monospace"></td>
            <td style="padding:6px 10px;text-align:right;font-family:monospace"></td>
            <td style="padding:6px 10px;text-align:right;font-family:monospace;font-weight:700;color:#F57C00">${eur(data.totalCom)}</td>
            <td style="padding:6px 10px;text-align:right;font-family:monospace;font-weight:700">€0,00</td>
            <td style="padding:6px 10px;text-align:right;font-family:monospace;font-weight:700;color:#2E7D32;font-size:16px">${eur(data.totalNet)}</td>
          </tr>
        </tbody>
      </table>

      <div class="hint" style="margin-top:10px;background:#FFF8E1;padding:8px 12px;border-radius:6px;border-left:3px solid #F57C00">
        💡 <b>Net total: ${eur(data.totalNet)}</b> — valor que o agente paga ao operador.
        ${data.brand === 'SOLTRÓPICO' ? '<br>⚠️ Soltrópico: net estimado com 15% de comissão.' : ''}
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px">
        <button onclick='gerarDocumento("orcamento", ${JSON.stringify(JSON.stringify(data))}, ${JSON.stringify(destLabel)}, ${JSON.stringify(origin)})'
          style="flex:1;min-width:180px;background:#3B5BDB;color:#fff;border:none;border-radius:8px;padding:12px;font-weight:600;font-size:14px;cursor:pointer">
          📄 Gerar orçamento
        </button>
        <button onclick='gerarDocumento("contrato", ${JSON.stringify(JSON.stringify(data))}, ${JSON.stringify(destLabel)}, ${JSON.stringify(origin)})'
          style="flex:1;min-width:180px;background:#0F6E56;color:#fff;border:none;border-radius:8px;padding:12px;font-weight:600;font-size:14px;cursor:pointer">
          ✍️ Gerar contrato
        </button>
      </div>
    </div>
  `
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date()
  const start = new Date(today)
  start.setDate(start.getDate() + 3)
  $('month').value = start.toISOString().slice(0, 7)

  // Preencher a lista de destinos a partir da tabela, SEM aliases (grafias alternativas),
  // ordenada alfabeticamente — assim cada destino aparece só uma vez.
  const dl = $('dest-list')
  if (dl) {
    const nomes = DEST_MAP.filter(d => !d.alias).map(d => d.label)
      .sort((a, b) => a.localeCompare(b, 'pt'))
    dl.innerHTML = nomes.map(n => `<option value="${n}">`).join('')
  }

  document.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') run()
    })
  })

  ensureLogin().catch(() => {})
})
</script>
</body>
</html>
