<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercícios Práticos · APM</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--coral:#E8395A;--blue:#3B5BDB;--navy:#1A1D2E;--bg:#F5F6FA;--surface:#fff;--muted:#8B92A5;--border:rgba(0,0,0,0.08);--radius:12px;--shadow:0 2px 8px rgba(0,0,0,0.06);--green:#2E9E5B}
body{font-family:'Inter',sans-serif;color:var(--navy);background:var(--bg);padding:16px;font-size:14px}
.wrap{max-width:1000px;margin:0 auto}
h1{font-family:'Poppins';font-size:1.4rem;font-weight:700;margin-bottom:4px}
.sub{color:var(--muted);font-size:.88rem;margin-bottom:18px}
.refresh{float:right;font-size:12.5px;color:var(--blue);background:none;border:none;cursor:pointer;font-weight:600}
.subm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.sh{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer}
.sh:hover{background:#fafafe}
.sh .who{flex:1}
.sh .who b{font-size:14.5px;font-family:'Poppins'}
.sh .who span{display:block;font-size:12px;color:var(--muted);margin-top:1px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--coral);flex-shrink:0}
.dot.seen{background:transparent}
.tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
.tag.em_analise{background:#FFF3E0;color:#E8A23B}
.tag.validado{background:#E8F5E9;color:var(--green)}
.tag.a_corrigir{background:#FFEBEE;color:var(--coral)}
.tag.em_curso{background:#EEF2FF;color:var(--blue)}
.sb{display:none;padding:0 18px 18px;border-top:1px solid var(--border)}
.sb.open{display:block}
.trab{margin:14px 0;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.trab-h{background:#fafafe;padding:10px 14px;font-family:'Poppins';font-weight:700;font-size:13px}
.trab-b{padding:12px 14px}
.kv{display:grid;grid-template-columns:160px 1fr;gap:4px 12px;font-size:13px;padding:5px 0;border-bottom:1px solid #f2f2f7}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--muted);font-weight:600}
.kv .v{white-space:pre-wrap}
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.act{flex:1;min-width:150px;padding:11px;border-radius:9px;border:none;font-weight:700;font-size:13px;cursor:pointer;font-family:'Poppins'}
.act.val{background:var(--green);color:#fff}
.act.dev{background:var(--coral);color:#fff}
.empty{text-align:center;padding:50px;color:var(--muted)}
.linkbox{background:#EEF2FF;border:1px solid #d5dbf5;border-radius:12px;padding:14px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="wrap">
  <h1>Exercícios Práticos <button class="refresh" onclick="carregar()">🔄 Atualizar</button></h1>
  <div class="sub">Orçamentos e CST feitos pelos consultores na formação. Reveja cada trabalho e valide, ou devolva para correção com uma nota.</div>
  <div class="linkbox">
    <div style="flex:1;min-width:200px">
      <div style="font-size:12px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">🔗 Link do exercício</div>
      <div id="link-url" style="font-size:13px;color:var(--navy);word-break:break-all;font-family:monospace"></div>
    </div>
    <button onclick="copiarLink()" id="btn-cp" style="background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;font-family:'Poppins'">Copiar link</button>
  </div>
  <div id="lista"><div class="empty">A carregar…</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://uiaorfcgvqwxjezgisps.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpYW9yZmNndnF3eGplemdpc3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTE1MzAsImV4cCI6MjA5MTk4NzUzMH0.2AzDuZHLXsQ9NAK96b26ovu29I5xRh-UzNSNph02YhU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const QUIZ_URL = location.href.replace(/admin-exercicio\.html.*$/, 'exercicio-pratico.html');
document.getElementById('link-url').textContent = QUIZ_URL;
function copiarLink(){ navigator.clipboard.writeText(QUIZ_URL).then(()=>{const b=document.getElementById('btn-cp');const t=b.textContent;b.textContent='✓ Copiado!';setTimeout(()=>b.textContent=t,1800)}).catch(()=>prompt('Copie:',QUIZ_URL)); }

const LABELS = {
  cli_nome:'Nome cliente', cli_nif:'NIF', cli_tel:'Contacto', cli_email:'E-mail',
  destino:'Destino', hotel:'Hotel', partida:'Partida', regresso:'Regresso',
  noites:'Noites', pax:'Passageiros', origem:'Partida de', regime:'Regime',
  fornecedor:'Fornecedor', localizador:'Localizador', net:'Net (€)', pvp:'PVP (€)',
  sinal:'Sinal (%)', condpag:'Cond. pagamento', cancel:'Cancelamento'
};
const TRAB_TIT = {orc1:'Orçamento 1 — Sandra Marques', orc2:'Orçamento 2 — Ricardo Nunes', cst1:'CST 1 — Sandra Marques', cst2:'CST 2 — Ricardo Nunes'};
const estLabels = {em_curso:'em curso', em_analise:'em análise', a_corrigir:'a corrigir', validado:'validado'};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function carregar(){
  const cont=document.getElementById('lista');
  try{
    const { data, error } = await sb.from('exercicio_pratico').select('*').neq('estado','em_curso').order('atualizado_em',{ascending:false});
    if(error) throw error;
    if(!data||!data.length){ cont.innerHTML='<div class="empty">Ainda não há exercícios enviados.</div>'; return; }
    cont.innerHTML = data.map(renderItem).join('');
  }catch(e){ cont.innerHTML='<div class="empty" style="color:var(--coral)">Erro: '+esc(e.message||e)+'</div>'; }
}

function renderItem(s){
  const dt=new Date(s.atualizado_em).toLocaleDateString('pt-PT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  const trabs=s.trabalhos||{};
  const blocos = Object.keys(TRAB_TIT).map(k=>{
    const d=trabs[k]; if(!d) return '';
    const linhas = Object.keys(d).map(campo=>`<div class="kv"><span class="k">${esc(LABELS[campo]||campo)}</span><span class="v">${esc(d[campo]||'—')}</span></div>`).join('');
    return `<div class="trab"><div class="trab-h">${esc(TRAB_TIT[k])}</div><div class="trab-b">${linhas}</div></div>`;
  }).join('');
  return `<div class="subm" data-id="${s.id}">
    <div class="sh" onclick="toggle('${s.id}')">
      <span class="dot ${s.visto?'seen':''}"></span>
      <div class="who"><b>${esc(s.nome)}</b><span>${esc(s.email||'')} · ${dt}</span></div>
      <span class="tag ${s.estado}">${estLabels[s.estado]||s.estado}</span>
    </div>
    <div class="sb" id="b-${s.id}">
      ${blocos}
      <div class="actions">
        <button class="act val" onclick="validar('${s.id}')">✓ Validar exercício</button>
        <button class="act dev" onclick="devolver('${s.id}')">↩ Devolver para corrigir</button>
      </div>
      ${s.estado==='validado' ? `<div style="margin-top:10px;padding-top:12px;border-top:1px dashed var(--border)">
        <div style="font-size:12.5px;color:var(--muted);margin-bottom:8px">Exercício validado. Para libertar o acesso completo (operadores reais, Soltrópico real, venda e recrutamento), confirme abaixo:</div>
        <button class="act" style="background:var(--navy);color:#fff;width:100%" onclick="darAcessoCompleto('${s.consultor_id||''}', this)">🔓 Dar acesso completo a ${esc(s.nome)}</button>
      </div>` : ''}
    </div>
  </div>`;
}

async function toggle(id){
  const b=document.getElementById('b-'+id);
  const open=b.classList.toggle('open');
  if(open){
    const dot=document.querySelector(`.subm[data-id="${id}"] .dot`);
    if(dot && !dot.classList.contains('seen')){ dot.classList.add('seen'); try{ await sb.from('exercicio_pratico').update({visto:true}).eq('id',id);}catch(_){} }
  }
}

async function validar(id){
  try{ await sb.from('exercicio_pratico').update({estado:'validado',visto:true,visto_consultor:false,atualizado_em:new Date().toISOString()}).eq('id',id); carregar(); }
  catch(e){ alert('Erro: '+(e.message||e)); }
}
async function devolver(id){
  const nota = prompt('Nota para o consultor (o que deve corrigir):','');
  if(nota===null) return;
  try{ await sb.from('exercicio_pratico').update({estado:'a_corrigir',nota_admin:nota,visto:true,visto_consultor:false,atualizado_em:new Date().toISOString()}).eq('id',id); carregar(); }
  catch(e){ alert('Erro: '+(e.message||e)); }
}

async function darAcessoCompleto(consultorId, btn){
  if(!consultorId){ alert('Este exercício não está associado a um consultor com conta.'); return; }
  if(!confirm('Confirmar acesso completo? O consultor passa a ter operadores reais, Soltrópico real, venda e recrutamento.')) return;
  btn.disabled = true; btn.textContent = 'A libertar acesso…';
  try{
    await sb.from('perfis').update({ etapa_formacao:3, acesso_operadores:true, acesso_promotor:true }).eq('id', consultorId);
    btn.textContent = '✓ Acesso completo concedido';
    btn.style.background = 'var(--green)';
  }catch(e){ alert('Erro ao dar acesso: '+(e.message||e)); btn.disabled=false; btn.textContent='🔓 Dar acesso completo'; }
}

carregar();
</script>
</body>
</html>
