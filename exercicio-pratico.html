<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercício Prático · APM</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--coral:#E8395A;--blue:#3B5BDB;--navy:#1A1D2E;--bg:#F5F6FA;--surface:#fff;--muted:#8B92A5;--border:rgba(0,0,0,0.08);--radius:12px;--shadow:0 2px 8px rgba(0,0,0,0.06);--green:#2E9E5B}
body{font-family:'Inter',sans-serif;color:var(--navy);background:var(--bg);padding:18px;font-size:14px}
.wrap{max-width:820px;margin:0 auto}
.head{background:var(--coral);color:#fff;border-radius:var(--radius) var(--radius) 0 0;padding:22px 24px}
.head h1{font-family:'Poppins';font-size:1.3rem;font-weight:700;margin-bottom:4px}
.head p{font-size:.85rem;opacity:.92;line-height:1.5}
.card{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:24px;box-shadow:var(--shadow)}
.intro{font-size:13.5px;line-height:1.6;color:var(--navy);margin-bottom:20px}
.progress{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.pstep{flex:1;min-width:130px;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:8px}
.pstep .pdot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;font-size:11px;display:flex;align-items:center;justify-content:center;color:#fff}
.pstep.done{border-color:var(--green);background:#F0FAF3}
.pstep.done .pdot{background:var(--green);border-color:var(--green)}
.exerc{border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
.exerc-head{padding:14px 18px;background:#fafafe;cursor:pointer;display:flex;align-items:center;gap:12px}
.exerc-head:hover{background:#f4f4fb}
.exerc-head .et{flex:1}
.exerc-head .et b{font-family:'Poppins';font-size:14px;display:block}
.exerc-head .et span{font-size:12px;color:var(--muted)}
.exerc-head .tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:#FFF3E0;color:#E8A23B;white-space:nowrap}
.exerc-head .tag.done{background:#E8F5E9;color:var(--green)}
.exerc-body{display:none;padding:18px;border-top:1px solid var(--border)}
.exerc-body.open{display:block}
.pedido{background:#EEF2FF;border:1px solid #d5dbf5;border-radius:10px;padding:14px 16px;margin-bottom:18px;font-size:13px;line-height:1.6}
.pedido .from{font-weight:700;color:var(--blue);margin-bottom:6px;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.pedido .msg{font-style:italic;color:#33384a}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.frow.full{grid-template-columns:1fr}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;font-family:inherit;outline:none}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--blue)}
.fg input.miss,.fg textarea.miss,.fg select.miss{border-color:var(--coral);background:#FFF5F7}
.sec-lbl{font-family:'Poppins';font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--navy);margin:16px 0 10px;padding-bottom:6px;border-bottom:1.5px solid var(--coral)}
.btn{background:var(--coral);color:#fff;border:none;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Poppins';margin-top:8px}
.btn:hover{background:#d02f4e}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-final{width:100%;padding:15px;font-size:15px;margin-top:8px}
.err-msg{color:var(--coral);font-size:12.5px;margin-top:8px;display:none}
.ok-screen{text-align:center;padding:50px 24px}
.ok-screen .ico{font-size:54px;margin-bottom:14px}
.ok-screen h2{font-family:'Poppins';font-size:1.3rem;margin-bottom:8px}
.ok-screen p{color:var(--muted);line-height:1.55}
.nota-box{background:#FFF3E0;color:#92660B;border-radius:10px;padding:12px 15px;margin-bottom:18px;font-size:13px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="head">
    <h1>Exercício Prático — Orçamentos e CST</h1>
    <p>Pratica o que aprendeste: responde a 2 pedidos de orçamento de clientes e cria os 2 contratos (CST). Preenche todos os campos com atenção, como farias num caso real.</p>
  </div>
  <div class="card" id="main"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://uiaorfcgvqwxjezgisps.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpYW9yZmNndnF3eGplemdpc3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTE1MzAsImV4cCI6MjA5MTk4NzUzMH0.2AzDuZHLXsQ9NAK96b26ovu29I5xRh-UzNSNph02YhU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const CID = new URLSearchParams(location.search).get('cid') || '';
const PRE_NOME = decodeURIComponent(new URLSearchParams(location.search).get('cnome') || '');
const PRE_EMAIL = decodeURIComponent(new URLSearchParams(location.search).get('cemail') || '');

// Os 2 pedidos de cliente simulados
const PEDIDOS = {
  1: { cliente:'Sandra Marques', contacto:'916 482 305 · sandra.marques82@gmail.com',
    msg:'Boa tarde! Queríamos uma semana de férias em agosto — eu, o meu marido e os nossos dois filhos (8 e 12 anos). Estávamos a pensar em Cabo Verde, na ilha do Sal, num hotel com tudo incluído e de preferência perto da praia. Podia ser a partida a 9 de agosto e regresso a 16. Partíamos do Porto, se possível. Conseguem dar-me uma ideia de preço? Obrigada!' },
  2: { cliente:'Ricardo Nunes', contacto:'933 217 640 · ricardonunes.viagens@gmail.com',
    msg:'Olá, boa tarde. Eu e a minha esposa queremos fazer uma escapadinha romântica de 4 noites em outubro, para festejar o nosso aniversário de casamento. Pensámos em Roma. Só nós os dois, hotel bem central e com pequeno-almoço incluído. As datas seriam de 15 a 19 de outubro, a sair de Lisboa. Aguardo notícias!' }
};

// Campos de cada tipo de trabalho. obrig = obrigatório para validar.
const CAMPOS_ORC = [
  {id:'cli_nome', l:'Nome do cliente', obrig:true},
  {id:'cli_tel', l:'Contacto', obrig:true},
  {id:'cli_email', l:'E-mail', obrig:false},
  {id:'destino', l:'Destino', obrig:true},
  {id:'hotel', l:'Hotel / Alojamento', obrig:true},
  {id:'partida', l:'Data de partida', obrig:true, tipo:'date'},
  {id:'regresso', l:'Data de regresso', obrig:true, tipo:'date'},
  {id:'noites', l:'Noites', obrig:true},
  {id:'pax', l:'Passageiros', obrig:true},
  {id:'origem', l:'Aeroporto de partida', obrig:true},
  {id:'regime', l:'Regime', obrig:true, tipo:'select', opcoes:['','Só alojamento','Alojamento e pequeno-almoço','Meia pensão','Pensão completa','Tudo incluído']},
  {id:'pvp', l:'PVP — preço ao cliente (€)', obrig:true, tipo:'number'},
  {id:'sinal', l:'Sinal (%)', obrig:true, tipo:'number'},
  {id:'condpag', l:'Condições de pagamento', obrig:true, tipo:'textarea'},
  {id:'cancel', l:'Política de cancelamento', obrig:true, tipo:'textarea'}
];
const CAMPOS_CST = [
  {id:'cli_nome', l:'Nome do cliente', obrig:true},
  {id:'cli_nif', l:'NIF do cliente', obrig:true},
  {id:'cli_tel', l:'Contacto', obrig:true},
  {id:'cli_email', l:'E-mail', obrig:true},
  {id:'destino', l:'Destino', obrig:true},
  {id:'hotel', l:'Hotel / Alojamento', obrig:true},
  {id:'partida', l:'Data de partida', obrig:true, tipo:'date'},
  {id:'regresso', l:'Data de regresso', obrig:true, tipo:'date'},
  {id:'fornecedor', l:'Fornecedor / Operador', obrig:true},
  {id:'localizador', l:'Localizador', obrig:true},
  {id:'net', l:'Preço Net — custo (€)', obrig:true, tipo:'number'},
  {id:'pvp', l:'PVP — preço ao cliente (€)', obrig:true, tipo:'number'},
  {id:'sinal', l:'Sinal (%)', obrig:true, tipo:'number'},
  {id:'condpag', l:'Condições de pagamento', obrig:true, tipo:'textarea'},
  {id:'cancel', l:'Política de cancelamento', obrig:true, tipo:'textarea'}
];

const TRABALHOS = [
  {key:'orc1', tipo:'orc', titulo:'Orçamento 1 — Sandra Marques', ped:1},
  {key:'orc2', tipo:'orc', titulo:'Orçamento 2 — Ricardo Nunes', ped:2},
  {key:'cst1', tipo:'cst', titulo:'CST 1 — Sandra Marques', ped:1},
  {key:'cst2', tipo:'cst', titulo:'CST 2 — Ricardo Nunes', ped:2}
];

let registo = null; // registo existente
let trabalhos = {}; // dados preenchidos
let progresso = {}; // {orc1:true,...}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function init(){
  const main = document.getElementById('main');
  main.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">A carregar…</div>';
  try{
    if(CID){
      const { data } = await sb.from('exercicio_pratico').select('*').eq('consultor_id',CID).order('atualizado_em',{ascending:false}).limit(1);
      if(data && data.length){ registo = data[0]; trabalhos = registo.trabalhos||{}; progresso = registo.progresso||{}; }
    }
  }catch(_){}

  if(registo && registo.visto_consultor===false){
    try{ await sb.from('exercicio_pratico').update({visto_consultor:true}).eq('id',registo.id); }catch(_){}
  }
  if(registo && registo.estado==='em_analise') return renderEstado('em_analise');
  if(registo && registo.estado==='validado') return renderEstado('validado');
  render();
}

function renderEstado(estado){
  if(estado==='em_analise'){
    document.getElementById('wrap').innerHTML = '<div class="card" style="border-radius:12px;border-top:1px solid var(--border)"><div class="ok-screen"><div class="ico">⏳</div><h2>Em análise</h2><p>Os teus trabalhos foram enviados e estão a ser analisados pela gestão da APM Viagens. Serás notificado quando houver novidades.</p></div></div>';
  } else if(estado==='validado'){
    document.getElementById('wrap').innerHTML = '<div class="card" style="border-radius:12px;border-top:1px solid var(--border)"><div class="ok-screen"><div class="ico">✅</div><h2>Exercício validado!</h2><p>Parabéns! Os teus orçamentos e CST foram validados. Concluíste esta etapa da formação.</p></div></div>';
  }
}

function render(){
  const main = document.getElementById('main');
  let html = '';
  if(registo && registo.estado==='a_corrigir' && registo.nota_admin){
    html += `<div class="nota-box"><b>A gestão devolveu o teu exercício para rever.</b><br>${esc(registo.nota_admin)}</div>`;
  }
  html += '<div class="intro">Tens <b>4 trabalhos</b> para completar: 2 orçamentos e 2 CST, com base nos pedidos de 2 clientes. Abre cada um, preenche os campos e guarda. Quando os 4 estiverem completos, envia tudo para análise.</div>';
  // barra de progresso
  html += '<div class="progress">';
  TRABALHOS.forEach(t => {
    const done = progresso[t.key];
    html += `<div class="pstep ${done?'done':''}"><span class="pdot">${done?'✓':''}</span> ${esc(t.titulo.split(' — ')[0])}</div>`;
  });
  html += '</div>';
  // cada trabalho
  TRABALHOS.forEach(t => {
    const done = progresso[t.key];
    const ped = PEDIDOS[t.ped];
    html += `<div class="exerc"><div class="exerc-head" onclick="toggle('${t.key}')">
      <div class="et"><b>${esc(t.titulo)}</b><span>${t.tipo==='orc'?'Cria o orçamento para este cliente':'Cria o contrato (CST) para este cliente'}</span></div>
      <span class="tag ${done?'done':''}">${done?'✓ Completo':'Por fazer'}</span>
    </div>
    <div class="exerc-body" id="body-${t.key}">
      <div class="pedido"><div class="from">📩 Pedido de ${esc(ped.cliente)} · ${esc(ped.contacto)}</div><div class="msg">"${esc(ped.msg)}"</div></div>
      ${renderCampos(t)}
      <button class="btn" onclick="guardarTrabalho('${t.key}')">Guardar ${t.tipo==='orc'?'orçamento':'CST'}</button>
      <div class="err-msg" id="err-${t.key}">Preenche todos os campos obrigatórios assinalados.</div>
    </div>
  </div>`;
  });
  // botão final
  const todosFeitos = TRABALHOS.every(t => progresso[t.key]);
  html += `<button class="btn btn-final" id="btn-enviar" ${todosFeitos?'':'disabled'} onclick="enviarTudo()">${todosFeitos?'Enviar tudo para análise':'Completa os 4 trabalhos para enviar'}</button>`;
  main.innerHTML = html;
}

function renderCampos(t){
  const campos = t.tipo==='orc' ? CAMPOS_ORC : CAMPOS_CST;
  const dados = trabalhos[t.key] || {};
  let h = '';
  for(let i=0;i<campos.length;i++){
    const c = campos[i];
    const val = dados[c.id]||'';
    const fid = `${t.key}-${c.id}`;
    let field='';
    if(c.tipo==='textarea'){
      field = `<textarea id="${fid}" rows="2">${esc(val)}</textarea>`;
    } else if(c.tipo==='select'){
      field = `<select id="${fid}">`+c.opcoes.map(o=>`<option value="${esc(o)}" ${o===val?'selected':''}>${o||'— escolher —'}</option>`).join('')+`</select>`;
    } else {
      field = `<input type="${c.tipo||'text'}" id="${fid}" value="${esc(val)}">`;
    }
    h += `<div class="fg" style="margin-bottom:12px"><label>${esc(c.l)}${c.obrig?' *':''}</label>${field}</div>`;
  }
  return h;
}

function toggle(key){
  document.getElementById('body-'+key).classList.toggle('open');
}

function guardarTrabalho(key){
  const t = TRABALHOS.find(x=>x.key===key);
  const campos = t.tipo==='orc' ? CAMPOS_ORC : CAMPOS_CST;
  const dados = {}; let faltam=false;
  campos.forEach(c => {
    const el = document.getElementById(`${key}-${c.id}`);
    const v = el ? el.value.trim() : '';
    dados[c.id] = v;
    el.classList.remove('miss');
    if(c.obrig && !v){ el.classList.add('miss'); faltam=true; }
  });
  if(faltam){ document.getElementById('err-'+key).style.display='block'; return; }
  document.getElementById('err-'+key).style.display='none';
  trabalhos[key] = dados;
  progresso[key] = true;
  render();
  // reabrir o próximo por fazer (ou manter visão geral)
}

async function persistir(estado){
  const payload = {
    consultor_id: CID || null,
    nome: PRE_NOME || (trabalhos.orc1&&trabalhos.orc1.cli_nome) || 'Consultor',
    email: PRE_EMAIL || null,
    trabalhos, progresso, estado,
    visto:false, visto_consultor:true,
    atualizado_em: new Date().toISOString()
  };
  if(registo){
    const { error } = await sb.from('exercicio_pratico').update(payload).eq('id', registo.id);
    if(error) throw error;
  } else {
    const { data, error } = await sb.from('exercicio_pratico').insert(payload).select().single();
    if(error) throw error;
    registo = data;
  }
}

async function enviarTudo(){
  const btn = document.getElementById('btn-enviar');
  if(!TRABALHOS.every(t=>progresso[t.key])) return;
  btn.disabled=true; btn.textContent='A enviar…';
  try{
    await persistir('em_analise');
    renderEstado('em_analise');
  }catch(e){ alert('Não foi possível enviar: '+(e.message||e)); btn.disabled=false; btn.textContent='Enviar tudo para análise'; }
}

// guardar rascunho automaticamente quando completa um trabalho (sem mudar estado)
let saveTimer=null;
function autoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{ try{ await persistir(registo? (registo.estado==='em_analise'?'em_analise':'em_curso') :'em_curso'); }catch(_){} }, 600);
}
const _guardar = guardarTrabalho;
guardarTrabalho = function(k){ _guardar(k); autoSave(); };

init();
</script>
</body>
</html>
