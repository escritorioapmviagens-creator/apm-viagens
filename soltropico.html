<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--coral:#E8395A;--blue:#3B5BDB;--navy:#1A1D2E;--bg:#F8F9FC;--surface:#fff;--muted:#6B7280;--border:#E5E7EB;--radius:16px;--radius-sm:12px;--shadow:0 1px 3px rgba(0,0,0,0.05);--shadow-md:0 4px 12px rgba(0,0,0,0.08)}
body{font-family:'Inter',sans-serif;font-size:14px;color:var(--navy);background:var(--bg);min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.topbar img{height:38px;object-fit:contain}
.topbar-brand{font-family:'Poppins',sans-serif;font-size:15px;font-weight:600}
.topbar-sub{font-size:11px;color:var(--muted)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.consultor-chip{background:var(--bg);border:1px solid var(--border);border-radius:40px;padding:5px 12px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--navy);padding:6px 14px;border-radius:40px;font-size:12px;font-weight:500;cursor:pointer;transition:.2s}
.btn-back:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.container{max-width:1280px;margin:0 auto;padding:24px 20px 60px}

/* Stats Cards - Versão Light */
.stats-grid{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap}
.stat-card{background:var(--surface);border-radius:var(--radius-sm);padding:20px 24px;flex:1;min-width:140px;border:1px solid var(--border);box-shadow:var(--shadow);transition:all .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat-value{font-family:'Poppins',sans-serif;font-size:32px;font-weight:700;color:var(--navy);line-height:1.2}
.stat-label{font-size:13px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:6px}
.stat-icon{font-size:18px}

.continent-section{margin-bottom:48px}
.continent-header{display:flex;align-items:baseline;gap:12px;margin-bottom:20px}
.continent-icon{font-size:24px}
.continent-title{font-family:'Poppins',sans-serif;font-size:18px;font-weight:600;color:var(--navy)}
.continent-count{font-size:12px;color:var(--muted);background:var(--bg);padding:3px 10px;border-radius:30px}
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.country-card{background:var(--surface);border-radius:var(--radius-sm);padding:12px 16px;cursor:pointer;transition:all .2s;border:1px solid var(--border);display:flex;align-items:center;gap:12px}
.country-card:hover{transform:translateY(-2px);border-color:var(--blue);box-shadow:var(--shadow-md)}
.country-flag{font-size:26px}
.country-name{font-weight:500;font-size:14px;flex:1;color:var(--navy)}
.country-badge{background:var(--bg);padding:3px 9px;border-radius:30px;font-size:11px;font-weight:500;color:var(--blue)}
.empty-continent{text-align:center;padding:20px;color:var(--muted);font-style:italic}

.products-panel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-top:24px;display:none}
.products-panel.show{display:block}
.panel-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.panel-header h3{font-family:'Poppins',sans-serif;font-size:15px;font-weight:600;color:var(--navy)}
.close-panel{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:30px;cursor:pointer;font-size:12px;transition:.2s}
.close-panel:hover{background:var(--coral);color:#fff;border-color:var(--coral)}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:20px}
.product-card{background:var(--surface);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;transition:all .2s;border:1px solid var(--border)}
.product-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--blue)}
.product-photo{height:150px;position:relative;overflow:hidden;background:#F3F4F6;background-size:cover;background-position:center}
.product-photo img{width:100%;height:100%;object-fit:cover}
.product-photo-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#F3F4F6,#E5E7EB)}
.product-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);color:#FFD166;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.product-info{padding:14px}
.product-name{font-weight:600;font-size:14px;margin-bottom:4px;color:var(--navy)}
.product-code{font-size:11px;color:var(--muted);margin-bottom:8px}
.product-price{font-size:18px;font-weight:700;color:var(--coral);margin-top:8px}
.product-price small{font-size:10px;font-weight:500;color:var(--muted)}
.state-empty{text-align:center;padding:40px;color:var(--muted)}
.skel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.skel{background:var(--surface);border-radius:12px;padding:12px;display:flex;align-items:center;gap:12px;border:1px solid var(--border)}
.skel .s-flag{width:36px;height:36px;background:linear-gradient(100deg,#F3F4F6 30%,#E5E7EB 50%,#F3F4F6 70%);background-size:200%;border-radius:50%;animation:sh 1.3s infinite}
.skel .s-text{flex:1;height:14px;background:linear-gradient(100deg,#F3F4F6 30%,#E5E7EB 50%,#F3F4F6 70%);background-size:200%;border-radius:8px;animation:sh 1.3s infinite}
@keyframes sh{to{background-position:-200% 0}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:40px;font-size:13px;font-weight:500;box-shadow:var(--shadow-md);z-index:200;transition:transform .3s}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#10B981}.toast.err{background:var(--coral)}
</style>

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function money(v){return '€'+(parseFloat(v)||0).toLocaleString('pt-PT',{minimumFractionDigits:2})}
function toast(msg,type=''){const t=document.getElementById('toast');t.className='toast show '+type;t.innerHTML=msg;clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',3000)}
function credXML(){return `<Credentials xsi:type="ns1:CredentialsStruct"><System xsi:type="xsd:int">${CREDS.System}</System><Client xsi:type="xsd:int">${CREDS.Client}</Client><Username xsi:type="xsd:string">${CREDS.Username}</Username><Password xsi:type="xsd:string">${CREDS.Password}</Password></Credentials>`}
function wrap(body){return `<?xml version="1.0" encoding="UTF-8"?><soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:ns1="http://www3.optitravel.net/optitravel/export/wbs/pkt/" xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:SOAP-ENC="http://schemas.xmlsoap.org/soap/encoding/" soapenv:encodingStyle="http://schemas.xmlsoap.org/soap/encoding/"><soapenv:Header/><soapenv:Body>${body}</soapenv:Body></soapenv:Envelope>`}
async function soapCall(action,body){const res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_ANON}`},body:JSON.stringify({soapAction:action,soapBody:wrap(body)})});if(!res.ok)throw new Error(`Falha (${res.status})`);const data=await res.json();if(data.error)throw new Error(data.error);const xmlStr=(data.xml||'').replace(/^\uFEFF/,'').trim();const doc=new DOMParser().parseFromString(xmlStr,'text/xml');if(doc.querySelector('parsererror'))throw new Error('Resposta inválida');const f=doc.querySelector('faultstring');if(f)throw new Error(f.textContent);return doc}
function txt(el,tag){if(!el)return '';for(let i=0;i<el.children.length;i++){const c=el.children[i],l=c.localName||c.tagName.split(':').pop();if(l===tag)return c.textContent.trim()}const n=el.getElementsByTagName('*');for(let i=0;i<n.length;i++){const l=n[i].localName||n[i].tagName.split(':').pop();if(l===tag)return n[i].textContent.trim()}return ''}
function directChildren(el,tag){if(!el)return [];const o=[];for(let i=0;i<el.children.length;i++){const c=el.children[i],l=c.localName||c.tagName.split(':').pop();if(l===tag)o.push(c)}return o}
function all(el,tag){if(!el)return [];const o=[],n=el.getElementsByTagName('*');for(let i=0;i<n.length;i++){const l=n[i].localName||n[i].tagName.split(':').pop();if(l===tag)o.push(n[i])}return o}
function itemsOf(c){return c?directChildren(c,'item'):[]}

function extractCountryFromName(productName){
  const lowerName = productName.toLowerCase()
  for(const country of countriesDefinition){
    for(const keyword of country.keywords){
      if(lowerName.includes(keyword)) return country.name
    }
  }
  return null
}

async function init(){
  showSkeleton()
  try{
    const doc=await soapCall('SearchProducts',`<ns1:SearchProducts><SearchProductsRequest>${credXML()}<PriceFrom>0</PriceFrom><PriceTo>99999</PriceTo></SearchProductsRequest></ns1:SearchProducts>`)
    const arr=all(doc,'ProductArray')[0];
    let items=arr?itemsOf(arr):[];
    if(!items.length) items=all(doc,'Product')
    
    allProducts = []
    const matchedProducts = new Map()
    
    for(const p of items){
      const code=parseInt((txt(p,'Code')||txt(p,'ProdCode')||'0').trim());
      const nome=txt(p,'Name')||txt(p,'ProdName')||'';
      const price=txt(p,'PriceFrom')||'0';
      let img = txt(p,'ImageUrl') || txt(p,'Image') || '';
      const country = extractCountryFromName(nome);
      
      if(code>0 && nome && nome!=='TESTE OMNIBEES' && country && !matchedProducts.has(code)){
        matchedProducts.set(code, true)
        allProducts.push({code,nome,price:parseFloat(price),country,img})
      }
    }
    
    renderStats()
    renderContinents()
  }catch(e){
    console.error(e)
    document.getElementById('continents-container').innerHTML=`<div class="state-empty"><div class="ico">⚠️</div><h3>Erro ao carregar</h3><p>${esc(e.message)}</p><button class="btn-back" style="margin-top:16px" onclick="init()">Tentar novamente</button></div>`
    toast('Erro ao carregar pacotes', 'err')
  }
}

function renderStats(){
  const uniqueCountries = new Set(allProducts.map(p => p.country))
  const minPrice = Math.min(...allProducts.map(p => p.price).filter(p => p > 0))
  document.getElementById('total-count').textContent = allProducts.length
  document.getElementById('country-count').textContent = uniqueCountries.size
  document.getElementById('best-price').innerHTML = minPrice ? money(minPrice) : '—'
}

function renderContinents(){
  let html = ''
  
  for(const [continentName, data] of Object.entries(continentsStructure)){
    const countriesWithPackages = data.countries.filter(country => {
      return allProducts.some(p => p.country === country)
    })
    
    if(countriesWithPackages.length === 0) continue
    
    html += `
      <div class="continent-section">
        <div class="continent-header">
          <span class="continent-icon">${data.icon}</span>
          <span class="continent-title">${continentName.replace(/[🌍🇪🇺🌎🌏]/g, '').trim() || continentName}</span>
          <span class="continent-count">${countriesWithPackages.length} ${countriesWithPackages.length === 1 ? 'país c/ pacotes' : 'países c/ pacotes'}</span>
        </div>
        <div class="country-grid">
    `
    
    for(const countryName of countriesWithPackages){
      const productCount = allProducts.filter(p => p.country === countryName).length
      const countryDef = countriesDefinition.find(c => c.name === countryName)
      const flag = countryDef ? countryDef.flag : '🏖️'
      
      html += `
        <div class="country-card" onclick="selectCountry('${countryName}', '${flag}')">
          <span class="country-flag">${flag}</span>
          <span class="country-name">${countryName}</span>
          <span class="country-badge">${productCount}</span>
        </div>
      `
    }
    
    html += `</div></div>`
  }
  
  if(html === ''){
    html = `<div class="empty-continent">Nenhum destino com pacotes disponível no momento.</div>`
  }
  
  document.getElementById('continents-container').innerHTML = html
}

function selectCountry(countryName, flag){
  selectedCountry = countryName
  const products = allProducts.filter(p => p.country === countryName)
  
  if(products.length === 0){
    toast(`Nenhum pacote encontrado para ${countryName}`, 'err')
    return
  }
  
  const sorted = [...products].sort((a,b) => (a.price || 9999) - (b.price || 9999))
  const countryImage = countryImages[countryName] || ''
  const fallbackIcon = getCountryIcon(countryName)
  
  document.getElementById('selected-country-title').innerHTML = `${flag} ${countryName} · ${sorted.length} ${sorted.length === 1 ? 'pacote' : 'pacotes'} disponível(eis)`
  document.getElementById('products-panel').classList.add('show')
  
  const productsHtml = sorted.map(p => {
    const imageUrl = p.img && p.img.startsWith('http') ? p.img : countryImage
    
    const imageHtml = imageUrl 
      ? `<img src="${esc(imageUrl)}" onerror="this.parentElement.innerHTML='<div class=\\'product-photo-fallback\\'>${fallbackIcon}</div>'">`
      : `<div class="product-photo-fallback">${fallbackIcon}</div>`
    
    return `
      <div class="product-card" onclick="selectProduct(${p.code}, '${esc(p.nome)}')">
        <div class="product-photo">
          ${imageHtml}
          <span class="product-badge">${p.price > 0 ? money(p.price) : 'Sob consulta'}</span>
        </div>
        <div class="product-info">
          <div class="product-name">${esc(p.nome)}</div>
          <div class="product-code">Código: ${p.code}</div>
          <div class="product-price">${p.price > 0 ? money(p.price) : '—'} <small>por pessoa</small></div>
        </div>
      </div>
    `
  }).join('')
  
  document.getElementById('products-list').innerHTML = productsHtml
  document.getElementById('products-panel').scrollIntoView({ behavior: 'smooth' })
}

function closeProductsPanel(){
  document.getElementById('products-panel').classList.remove('show')
  selectedCountry = null
}

function selectProduct(code, name){
  toast(`🔍 ${name} - Código ${code}`, 'ok')
  alert(`Produto selecionado: ${name}\nCódigo: ${code}\n\nA funcionalidade de reserva será integrada aqui.`)
}

function showSkeleton(){
  document.getElementById('continents-container').innerHTML = `
    <div class="continent-section">
      <div class="continent-header"><span class="continent-icon">🌍</span><span class="continent-title">A carregar destinos...</span></div>
      <div class="country-grid">
        ${Array(6).fill('<div class="skel"><div class="s-flag"></div><div class="s-text"></div></div>').join('')}
      </div>
    </div>
  `
}

const urlP=new URLSearchParams(location.search)
const CONSULTOR={id:urlP.get('cid')||'',nome:decodeURIComponent(urlP.get('cnome')||'Consultor')}
if(CONSULTOR.nome&&CONSULTOR.nome!=='Consultor'){
  document.getElementById('consultor-chip').style.display='flex'
  document.getElementById('consultor-nome').textContent=CONSULTOR.nome
}

init()
</script>
</body>
</html>
