<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog APM Viagens — Inspiração para viajar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;font-family:'Poppins',sans-serif;color:#1a1a2e}
.wrap{max-width:900px;margin:0 auto;background:#fff}
/* NAV */
.site-nav{background:#fff;padding:16px 40px;border-bottom:3px solid #E8395A;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.site-nav img{height:40px}
.nav-cta{background:#E8395A;color:#fff;text-decoration:none;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 22px;border-radius:4px;transition:background .2s}
.nav-cta:hover{background:#d42e4f}
/* HERO */
.hero{position:relative;overflow:hidden;min-height:360px;background:#1a1a2e;display:flex;align-items:center}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0a0d1a 0%,#0d1a30 30%,#1a2545 55%,#200d20 80%,#0d0a1a 100%)}
.hero-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 30%,rgba(232,57,90,.25) 0%,transparent 50%),radial-gradient(ellipse at 25% 65%,rgba(59,91,219,.3) 0%,transparent 50%),radial-gradient(ellipse at 85% 75%,rgba(57,150,232,.15) 0%,transparent 40%)}
.hero-bg::after{content:'🌍';position:absolute;right:-1%;bottom:-5%;font-size:26rem;opacity:.06;pointer-events:none;line-height:1}
.hero-content{position:relative;padding:60px 40px;max-width:600px}
.hero-eyebrow{display:inline-block;background:#E8395A;color:#fff;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:5px 12px;border-radius:4px;margin-bottom:18px}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.4rem,5vw,3.6rem);font-weight:600;color:#fff;line-height:1.1;margin-bottom:14px}
.hero-title em{font-style:italic;color:#E8395A}
.hero-sub{font-size:14px;color:rgba(255,255,255,.65);line-height:1.75;max-width:440px}
/* SEARCH */
.search-wrap{padding:28px 40px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:10px 16px;border:1.5px solid #e5e7eb;border-radius:4px;font-family:'Poppins',sans-serif;font-size:13px;color:#1a1a2e;outline:none;transition:border-color .2s}
.search-input:focus{border-color:#E8395A}
.cat-btn{padding:8px 16px;border:1.5px solid #e5e7eb;background:#fff;border-radius:4px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;color:#6b7280;cursor:pointer;transition:all .2s}
.cat-btn:hover,.cat-btn.active{border-color:#E8395A;color:#E8395A;background:#fff0f3}
/* DIVIDER */
.divider{height:4px;background:linear-gradient(90deg,#E8395A 0%,#3B5BDB 100%)}
/* SECTION */
.section{padding:40px}
.section-tag{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#E8395A;font-weight:700;margin-bottom:24px;display:flex;align-items:center;gap:10px}
.section-tag::after{content:'';flex:1;height:1px;background:#f0f0f0}
/* FEATURED */
.featured-card{display:flex;gap:0;border:1px solid #f0f0f0;border-radius:8px;overflow:hidden;text-decoration:none;color:inherit;transition:box-shadow .2s;margin-bottom:16px}
.featured-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.featured-card img{width:260px;min-width:260px;object-fit:cover}
.featured-card .fc-body{flex:1;padding:28px;display:flex;flex-direction:column;justify-content:center}
.fc-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:4px;margin-bottom:12px;background:#fff0f3;color:#E8395A;border:1px solid #ffd6de}
.fc-tag.blue{background:#eef2ff;color:#3B5BDB;border-color:#c7d7fd}
.fc-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:#1a1a2e;line-height:1.25;margin-bottom:10px}
.fc-desc{font-size:12px;color:#6b7280;line-height:1.7;margin-bottom:14px}
.fc-meta{font-size:11px;color:#9ca3af;display:flex;align-items:center;gap:8px}
.fc-read{margin-top:auto;font-size:11px;font-weight:700;color:#E8395A;text-decoration:none;letter-spacing:.06em;text-transform:uppercase}
/* GRID */
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.post-card{border:1px solid #f0f0f0;border-radius:8px;overflow:hidden;text-decoration:none;color:inherit;transition:box-shadow .2s;display:flex;flex-direction:column}
.post-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.post-card img{width:100%;aspect-ratio:16/9;object-fit:cover}
.post-card .body{padding:20px;flex:1;display:flex;flex-direction:column}
.post-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:4px;margin-bottom:10px;background:#fff0f3;color:#E8395A;border:1px solid #ffd6de}
.post-tag.blue{background:#eef2ff;color:#3B5BDB;border-color:#c7d7fd}
.post-card h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:#1a1a2e;line-height:1.3;margin-bottom:8px}
.post-card p{font-size:12px;color:#6b7280;line-height:1.65;flex:1}
.post-footer{padding:12px 20px;border-top:1px solid #f5f5f5;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.post-footer span{color:#9ca3af}
.post-footer .read{color:#E8395A;font-weight:700}
/* FOOTER */
.site-footer{background:#f5f5f5;padding:28px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.site-footer img{height:32px;opacity:.5}
.site-footer p{font-size:11px;color:#9ca3af}
@media(max-width:680px){.featured-card{flex-direction:column}.featured-card img{width:100%;min-width:auto;height:180px}}
</style>
</head>
<body>
<div class="wrap">

<nav class="site-nav">
  <img src="https://ezycourse.b-cdn.net/3064/cmbzo7qfw08hhth9nfjwpb7sw.png" alt="APM Viagens">
  <a href="#" class="nav-cta" id="nav-orcamento">✈ Pedir orçamento</a>
</nav>

<div class="hero">
  <div class="hero-bg"></div>
  <div style="position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0">
    <div style="position:absolute;top:12%;right:6%;font-size:5rem;opacity:.07;transform:rotate(20deg)">✈</div>
    <div style="position:absolute;bottom:18%;right:12%;font-size:3.5rem;opacity:.06">🗺</div>
    <div style="position:absolute;top:50%;right:2%;font-size:2.5rem;opacity:.05">🌅</div>
    <div style="position:absolute;top:30%;left:3%;font-size:2rem;opacity:.05">🏝</div>
  </div>
  <div class="hero-content">
    <div class="hero-eyebrow">✦ Blog APM Viagens</div>
    <div class="hero-title">Inspiração para a tua<br><em>próxima aventura</em></div>
    <div class="hero-sub">Destinos, dicas e oportunidades de carreira no mundo das viagens.</div>
  </div>
</div>

<div class="divider"></div>

<div class="search-wrap">
  <input type="text" class="search-input" placeholder="🔍  Pesquisar artigos..." oninput="filtrar(this.value)">
  <button class="cat-btn active" onclick="filtrarCat('todos',this)">Todos</button>
  <button class="cat-btn" onclick="filtrarCat('destinos',this)">✈ Destinos</button>
  <button class="cat-btn" onclick="filtrarCat('carreira',this)">💼 Carreira</button>
</div>

<div class="section">
  <div class="section-tag">Em destaque</div>

  <div id="featured-dinamico"><div style="text-align:center;padding:40px;color:#9ca3af;font-size:13px">A carregar artigos...</div></div>
</div>

<div class="divider"></div>

<div class="section" id="section-grid">
  <div class="section-tag">Todos os artigos</div>
  <div class="posts-grid" id="posts-grid">
    <!-- preenchido via JS -->
  </div>
</div>

<div class="site-footer">
  <img src="https://ezycourse.b-cdn.net/3064/cmbzo7qfw08hhth9nfjwpb7sw.png" alt="APM Viagens">
  <p>© 2026 APM Viagens · Andar nas Praias do Mundo Lda · Odivelas, Lisboa</p>
</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://uiaorfcgvqwxjezgisps.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpYW9yZmNndnF3eGplemdpc3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTE1MzAsImV4cCI6MjA5MTk4NzUzMH0.2AzDuZHLXsQ9NAK96b26ovu29I5xRh-UzNSNph02YhU'
const { createClient } = supabase
const sb = createClient(SUPA_URL, SUPA_KEY)

const p = new URLSearchParams(location.search)
const ref = p.get('ref') || ''
const s = ref ? '?ref=' + ref : ''

document.getElementById('nav-orcamento').href = 'pedir-orcamento.html' + s

function artigoUrl(id) {
  return 'blog-artigo.html?id=' + id + (ref ? '&ref=' + ref : '')
}

function renderCard(a, featured) {
  const url = artigoUrl(a.id)
  const img = a.hero_imgs?.[0] || a.hero_img || 'https://images.unsplash.com/photo-1528702748617-c64d49f918af?w=600&h=400&fit=crop'
  const isCarreira = a.regiao === 'Portugal'
  const tagClass = isCarreira ? 'blue' : ''
  const tagLabel = isCarreira ? '💼 Carreira' : '✈ Destinos'
  const cat = isCarreira ? 'carreira' : 'destinos'

  if (featured) {
    return `<a class="featured-card" href="${url}" data-cat="${cat}" data-titulo="${a.titulo}">
      <img src="${img}" alt="${a.titulo}" style="width:260px;min-width:260px;object-fit:cover">
      <div class="fc-body">
        <div class="fc-tag ${tagClass}">${tagLabel}</div>
        <div class="fc-title">${a.titulo}</div>
        <div class="fc-desc">${a.subtitulo || ''}</div>
        <div class="fc-meta"><span>5 min de leitura</span><span>·</span><span>${a.consultor_nome === 'APM Viagens' ? 'APM Viagens' : 'Por ' + a.consultor_nome}</span></div>
        <div style="margin-top:14px;font-size:11px;font-weight:700;color:${isCarreira?'#3B5BDB':'#E8395A'};text-transform:uppercase;letter-spacing:.06em">Ler artigo →</div>
      </div>
    </a>`
  } else {
    return `<a class="post-card" href="${url}" data-cat="${cat}" data-titulo="${a.titulo}">
      <img src="${img}" alt="${a.titulo}">
      <div class="body">
        <div class="post-tag ${tagClass}">${tagLabel}</div>
        <h3>${a.titulo}</h3>
        <p>${a.subtitulo || ''}</p>
      </div>
      <div class="post-footer">
        <span>5 min · ${new Date(a.criado_em).toLocaleDateString('pt-PT',{month:'short',year:'numeric'})}</span>
        <span class="read">Ler →</span>
      </div>
    </a>`
  }
}

async function carregarArtigos() {
  const { data, error } = await sb
    .from('artigos_consultores')
    .select('id, titulo, subtitulo, regiao, hero_img, hero_imgs, consultor_nome, criado_em')
    .eq('publicado', true)
    .order('criado_em', { ascending: false })

  if (error || !data) return

  // Featured: primeiros 2
  const featuredEl = document.getElementById('featured-dinamico')
  if (featuredEl) {
    featuredEl.innerHTML = data.slice(0, 2).map(a => renderCard(a, true)).join('')
  }

  // Grid: todos
  const gridEl = document.getElementById('posts-grid')
  if (gridEl) {
    gridEl.innerHTML = data.map(a => renderCard(a, false)).join('')
  }
}

carregarArtigos()

let catActiva = 'todos'
function filtrarCat(cat, btn) {
  catActiva = cat
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  aplicar()
}
function filtrar(q) { aplicar(q) }
function aplicar(q = '') {
  const ql = q.toLowerCase()
  ;[...document.querySelectorAll('.featured-card'), ...document.querySelectorAll('.post-card')].forEach(el => {
    const cat = el.dataset.cat
    const titulo = (el.dataset.titulo || '').toLowerCase()
    const mc = catActiva === 'todos' || cat === catActiva
    const mq = !ql || titulo.includes(ql)
    el.style.display = mc && mq ? '' : 'none'
  })
}
</script>
</body>
</html>
