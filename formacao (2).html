<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APM Viagens — Formação</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --coral:#E8395A; --coral-light:#FFF0F3;
  --blue:#3B5BDB; --blue-light:#EEF2FF;
  --bg:#F5F6FA; --surface:#fff;
  --text:#1A1D2E; --muted:#8B92A5; --muted2:#B0B7C3;
  --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.12);
  --radius:12px; --radius-sm:8px;
  --shadow:0 2px 8px rgba(0,0,0,0.06);
  --shadow-md:0 4px 16px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow)}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo{font-family:'Poppins',sans-serif;font-weight:700;font-size:17px;color:var(--coral)}
.back-btn{color:var(--muted);font-size:13px;text-decoration:none;padding:5px 10px;border-radius:6px;transition:background .2s}
.back-btn:hover{background:var(--bg);color:var(--text)}
.badge-admin{background:#fef3c7;color:#92400e;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}

/* HEADER DO CURSO */
.course-header{background:linear-gradient(135deg,#1A1D2E 0%,#2D3250 100%);padding:28px 32px;color:#fff}
.course-header-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:20px}
.course-thumb{width:110px;height:72px;border-radius:10px;object-fit:cover;box-shadow:0 4px 16px rgba(0,0,0,.3);flex-shrink:0}
.course-info{flex:1}
.course-title{font-family:'Poppins',sans-serif;font-size:19px;font-weight:700;margin-bottom:6px}
.course-meta{display:flex;gap:14px;flex-wrap:wrap}
.course-meta span{font-size:12px;color:rgba(255,255,255,.65)}

/* LAYOUT PRINCIPAL */
.main-layout{max-width:1000px;margin:0 auto;padding:24px;display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}

/* LISTA DE MÓDULOS */
.modules-panel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;position:sticky;top:76px}
.modules-panel-title{padding:14px 16px;font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;border-bottom:1px solid var(--border);color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

.module-group{}
.module-header{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.module-header:hover{background:var(--bg)}
.module-header.active-module{background:var(--blue-light)}
.module-icon{font-size:15px;flex-shrink:0}
.module-name{flex:1;font-size:12px;font-weight:600;line-height:1.3}
.module-count{font-size:10px;color:var(--muted);background:var(--bg);padding:1px 6px;border-radius:10px;flex-shrink:0}
.chevron{color:var(--muted2);transition:transform .25s;font-size:14px;flex-shrink:0}
.module-group.open .chevron{transform:rotate(90deg)}

.lessons-list{display:none;border-bottom:1px solid var(--border)}
.module-group.open .lessons-list{display:block}
.lesson-row{display:flex;align-items:center;gap:8px;padding:8px 16px 8px 42px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(0,0,0,.03)}
.lesson-row:last-child{border-bottom:none}
.lesson-row:hover{background:var(--bg)}
.lesson-row.active{background:var(--coral-light)}
.lesson-row.active .lesson-name{color:var(--coral);font-weight:600}
.lesson-type-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-video{background:var(--blue)}
.dot-pdf{background:#f59e0b}
.lesson-name{font-size:12px;line-height:1.3;flex:1}
.edit-aula-btn{width:22px;height:22px;border-radius:4px;background:none;border:1px solid var(--border);cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;flex-shrink:0}
.edit-aula-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
body.is-admin .edit-aula-btn{display:flex}

/* PAINEL DE VÍDEO */
.video-panel{display:flex;flex-direction:column;gap:16px}

.video-container{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.video-wrap{position:relative;padding-bottom:56.25%;background:#000;border-radius:var(--radius) var(--radius) 0 0;overflow:hidden}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#fff;background:linear-gradient(135deg,#1A1D2E,#2D3250)}
.video-placeholder .big-icon{font-size:48px;opacity:.4}
.video-placeholder p{font-size:13px;color:rgba(255,255,255,.5);text-align:center;max-width:220px}
.video-info{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.video-title{font-family:'Poppins',sans-serif;font-size:15px;font-weight:600}
.video-module{font-size:12px;color:var(--muted);margin-top:2px}

/* NAV ENTRE AULAS */
.lesson-nav{display:flex;gap:8px}
.nav-btn{padding:7px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted);font-family:'Inter',sans-serif}
.nav-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}

/* MODAL EDIÇÃO */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:500;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:16px;margin-bottom:20px}
.fg{margin-bottom:14px}
.fl{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
.fi,.fs{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Inter',sans-serif;color:var(--text);transition:border-color .2s;background:var(--surface)}
.fi:focus,.fs:focus{outline:none;border-color:var(--blue)}
.fhint{font-size:11px;color:var(--muted);margin-top:3px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .2s}
.btn-primary{background:var(--coral);color:#fff}
.btn-primary:hover{background:#d42f50}
.btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue)}

/* NOTIF */
.notif{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow-md);z-index:1000;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.notif.show{transform:translateY(0);opacity:1}
.notif.ok{background:#10b981}
.notif.err{background:var(--coral)}

/* LOADING */
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}

.youtube-preview{width:100%;height:36px;border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-top:6px;display:none}
.youtube-preview iframe{width:100%;height:100%;border:none;pointer-events:none}

@media(max-width:768px){
  .main-layout{grid-template-columns:1fr;padding:16px}
  .modules-panel{position:static}
  .course-header{padding:20px 16px}
  .course-header-inner{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">APM Viagens</span>
    <a href="index.html" class="back-btn">← Sistema</a>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:12px;color:var(--muted)" id="uName"></span>
    <span class="badge-admin" id="adminBadge" style="display:none">Admin</span>
  </div>
</div>

<div class="course-header">
  <div class="course-header-inner">
    <img class="course-thumb" src="https://ezycourse.b-cdn.net/3064/cmf85suyx01j8ha8zcbt8htdm.png" onerror="this.style.display='none'" alt="Formação">
    <div class="course-info">
      <div class="course-title">🎓 Formação Consultores APM Viagens</div>
      <div class="course-meta">
        <span id="meta-modulos">⏳ A carregar...</span>
        <span id="meta-aulas"></span>
      </div>
    </div>
  </div>
</div>

<div class="main-layout">
  <!-- PAINEL ESQUERDO: lista de módulos -->
  <div class="modules-panel" id="modulesPanel">
    <div class="modules-panel-title">Módulos</div>
    <div id="modulesList"><div class="spin"></div></div>
  </div>

  <!-- PAINEL DIREITO: vídeo -->
  <div class="video-panel">
    <div class="video-container" id="videoContainer">
      <div class="video-wrap" id="videoWrap">
        <div class="video-placeholder" id="videoPlaceholder">
          <div class="big-icon">🎬</div>
          <p>Seleciona uma aula no menu para começar</p>
        </div>
      </div>
      <div class="video-info" id="videoInfo" style="display:none">
        <div>
          <div class="video-title" id="videoTitle"></div>
          <div class="video-module" id="videoModule"></div>
        </div>
        <div class="lesson-nav">
          <button class="nav-btn" id="btnPrev" onclick="navLesson(-1)" disabled>← Anterior</button>
          <button class="nav-btn" id="btnNext" onclick="navLesson(1)">Seguinte →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL EDIÇÃO DE AULA -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-title">✏️ Editar Aula</div>
    <input type="hidden" id="editId">
    <div class="fg">
      <label class="fl">Título da aula</label>
      <input class="fi" id="editTitulo" placeholder="Nome da aula">
    </div>
    <div class="fg">
      <label class="fl">Tipo</label>
      <select class="fs" id="editTipo" onchange="toggleEditTipo()">
        <option value="video">▶ Vídeo (YouTube)</option>
        <option value="pdf">📄 PDF / Documento</option>
      </select>
    </div>
    <div id="editVideoFields">
      <div class="fg">
        <label class="fl">Link do YouTube (não listado)</label>
        <input class="fi" id="editYoutubeUrl" placeholder="https://youtu.be/XXXXXXXXXX ou ID do vídeo" oninput="previewYoutube()">
        <div class="fhint">Cola o link completo do YouTube ou só o ID do vídeo. O vídeo deve estar como "Não Listado" no YouTube.</div>
        <div id="ytPreviewWrap" style="margin-top:8px;display:none;border-radius:8px;overflow:hidden;aspect-ratio:16/9;max-height:150px">
          <iframe id="ytPreviewFrame" src="" allowfullscreen style="width:100%;height:100%;border:none;pointer-events:none"></iframe>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeEdit()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 Guardar</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
const SUPA = 'https://uiaorfcgvqwxjezgisps.supabase.co'
const AKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpYW9yZmNndnF3eGplemdpc3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTE1MzAsImV4cCI6MjA5MTk4NzUzMH0.2AzDuZHLXsQ9NAK96b26ovu29I5xRh-UzNSNph02YhU'
const sb = supabase.createClient(SUPA, AKEY)

let isAdmin = false
let allAulas = []       // lista plana de todas as aulas
let flatLessons = []    // lista plana ordenada para navegação
let currentIdx = -1     // índice na flatLessons
let currentTok = null

// ── AUTH ──────────────────────────────────────────────────────────
function getSbSession() {
  try {
    const raw = localStorage.getItem('sb-uiaorfcgvqwxjezgisps-auth-token')
    if (raw) return JSON.parse(raw)
  } catch(e) {}
  return null
}

async function init() {
  const session = getSbSession()
  if (session) {
    try {
      const r = await fetch(SUPA + '/auth/v1/token?grant_type=refresh_token', {
        method: 'POST',
        headers: { 'apikey': AKEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: session.refresh_token })
      })
      if (r.ok) {
        const d = await r.json()
        currentTok = d.access_token
        // verificar se é admin
        const pr = await sb.from('perfis').select('role,nome,email').eq('id', d.user.id).single()
        if (pr.data) {
          document.getElementById('uName').textContent = pr.data.nome || pr.data.email
          if (pr.data.role === 'admin') {
            isAdmin = true
            document.getElementById('adminBadge').style.display = 'inline'
            document.body.classList.add('is-admin')
          }
        }
      }
    } catch(e) {}
  }
  await loadAulas()
}

// ── CARREGAR AULAS ─────────────────────────────────────────────────
async function loadAulas() {
  const { data, error } = await sb
    .from('formacao_aulas')
    .select('*')
    .order('modulo_ordem', { ascending: true })
    .order('aula_ordem', { ascending: true })

  if (error || !data || !data.length) {
    document.getElementById('modulesList').innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Sem aulas registadas.<br>Adiciona pelo painel admin.</div>'
    return
  }

  allAulas = data

  // Agrupar por módulo
  const modulosMap = {}
  data.forEach(a => {
    const key = a.modulo_ordem
    if (!modulosMap[key]) modulosMap[key] = { ordem: a.modulo_ordem, titulo: a.modulo_titulo, icone: a.modulo_icone, aulas: [] }
    modulosMap[key].aulas.push(a)
  })
  const modulos = Object.values(modulosMap).sort((a,b) => a.ordem - b.ordem)

  // lista plana para navegação
  flatLessons = data

  // meta
  document.getElementById('meta-modulos').textContent = `📚 ${modulos.length} Módulos`
  document.getElementById('meta-aulas').textContent = `🎬 ${data.length} Aulas`

  // render lista
  document.getElementById('modulesList').innerHTML = modulos.map((m, mi) => `
    <div class="module-group ${mi===0?'open':''}" id="mg-${m.ordem}">
      <div class="module-header ${mi===0?'active-module':''}" onclick="toggleModule(${m.ordem}, this)">
        <span class="module-icon">${m.icone||'📚'}</span>
        <span class="module-name">${m.titulo}</span>
        <span class="module-count">${m.aulas.length}</span>
        <span class="chevron">›</span>
      </div>
      <div class="lessons-list">
        ${m.aulas.map(a => `
          <div class="lesson-row" id="lr-${a.id}" onclick="selectLesson('${a.id}')">
            <span class="lesson-type-dot ${a.aula_tipo==='video'?'dot-video':'dot-pdf'}"></span>
            <span class="lesson-name">${a.aula_titulo}</span>
            <button class="edit-aula-btn" onclick="event.stopPropagation();openEdit('${a.id}')" title="Editar">✏</button>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('')
}

function toggleModule(ordem, headerEl) {
  const group = document.getElementById('mg-' + ordem)
  const isOpen = group.classList.contains('open')
  // fechar todos
  document.querySelectorAll('.module-group').forEach(g => g.classList.remove('open'))
  document.querySelectorAll('.module-header').forEach(h => h.classList.remove('active-module'))
  if (!isOpen) {
    group.classList.add('open')
    headerEl.classList.add('active-module')
  }
}

// ── REPRODUZIR AULA ────────────────────────────────────────────────
function selectLesson(id) {
  const aula = allAulas.find(a => a.id === id)
  if (!aula) return

  currentIdx = flatLessons.findIndex(a => a.id === id)

  // marcar activa
  document.querySelectorAll('.lesson-row').forEach(r => r.classList.remove('active'))
  document.getElementById('lr-' + id)?.classList.add('active')

  // abrir módulo correspondente
  const group = document.getElementById('mg-' + aula.modulo_ordem)
  if (group && !group.classList.contains('open')) {
    document.querySelectorAll('.module-group').forEach(g => g.classList.remove('open'))
    document.querySelectorAll('.module-header').forEach(h => h.classList.remove('active-module'))
    group.classList.add('open')
    group.querySelector('.module-header')?.classList.add('active-module')
  }

  // info
  document.getElementById('videoTitle').textContent = aula.aula_titulo
  document.getElementById('videoModule').textContent = aula.modulo_titulo
  document.getElementById('videoInfo').style.display = 'flex'

  // nav buttons
  document.getElementById('btnPrev').disabled = currentIdx <= 0
  document.getElementById('btnNext').disabled = currentIdx >= flatLessons.length - 1

  // vídeo
  const wrap = document.getElementById('videoWrap')
  if (aula.aula_tipo === 'video' && aula.youtube_id) {
    const ytId = extractYoutubeId(aula.youtube_id)
    if (ytId) {
      // embed sem controlos de partilha, sem mostrar título, sem sugestões
      wrap.innerHTML = `<iframe
        src="https://www.youtube-nocookie.com/embed/${ytId}?rel=0&modestbranding=1&showinfo=0&iv_load_policy=3&disablekb=0&fs=1&color=white&playsinline=1"
        allowfullscreen
        allow="autoplay; encrypted-media"
        style="position:absolute;inset:0;width:100%;height:100%;border:none"
      ></iframe>`
    } else {
      showPlaceholder('ID do YouTube inválido')
    }
  } else if (aula.aula_tipo === 'pdf') {
    showPlaceholder('📄 ' + aula.aula_titulo + '\n(Sem ficheiro associado ainda)')
  } else {
    showPlaceholder('Sem vídeo associado ainda.\n' + (isAdmin ? 'Clica em ✏ para adicionar.' : 'Em breve.'))
  }
}

function showPlaceholder(msg) {
  document.getElementById('videoWrap').innerHTML = `
    <div class="video-placeholder">
      <div class="big-icon">🎬</div>
      <p>${msg.replace('\n','<br>')}</p>
    </div>`
}

function navLesson(dir) {
  const next = flatLessons[currentIdx + dir]
  if (next) selectLesson(next.id)
}

// ── EXTRAIR ID YOUTUBE ─────────────────────────────────────────────
function extractYoutubeId(input) {
  if (!input) return null
  input = input.trim()
  // já é só o ID (11 chars)
  if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input
  // https://youtu.be/XXXXXXXXXXX
  const m1 = input.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/)
  if (m1) return m1[1]
  // https://www.youtube.com/watch?v=XXXXXXXXXXX
  const m2 = input.match(/[?&]v=([a-zA-Z0-9_-]{11})/)
  if (m2) return m2[1]
  // https://www.youtube.com/embed/XXXXXXXXXXX
  const m3 = input.match(/embed\/([a-zA-Z0-9_-]{11})/)
  if (m3) return m3[1]
  return null
}

// ── EDIÇÃO (só admin) ──────────────────────────────────────────────
function openEdit(id) {
  if (!isAdmin) return
  const aula = allAulas.find(a => a.id === id)
  if (!aula) return
  document.getElementById('editId').value = id
  document.getElementById('editTitulo').value = aula.aula_titulo
  document.getElementById('editTipo').value = aula.aula_tipo || 'video'
  document.getElementById('editYoutubeUrl').value = aula.youtube_id || ''
  toggleEditTipo()
  previewYoutube()
  document.getElementById('editOverlay').classList.add('open')
}

function closeEdit() {
  document.getElementById('editOverlay').classList.remove('open')
  document.getElementById('ytPreviewWrap').style.display = 'none'
}

function toggleEditTipo() {
  const tipo = document.getElementById('editTipo').value
  document.getElementById('editVideoFields').style.display = tipo === 'video' ? 'block' : 'none'
}

function previewYoutube() {
  const val = document.getElementById('editYoutubeUrl').value
  const ytId = extractYoutubeId(val)
  const wrap = document.getElementById('ytPreviewWrap')
  const frame = document.getElementById('ytPreviewFrame')
  if (ytId) {
    frame.src = `https://www.youtube-nocookie.com/embed/${ytId}?autoplay=0`
    wrap.style.display = 'block'
  } else {
    wrap.style.display = 'none'
    frame.src = ''
  }
}

async function saveEdit() {
  const id = document.getElementById('editId').value
  const titulo = document.getElementById('editTitulo').value.trim()
  const tipo = document.getElementById('editTipo').value
  const urlRaw = document.getElementById('editYoutubeUrl').value.trim()
  const ytId = tipo === 'video' ? (extractYoutubeId(urlRaw) || urlRaw || null) : null

  if (!titulo) { toast('O título é obrigatório', 'err'); return }
  if (tipo === 'video' && urlRaw && !extractYoutubeId(urlRaw)) {
    toast('Link do YouTube inválido', 'err'); return
  }

  const { error } = await sb.from('formacao_aulas')
    .update({ aula_titulo: titulo, aula_tipo: tipo, youtube_id: ytId, updated_at: new Date().toISOString() })
    .eq('id', id)

  if (error) { toast('Erro ao guardar: ' + error.message, 'err'); return }

  toast('✓ Aula actualizada!', 'ok')
  closeEdit()

  // actualizar localmente sem recarregar tudo
  const idx = allAulas.findIndex(a => a.id === id)
  if (idx >= 0) {
    allAulas[idx].aula_titulo = titulo
    allAulas[idx].aula_tipo = tipo
    allAulas[idx].youtube_id = ytId
  }
  // actualizar nome na lista
  const lr = document.getElementById('lr-' + id)
  if (lr) {
    lr.querySelector('.lesson-name').textContent = titulo
    lr.querySelector('.lesson-type-dot').className = 'lesson-type-dot ' + (tipo === 'video' ? 'dot-video' : 'dot-pdf')
  }
  // se estava a ver esta aula, actualizar vídeo
  if (flatLessons[currentIdx]?.id === id) selectLesson(id)
}

// ── NOTIFICAÇÃO ────────────────────────────────────────────────────
function toast(msg, type='') {
  const el = document.getElementById('notif')
  el.textContent = msg; el.className = 'notif ' + type
  setTimeout(() => el.classList.add('show'), 10)
  setTimeout(() => el.classList.remove('show'), 3000)
}

// fechar modal ao clicar fora
document.getElementById('editOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('editOverlay')) closeEdit()
})

init()
</script>
</body>
</html>
