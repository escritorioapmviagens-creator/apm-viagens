*{box-sizing:border-box;margin:0;padding:0}
:root{--coral:#E8395A;--blue:#3B5BDB;--navy:#1A1D2E;--bg:#F5F6FA;--surface:#fff;--muted:#8B92A5;--border:rgba(0,0,0,0.07);--radius:14px;--radius-sm:10px;--shadow:0 2px 12px rgba(0,0,0,0.07);--shadow-md:0 6px 24px rgba(0,0,0,0.10)}

.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex}
.tab-btn{padding:15px 22px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:transparent;cursor:pointer;font-family:'Inter';border-bottom:3px solid transparent;margin-bottom:-1px;transition:.15s;display:flex;align-items:center;gap:7px}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-btn:hover:not(.active){color:var(--navy)}
.tab-badge{background:var(--bg);color:var(--muted);border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700}
.tab-btn.active .tab-badge{background:#EEF2FF;color:var(--blue)}
.container{max-width:1180px;margin:0 auto;padding:28px 20px 80px}

.dest-body{padding:14px 16px 16px}
.dest-name{font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;margin-bottom:2px}
.dest-loc{font-size:12px;color:var(--muted);margin-bottom:10px}
.dest-foot{display:flex;align-items:flex-end;justify-content:space-between}

.sim-item{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px dashed var(--border);font-size:13px}

.sim-item .si-val{color:var(--muted);text-align:right}
.pax-card{background:var(--surface);border-radius:var(--radius-sm);border:1.5px solid var(--border);padding:14px 16px;margin-bottom:10px}
.pax-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--blue);margin-bottom:12px}
.confirm-wrap{text-align:center;padding:36px 20px}
.confirm-icon{width:68px;height:68px;border-radius:50%;background:#E8F5E9;color:#2E7D32;font-size:34px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}

.confirm-detail{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;max-width:400px;margin:0 auto 22px;text-align:left}
.cd-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}

.cd-lbl{color:var(--muted);font-weight:500}
.cd-val{font-weight:600;color:var(--navy)}
.confirm-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:600;box-shadow:var(--shadow-md);z-index:200;transition:transform .3s;display:flex;align-items:center;gap:8px;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#2E7D32}.toast.err{background:var(--coral)}
</style>

let tab='dyn',allProducts=[],state={product:null,isDynamic:true,rooms:[{num:1,code:437,childAges:''}],roomTypes:[],baseLocals:[],dates:[],locals:[],hotels:[],itinMeta:{},flightSegByOpt:{},flights:[],selectedHotel:null,sessionHash:null,availDoc:null,simDoc:null,step:1,paxCount:1,totalPrice:'',depDate:'',hotelNome:'',roomNome:'',boardNome:'',statusSistema:''}

function wrap(body){return `<?xml version="1.0" encoding="UTF-8"?><soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:ns1="http://www3.optitravel.net/optitravel/export/wbs/pkt/" xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:SOAP-ENC="http://schemas.xmlsoap.org/soap/encoding/" soapenv:encodingStyle="http://schemas.xmlsoap.org/soap/encoding/"><soapenv:Header/><soapenv:Body>${body}</soapenv:Body></soapenv:Envelope>`}
async function soapCall(action,body){const res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_ANON}`},body:JSON.stringify({soapAction:action,soapBody:wrap(body)})});if(!res.ok)throw new Error(`Falha (${res.status})`);const data=await res.json();if(data.error)throw new Error(data.error);const xmlStr=(data.xml||'').replace(/^\uFEFF/,'').trim();const doc=new DOMParser().parseFromString(xmlStr,'text/xml');if(doc.querySelector('parsererror'))throw new Error('Resposta inválida');const f=doc.querySelector('faultstring');if(f)throw new Error(f.textContent);return doc}
function txt(el,tag){if(!el)return '';for(let i=0;i<el.children.length;i++){const c=el.children[i],l=c.localName||c.tagName.split(':').pop();if(l===tag)return c.textContent.trim()}const n=el.getElementsByTagName('*');for(let i=0;i<n.length;i++){const l=n[i].localName||n[i].tagName.split(':').pop();if(l===tag)return n[i].textContent.trim()}return ''}
function directChildren(el,tag){if(!el)return [];const o=[];for(let i=0;i<el.children.length;i++){const c=el.children[i],l=c.localName||c.tagName.split(':').pop();if(l===tag)o.push(c)}return o}
function all(el,tag){if(!el)return [];const o=[],n=el.getElementsByTagName('*');for(let i=0;i<n.length;i++){const l=n[i].localName||n[i].tagName.split(':').pop();if(l===tag)o.push(n[i])}return o}

      <div class="sim-row"><span class="lbl">Consultor</span><span class="val" style="color:var(--blue)">👤 ${esc(CONSULTOR.nome)}</span></div>
    </div></div>
    ${servs.length?`<div class="card"><div class="sim-block"><h4>🧾 Serviços incluídos</h4>${servs.map(s=>`<div class="sim-item"><span class="si-lbl">${esc(s.desc||s.type)}</span><span class="si-val">${s.from?fmtDate(s.from)+(s.to?' → '+fmtDate(s.to):''):''}</span></div>`).join('')}</div></div>`:''}
    ${polHtml}${warnHtml}`
  document.getElementById('foot-price').innerHTML=`<small>Total</small>${price?money(price):''}`;document.getElementById('foot-price').style.display=price?'block':'none'
  document.getElementById('foot-next').textContent='Dados dos passageiros →';document.getElementById('foot-next').style.visibility='visible';document.getElementById('foot-next').onclick=flowNext
}
function renderStepPax(){
  const paxList=state.simDoc?all(state.simDoc,'DynResPax'):[]
  let list=paxList.length?paxList.map(p=>({room:txt(p,'Room')||'DBL1',type:txt(p,'Type')||'ADT',roomNum:txt(p,'RoomNumber')||'1'})):state.rooms.flatMap(r=>[{room:`DBL${r.num}`,type:'ADT',roomNum:String(r.num)},{room:`DBL${r.num}`,type:'ADT',roomNum:String(r.num)}])
  state.paxCount=list.length
  document.getElementById('flow-content').innerHTML=`
    <div class="step-head"><h2>Passageiros</h2><p>Preencha os dados de cada viajante.</p></div>
    ${list.map((p,i)=>`<div class="pax-card"><div class="pax-head">Passageiro ${i+1} · ${p.type==='ADT'?'Adulto':'Criança'} · Quarto ${p.roomNum}</div><div class="field-row" style="margin-bottom:0"><div class="fld"><label>Tratamento</label><select id="px-t-${i}"><option>MR</option><option>MRS</option><option>MISS</option><option>CHD</option></select></div><div class="fld"><label>Nome próprio</label><input type="text" id="px-n-${i}" placeholder="Maria"></div><div class="fld"><label>Apelido</label><input type="text" id="px-s-${i}" placeholder="Silva"></div><div class="fld"><label>Data de nasc.</label><input type="date" id="px-d-${i}"></div></div><input type="hidden" id="px-rn-${i}" value="${p.roomNum}"><input type="hidden" id="px-rm-${i}" value="${p.room}"></div>`).join('')}
    <div class="card" style="margin-top:4px"><div class="field-row" style="margin-bottom:0"><div class="fld"><label>Referência (opc.)</label><input type="text" id="f-ref" placeholder="Nome ou nº do cliente"></div><div class="fld"><label>Observações (opc.)</label><input type="text" id="f-obs" placeholder="Pedidos especiais…"></div></div></div>`
  document.getElementById('foot-next').textContent='✓ Confirmar reserva';document.getElementById('foot-next').style.visibility='visible';document.getElementById('foot-next').onclick=flowNext
}
async function createReservation(){
  let paxXML='';for(let i=0;i<state.paxCount;i++){const t=document.getElementById(`px-t-${i}`)?.value||'MR',n=(document.getElementById(`px-n-${i}`)?.value||'').trim(),s=(document.getElementById(`px-s-${i}`)?.value||'').trim(),d=document.getElementById(`px-d-${i}`)?.value||'1990-01-01',rn=document.getElementById(`px-rn-${i}`)?.value||'1',rm=document.getElementById(`px-rm-${i}`)?.value||'DBL1';if(!n||!s){toast('Preencha nome e apelido de todos os passageiros.','err');return}paxXML+=`<DynPax><RoomNum>${rn}</RoomNum><Title>${t}</Title><Name>${esc(n)}</Name><Surname>${esc(s)}</Surname><DateBirth>${d}</DateBirth><Room>${rm}</Room></DynPax>`}
  const ref=document.getElementById('f-ref')?.value||'',obs=document.getElementById('f-obs')?.value||''
  showLoading('A criar a reserva…');document.getElementById('foot-back').style.visibility='hidden'
  try{
    const doc=await soapCall('DynCreateReserve',`<ns1:DynCreateReserve><DynCreateReserveRequest>${credXML()}<SessionHash xsi:type="xsd:string">${state.sessionHash}</SessionHash><PaxsStruct>${paxXML}</PaxsStruct>${ref?`<ClientRef>${esc(ref)}</ClientRef>`:''}${obs?`<ClientObs>${esc(obs)}</ClientObs>`:''}</DynCreateReserveRequest></ns1:DynCreateReserve>`)
    const localizador=txt(doc,'Reserve'),sysStatus=txt(doc,'SystemStatus')||'OK'
    await guardarNoSupabase(localizador,sysStatus);renderConfirmacao(localizador,sysStatus);toast('🎉 Reserva '+localizador+' criada!','ok')
  }catch(e){showError(e.message);document.getElementById('foot-back').style.visibility='visible'}
}
async function guardarNoSupabase(localizador,status){
  const h=state.selectedHotel!==null?state.hotels[state.selectedHotel]:null
  try{await fetch(REST_RES,{method:'POST',headers:{'apikey':SUPABASE_ANON,'Authorization':`Bearer ${SUPABASE_ANON}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({localizador,consultor_id:CONSULTOR.id||null,consultor_nome:CONSULTOR.nome,produto_codigo:String(state.product.code),produto_nome:state.product.nome,hotel_codigo:h?.code||null,hotel_nome:h?.name||null,data_partida:state.depDate||null,preco_total:parseFloat(state.totalPrice)||null,regime:state.boardNome||null,quarto:state.roomNome||null,estado_sistema:status,pax_count:state.paxCount})})}catch(e){console.warn('Supabase:',e)}
}
function renderConfirmacao(localizador,status){
  const h=state.selectedHotel!==null?state.hotels[state.selectedHotel]:null
  document.getElementById('foot-price').style.display='none';document.getElementById('foot-next').style.display='none';document.getElementById('foot-back').style.visibility='hidden'
  document.querySelectorAll('.st-dot').forEach(d=>d.className='st-dot done')
  document.getElementById('flow-content').innerHTML=`
    <div class="confirm-wrap">
      <div class="confirm-icon">✓</div>
      <div style="font-size:13px;color:var(--muted);font-weight:600;margin-bottom:4px">Reserva criada com sucesso</div>
      <div class="confirm-num">${esc(localizador)}</div>
      <div class="confirm-lbl">Localizador Soltropico · ${esc(state.product.nome)}</div>
      <div class="confirm-detail">
        ${h?`<div class="cd-row"><span class="cd-lbl">Hotel</span><span class="cd-val">${esc(h.name)}</span></div>`:''}
        ${state.roomNome?`<div class="cd-row"><span class="cd-lbl">Quarto</span><span class="cd-val">${esc(state.roomNome)}</span></div>`:''}
        ${state.boardNome?`<div class="cd-row"><span class="cd-lbl">Regime</span><span class="cd-val">${esc(state.boardNome)}</span></div>`:''}
        ${state.depDate?`<div class="cd-row"><span class="cd-lbl">Partida</span><span class="cd-val">${fmtDate(state.depDate)}</span></div>`:''}
        ${state.totalPrice?`<div class="cd-row"><span class="cd-lbl">Total</span><span class="cd-val" style="color:var(--coral)">${money(state.totalPrice)}</span></div>`:''}
        <div class="cd-row"><span class="cd-lbl">Estado</span><span class="cd-val">${status==='OK'?'✓ Confirmada':'⏳ A aguardar confirmação'}</span></div>
        <div class="cd-row" style="background:#EEF2FF;border-radius:8px;margin:8px -4px -4px;padding:10px 8px">
          <span class="cd-lbl">Consultor</span>
          <span class="cd-val" style="color:var(--blue)">👤 ${esc(CONSULTOR.nome)}</span>
        </div>
      </div>
      <div class="confirm-actions">
        <button class="btn btn-ghost" onclick="closeFlow()">Fechar</button>
        <button class="btn btn-primary" onclick="closeFlow()">Nova pesquisa</button>
      </div>
    </div>`
}
function flowNext(){const s=state.step,d=state.isDynamic;if(s===1)return searchAvailability();if(s===2)return d?runSimulation():goToPax();if(s===3&&d){goToPax();return}if((s===3&&!d)||(s===4&&d))return createReservation()}
function goToPax(){const n=state.isDynamic?4:3;setFlowStep(n);renderStepPax()}
function flowBack(){const s=state.step,d=state.isDynamic;if(s===2){setFlowStep(1);renderStep1()}else if(s===3&&d){setFlowStep(2);renderStep2()}else if(s===3&&!d){setFlowStep(2);renderStep2()}else if(s===4){setFlowStep(3);renderStep3(state.simDoc)}}
init()
</script>
</body>
</html>
