<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultor · APM Viagens</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#E8395A;--coral-deep:#C92B49;--coral-light:#FFF0F3;
  --navy:#1A1D2E;--navy-soft:#3a3f56;
  --gold:#c9a84c;--gold-light:#fdf8ec;
  --text:#15161f;--muted:#6b7280;--faint:#9aa0ae;--border:#ECEAE5;
  --green:#2E9E5B;
  --font:'Inter',sans-serif;--display:'Fraunces',serif;
  --shadow-sm:0 1px 3px rgba(20,20,30,.06);
  --shadow-md:0 8px 28px rgba(20,20,30,.09);
}
body{background:#fff;color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{max-width:100%}

/* LOADING / ERROR */
.center-msg{max-width:420px;margin:90px auto;text-align:center;padding:0 20px;color:var(--muted)}
.center-msg .ico{font-size:2.2rem;margin-bottom:14px}

/* ===== COVER ===== */
.cover{
  position:relative;height:320px;overflow:hidden;
  background:
    radial-gradient(ellipse 120% 90% at 18% 0%, #2b3a6b 0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 85% 10%, #c9577a 0%, transparent 50%),
    linear-gradient(165deg,#171a2c 0%,#2a2f4d 45%,#5b3a52 100%);
}
.cover svg{position:absolute;bottom:-2px;left:0;width:100%;height:auto;opacity:.5}
.cover-route{position:absolute;inset:0}

/* ===== PROFILE HEAD ===== */
.profile-head{max-width:1040px;margin:0 auto;padding:0 40px;position:relative}
.avatar-wrap{margin-top:-72px;position:relative;z-index:3;display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap}
.avatar{width:144px;height:144px;border-radius:50%;border:6px solid #fff;object-fit:cover;background:#fff;box-shadow:var(--shadow-md);flex-shrink:0}
.avatar-fallback{width:144px;height:144px;border-radius:50%;border:6px solid #fff;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:600;font-size:2.9rem;box-shadow:var(--shadow-md);flex-shrink:0}

.head-actions{display:flex;gap:10px;margin-left:auto;padding-bottom:6px}

.name-row{margin-top:18px}
.name-row h1{font-family:var(--display);font-weight:600;font-size:2rem;letter-spacing:-.01em;line-height:1.1;color:var(--navy)}
.role-line{display:flex;align-items:center;gap:8px;margin-top:6px;color:var(--muted);font-size:.92rem}
.role-line .dot{width:4px;height:4px;border-radius:50%;background:var(--faint)}
.verified{display:inline-flex;align-items:center;gap:4px;color:var(--coral);font-weight:600}

.bio{margin-top:16px;color:#3d4150;font-size:1rem;line-height:1.65;max-width:540px}

/* social proof strip */
.proof-strip{display:flex;gap:22px;margin-top:18px;flex-wrap:wrap}
.proof-item{display:flex;align-items:baseline;gap:6px}
.proof-item .n{font-family:var(--display);font-weight:600;font-size:1.15rem;color:var(--navy)}
.proof-item .l{font-size:.8rem;color:var(--muted)}
.proof-stars{color:var(--gold);letter-spacing:1px;font-size:.95rem}

/* ===== CTA BAR ===== */
.cta-bar{display:flex;gap:10px;margin-top:22px;padding-bottom:26px;border-bottom:1px solid var(--border)}
.btn{padding:13px 22px;border-radius:10px;font-weight:600;font-size:.9rem;cursor:pointer;border:none;transition:transform .15s,box-shadow .15s;display:inline-flex;align-items:center;gap:8px;font-family:var(--font)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--coral);color:#fff;box-shadow:0 6px 16px rgba(232,57,90,.28)}
.btn-primary:hover{background:var(--coral-deep)}
.btn-outline{background:#fff;color:var(--navy);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--navy)}
.btn-follow{background:var(--navy);color:#fff;height:46px;white-space:nowrap}
.btn-follow:hover{background:#272b42}

/* RECRUITMENT BANNER */
.recrut-banner{display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--coral-light);border:1px solid #ffd9e0;border-radius:14px;padding:16px 20px;margin:24px 0 28px;flex-wrap:wrap}
.recrut-text{display:flex;flex-direction:column;gap:2px}
.recrut-text strong{font-size:.92rem;color:var(--navy)}
.recrut-text span{font-size:.82rem;color:var(--muted)}
.btn-outline-navy{background:#fff;color:var(--navy);border:1.5px solid var(--navy);white-space:nowrap}
.btn-outline-navy:hover{background:var(--navy);color:#fff}

/* MODAL SUBSCRIÇÃO */
.modal-overlay{position:fixed;inset:0;background:rgba(20,20,30,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:18px;padding:32px 28px;max-width:380px;width:100%;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;font-size:1.1rem;color:var(--faint);cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--coral-light);color:var(--coral)}
.modal-icon{font-size:2.2rem;text-align:center;margin-bottom:10px}
.modal-box h3{font-family:var(--display);font-weight:600;font-size:1.25rem;text-align:center;color:var(--navy);margin-bottom:8px}
.modal-sub{font-size:.85rem;color:var(--muted);text-align:center;line-height:1.55;margin-bottom:22px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:.76rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.modal-field input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.9rem;font-family:var(--font);outline:none;transition:border-color .15s}
.modal-field input:focus{border-color:var(--coral)}
.modal-check{display:flex;align-items:flex-start;gap:9px;font-size:.78rem;color:var(--muted);line-height:1.5;cursor:pointer;margin-bottom:6px}
.modal-check input{margin-top:2px;accent-color:var(--coral);flex-shrink:0}
.modal-err{color:var(--coral);font-size:.78rem;min-height:16px;margin-bottom:4px}
.btn-follow.following{background:#fff;color:var(--navy);border:1.5px solid var(--border)}
.btn-icon{width:46px;height:46px;border-radius:10px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:1.05rem;padding:0;flex-shrink:0;color:var(--navy);transition:border-color .15s,color .15s}
.btn-icon:hover{border-color:var(--coral);color:var(--coral)}

/* ===== SECTIONS ===== */
.wrap{max-width:1040px;margin:0 auto;padding:0 40px 80px}
.section{margin-top:40px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
.section-title{font-family:var(--display);font-weight:600;font-size:1.3rem;color:var(--navy)}
.section-sub{font-size:.82rem;color:var(--faint)}

/* ARTICLES */
.art-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:860px){.art-grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.art-grid{grid-template-columns:1fr}}
.art-card{border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:transform .18s,box-shadow .18s;display:block;background:#fff}
.art-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.art-card .img{height:148px;background:var(--border) center/cover no-repeat;position:relative}
.art-card .img .fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:linear-gradient(135deg,#fdf0ec,#fff)}
.art-card .body{padding:14px 16px}
.art-card .t{font-weight:700;font-size:.92rem;line-height:1.35;margin-bottom:4px;color:var(--navy)}
.art-card .s{font-size:.8rem;color:var(--muted);line-height:1.45}

/* POSTS */
.post-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:860px){.post-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:560px){.post-grid{grid-template-columns:repeat(3,1fr);gap:8px}}
.post-card{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:1/1;background:var(--border);display:block}
.post-card img{width:100%;height:100%;object-fit:cover}
.post-card .badge{position:absolute;top:8px;right:8px;background:rgba(20,20,30,.55);backdrop-filter:blur(6px);color:#fff;font-size:.85rem;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.post-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.25),transparent 40%);opacity:0;transition:opacity .18s}
.post-card:hover::after{opacity:1}

/* TESTIMONIALS */
.test-grid{display:flex;flex-direction:column;gap:14px}
.test-card{background:var(--gold-light);border:1px solid #f0e2bb;border-radius:14px;padding:20px 22px}
.test-stars{color:var(--gold);font-size:1rem;margin-bottom:10px;letter-spacing:2px}
.test-text{font-family:var(--display);font-style:italic;font-weight:500;font-size:1.05rem;color:#5a4a26;line-height:1.55}
.test-name{font-size:.78rem;color:#9c8650;margin-top:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}

.empty-hint{text-align:center;padding:30px 12px;color:var(--faint);font-size:.85rem}

footer{text-align:center;padding:28px 20px;font-size:.76rem;color:var(--faint);border-top:1px solid var(--border);margin-top:20px}

/* STICKY MOBILE CTA */
.sticky-cta{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:14px 24px;box-shadow:0 -6px 24px rgba(20,20,30,.08);z-index:20;display:none}
.sticky-cta.show{display:block}
.sticky-cta-inner{max-width:992px;margin:0 auto}
.sticky-cta .btn{width:100%;justify-content:center}
body.has-sticky{padding-bottom:78px}

@media(max-width:860px){
  .profile-head,.wrap{padding-left:28px;padding-right:28px}
  .cover{height:260px}
}

@media(max-width:560px){
  .profile-head,.wrap{padding-left:18px;padding-right:18px}
  .cover{height:150px}
  .name-row h1{font-size:1.5rem}
  .avatar,.avatar-fallback{width:88px;height:88px;font-size:1.9rem;border-width:4px}
  .avatar-wrap{margin-top:-44px;align-items:flex-start;gap:14px}
  .head-actions{width:100%;margin-left:0;padding-bottom:0;margin-top:10px;order:3}
  .cta-bar{flex-wrap:wrap;margin-top:18px;padding-bottom:20px}
  .cta-bar .btn{flex:1;justify-content:center;min-width:140px}
  .head-actions .btn-follow{width:100%;justify-content:center;font-size:.82rem}
  .recrut-banner{flex-direction:column;align-items:stretch;text-align:center;padding:16px}
  .recrut-banner .btn-outline-navy{justify-content:center}
  .modal-box{padding:26px 22px}
  .bio{font-size:.92rem}
  .section{margin-top:32px}
  .section-title{font-size:1.15rem}
}
</style>
</head>
<body>

<div id="app"></div>

<div class="sticky-cta" id="sticky-cta">
  <div class="sticky-cta-inner">
    <a href="#" id="sticky-cta-link" class="btn btn-primary">✈️ Pedir orçamento</a>
  </div>
</div>

<footer>© 2026 APM Viagens · RNAVT 12286</footer>

<script>
const sb = supabase.createClient(
  'https://uiaorfcgvqwxjezgisps.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpYW9yZmNndnF3eGplemdpc3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTE1MzAsImV4cCI6MjA5MTk4NzUzMH0.2AzDuZHLXsQ9NAK96b26ovu29I5xRh-UzNSNph02YhU'
)

const params = new URLSearchParams(window.location.search)
const consultorId = params.get('c') || params.get('ref')
const app = document.getElementById('app')

const PLATFORM_ICON = {
  instagram: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>',
  facebook: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.5 9.9v-7H7.9V12h2.6V9.8c0-2.6 1.5-4 3.9-4 1.1 0 2.3.2 2.3.2v2.5h-1.3c-1.3 0-1.7.8-1.7 1.6V12h2.9l-.5 2.9h-2.4v7A10 10 0 0 0 22 12"/></svg>',
  tiktok: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 2h-3.2v13.7a2.8 2.8 0 1 1-2-2.7v-3.3a6 6 0 1 0 5.2 6V8.4a7.6 7.6 0 0 0 4.5 1.5V6.7a4.3 4.3 0 0 1-4.5-4.4z"/></svg>',
  youtube: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12s0-3.2-.4-4.7a3 3 0 0 0-2.1-2.1C18 4.8 12 4.8 12 4.8s-6 0-7.5.4A3 3 0 0 0 2.4 7.3C2 8.8 2 12 2 12s0 3.2.4 4.7a3 3 0 0 0 2.1 2.1c1.5.4 7.5.4 7.5.4s6 0 7.5-.4a3 3 0 0 0 2.1-2.1c.4-1.5.4-4.7.4-4.7zM10 15.3V8.7l6 3.3z"/></svg>',
  linkedin: '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zM8.3 18.3V10H5.7v8.3zM7 8.8a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm11.3 9.5v-4.6c0-2.4-1.3-3.6-3-3.6a2.6 2.6 0 0 0-2.4 1.3V10h-2.6c0 .6 0 8.3 0 8.3H13v-4.6c0-.3 0-.5.1-.7a1.4 1.4 0 0 1 1.3-1c.9 0 1.3.7 1.3 1.7v4.6z"/></svg>',
  outro: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.5.5l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7.5-.5l-2 2a5 5 0 0 0 7 7l1-1"/></svg>'
}

function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))
}
function iniciais(nome) {
  return (nome||'?').split(' ').map(n=>n[0]).filter(Boolean).slice(0,2).join('').toUpperCase()
}

// Linha de rota decorativa na capa (estilo mapa) — assinatura visual da página
const COVER_SVG = `<svg class="cover-route" viewBox="0 0 800 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M-20,150 C150,80 250,180 400,110 C550,40 650,140 820,70" stroke="rgba(255,255,255,.35)" stroke-width="1.5" stroke-dasharray="2,8" fill="none" stroke-linecap="round"/>
  <circle cx="-20" cy="150" r="4" fill="rgba(255,255,255,.6)"/>
  <circle cx="400" cy="110" r="4" fill="rgba(255,255,255,.6)"/>
  <circle cx="820" cy="70" r="4" fill="rgba(255,255,255,.6)"/>
</svg>`

async function init() {
  if(!consultorId) {
    app.innerHTML = `<div class="center-msg"><div class="ico">🔍</div><p>Perfil não encontrado. Verifica o link que recebeste.</p></div>`
    return
  }
  app.innerHTML = `<div class="center-msg"><div class="ico">✈️</div><p>A carregar perfil...</p></div>`

  const { data: perfil, error } = await sb.from('perfis').select('*').eq('id', consultorId).maybeSingle()
  if(error || !perfil) {
    app.innerHTML = `<div class="center-msg"><div class="ico">😕</div><p>Não foi possível encontrar este consultor.</p></div>`
    return
  }

  renderPerfil(perfil)
  carregarArtigos(perfil.id, perfil.artigos_destacados)
  carregarPublicacoes(perfil.id)
  if(perfil.mostrar_avaliacoes) carregarTestemunhos(perfil.id)
}

function renderPerfil(p) {
  const codigo = p.codigo_afiliado || p.id
  p.link_orcamento = '../pedir-orcamento.html?c=' + codigo

  const coverHtml = p.foto_capa
    ? `<img src="${p.foto_capa}" alt="" style="width:100%;height:100%;object-fit:cover">`
    : COVER_SVG

  const avatarHtml = p.foto_perfil
    ? `<img class="avatar" src="${p.foto_perfil}" alt="${escapeHtml(p.nome)}">`
    : `<div class="avatar-fallback">${iniciais(p.nome)}</div>`

  const redes = p.redes_sociais || {}
  const redesIcons = Object.entries(redes)
    .filter(([k,v]) => v && v.ativo && v.url)
    .map(([k,v]) => `<a href="${escapeHtml(v.url)}" target="_blank" rel="noopener" class="btn-icon" title="${k}">${PLATFORM_ICON[k]||'🔗'}</a>`)
    .join('')

  let proofHtml = ''
  if(p.mostrar_estatisticas || p.mostrar_avaliacoes) {
    const parts = []
    if(p.mostrar_estatisticas) {
      parts.push(`<div class="proof-item"><span class="n" id="proof-viagens">—</span><span class="l">viagens organizadas</span></div>`)
      parts.push(`<div class="proof-item"><span class="n" id="proof-destinos">—</span><span class="l">destinos</span></div>`)
    }
    if(p.mostrar_avaliacoes) {
      parts.push(`<div class="proof-item"><span class="proof-stars" id="proof-stars">★★★★★</span><span class="l" id="proof-stars-label">avaliações de clientes</span></div>`)
    }
    proofHtml = `<div class="proof-strip">${parts.join('')}</div>`
  }

  app.innerHTML = `
    <div class="cover">${coverHtml}</div>

    <div class="profile-head">
      <div class="avatar-wrap">
        ${avatarHtml}
        <div class="head-actions">
          <button class="btn btn-follow" id="btn-seguir" onclick="abrirModalSubscricao()">📩 Quero receber dicas e promoções</button>
          ${redesIcons}
        </div>
      </div>

      <div class="name-row">
        <h1>${escapeHtml(p.nome||'Consultor APM')}</h1>
        <div class="role-line">
          <span>Consultor Independente</span>
          <span class="dot"></span>
          <span class="verified">✓ APM Viagens</span>
          ${p.anos_experiencia ? `<span class="dot"></span><span>${p.anos_experiencia} anos de experiência</span>` : ''}
        </div>
      </div>

      ${p.bio ? `<div class="bio">${escapeHtml(p.bio)}</div>` : ''}

      ${proofHtml}

      <div class="cta-bar">
        <a href="${escapeHtml(p.link_orcamento)}" class="btn btn-primary">✈️ Pedir orçamento</a>
        ${p.telefone ? `<a href="https://wa.me/351${(p.telefone||'').replace(/\D/g,'')}" target="_blank" rel="noopener" class="btn btn-outline">💬 Posso ajudar?</a>` : ''}
      </div>

      ${p.mostrar_recrutamento ? `
      <div class="recrut-banner">
        <div class="recrut-text">
          <strong>Gostas de viajar e queres começar a ganhar com isso?</strong>
          <span>Junta-te à rede de consultores APM Viagens.</span>
        </div>
        <a href="../consultores/index.html?recrutado_por=${codigo}" target="_blank" rel="noopener" class="btn btn-outline-navy">Quero ser consultor</a>
      </div>` : ''}
    </div>

    <!-- MODAL SUBSCRIÇÃO -->
    <div class="modal-overlay" id="modal-subscricao" onclick="if(event.target===this) fecharModalSubscricao()">
      <div class="modal-box">
        <button class="modal-close" onclick="fecharModalSubscricao()">✕</button>
        <div class="modal-icon">📩</div>
        <h3>Dicas e promoções em primeira mão</h3>
        <p class="modal-sub">Recebe sugestões de destinos, promoções exclusivas e novidades diretamente do(a) ${escapeHtml(p.nome||'consultor')}.</p>

        <div id="sub-form">
          <div class="modal-field">
            <label>Email</label>
            <input type="email" id="sub-email" placeholder="o.seu@email.com">
          </div>
          <div class="modal-field">
            <label>WhatsApp</label>
            <input type="tel" id="sub-whatsapp" placeholder="912 345 678">
          </div>
          <label class="modal-check">
            <input type="checkbox" id="sub-consent">
            <span>Aceito ser adicionado(a) a um grupo de WhatsApp para receber dicas e promoções de viagens.</span>
          </label>
          <div class="modal-err" id="sub-err"></div>
          <button class="btn btn-primary" id="sub-submit" onclick="submeterSubscricao('${p.id}')" style="width:100%;justify-content:center;margin-top:6px">Quero receber</button>
        </div>

        <div id="sub-success" style="display:none">
          <div class="modal-icon">🎉</div>
          <p style="text-align:center;color:var(--navy);font-weight:600">Ficaste inscrito(a)!</p>
          <p style="text-align:center;color:var(--muted);font-size:.85rem">Em breve receberás as primeiras novidades.</p>
        </div>
      </div>
    </div>

    <div class="wrap">
      <div class="section" id="section-artigos" style="display:none">
        <div class="section-head"><div class="section-title">Artigos e destinos</div></div>
        <div class="art-grid" id="artigos-grid"></div>
      </div>

      <div class="section" id="section-publicacoes" style="display:none">
        <div class="section-head"><div class="section-title">Publicações recentes</div></div>
        <div class="post-grid" id="publicacoes-grid"></div>
      </div>

      <div class="section" id="section-testemunhos" style="display:none">
        <div class="section-head"><div class="section-title">O que dizem os clientes</div></div>
        <div class="test-grid" id="testemunhos-list"></div>
      </div>
    </div>
  `

  if(p.mostrar_estatisticas) carregarEstatisticas(p.id)
  if(p.mostrar_avaliacoes) carregarMediaAvaliacoes(p.id)

  // Sticky CTA ao passar a barra principal
  document.getElementById('sticky-cta-link').href = p.link_orcamento
  const stickyEl = document.getElementById('sticky-cta')
  const ctaBar = document.querySelector('.cta-bar')
  window.addEventListener('scroll', () => {
    const triggerY = ctaBar.getBoundingClientRect().bottom + window.scrollY
    if(window.scrollY > triggerY) {
      stickyEl.classList.add('show'); document.body.classList.add('has-sticky')
    } else {
      stickyEl.classList.remove('show'); document.body.classList.remove('has-sticky')
    }
  })
}

function abrirModalSubscricao() {
  document.getElementById('modal-subscricao').classList.add('show')
  document.getElementById('sub-form').style.display = 'block'
  document.getElementById('sub-success').style.display = 'none'
  document.getElementById('sub-err').textContent = ''
}
function fecharModalSubscricao() {
  document.getElementById('modal-subscricao').classList.remove('show')
}

async function submeterSubscricao(consultorId) {
  const email = document.getElementById('sub-email').value.trim()
  const whatsapp = document.getElementById('sub-whatsapp').value.trim()
  const consent = document.getElementById('sub-consent').checked
  const errEl = document.getElementById('sub-err')
  errEl.textContent = ''

  if(!email && !whatsapp) { errEl.textContent = 'Indica pelo menos um contacto.'; return }
  if(!consent) { errEl.textContent = 'É necessário aceitar para continuar.'; return }

  const btn = document.getElementById('sub-submit')
  btn.disabled = true; btn.textContent = 'A enviar...'

  const { error } = await sb.from('subscritores_perfil').insert({
    consultor_id: consultorId,
    email: email || null,
    whatsapp: whatsapp || null,
    aceitou_grupo_whatsapp: consent
  })

  btn.disabled = false; btn.textContent = 'Quero receber'

  if(error) { errEl.textContent = 'Não foi possível concluir. Tenta novamente.'; return }

  document.getElementById('sub-form').style.display = 'none'
  document.getElementById('sub-success').style.display = 'block'
}

async function carregarArtigos(consultorId, artigosDestacados) {
  let query = sb.from('artigos_consultores')
    .select('id,titulo,subtitulo,hero_img')
    .eq('consultor_id', consultorId).eq('publicado', true)

  if(artigosDestacados && artigosDestacados.length) {
    query = query.in('id', artigosDestacados)
  } else {
    query = query.order('atualizado_em', {ascending:false}).limit(6)
  }

  const { data } = await query
  if(!data || !data.length) return

  // Se há seleção manual, respeitar a ordem escolhida pelo consultor
  let ordenados = data
  if(artigosDestacados && artigosDestacados.length) {
    ordenados = artigosDestacados.map(id => data.find(a => a.id === id)).filter(Boolean)
  }

  document.getElementById('section-artigos').style.display = 'block'
  document.getElementById('artigos-grid').innerHTML = ordenados.map(a => `
    <a class="art-card" href="../blog-artigo.html?id=${a.id}&ref=${consultorId}" target="_blank" rel="noopener">
      <div class="img" style="${a.hero_img ? `background-image:url('${a.hero_img}')` : ''}">
        ${!a.hero_img ? `<div class="fallback">✈️</div>` : ''}
      </div>
      <div class="body">
        <div class="t">${escapeHtml(a.titulo)}</div>
        ${a.subtitulo ? `<div class="s">${escapeHtml(a.subtitulo)}</div>` : ''}
      </div>
    </a>
  `).join('')
}

async function carregarPublicacoes(consultorId) {
  const { data } = await sb.from('publicacoes_perfil')
    .select('*').eq('consultor_id', consultorId).eq('ativo', true)
    .order('criado_em', {ascending:false}).limit(9)

  if(!data || !data.length) return
  document.getElementById('section-publicacoes').style.display = 'block'
  document.getElementById('publicacoes-grid').innerHTML = data.map(post => `
    <a class="post-card" href="${escapeHtml(post.url)}" target="_blank" rel="noopener">
      <img src="${post.imagem_url}" alt="Publicação">
      <div class="badge">${PLATFORM_ICON[post.plataforma]||'🔗'}</div>
    </a>
  `).join('')
}

async function carregarEstatisticas(consultorId) {
  try {
    const { data: reservas } = await sb.from('reservas')
      .select('destino').eq('consultor_id', consultorId).neq('estado', 'Cancelada')
    if(reservas) {
      document.getElementById('proof-viagens').textContent = reservas.length
      document.getElementById('proof-destinos').textContent =
        new Set(reservas.map(r => (r.destino||'').trim().toLowerCase()).filter(Boolean)).size
    }
  } catch(e) {}
}

async function carregarMediaAvaliacoes(consultorId) {
  try {
    const { data } = await sb.from('avaliacoes').select('geral').eq('consultor_id', consultorId).not('geral','is',null)
    if(data && data.length) {
      const media = data.reduce((s,a)=>s+a.geral,0) / data.length
      const arred = Math.round(media)
      document.getElementById('proof-stars').textContent = '★'.repeat(arred) + '☆'.repeat(5-arred)
      document.getElementById('proof-stars-label').textContent = media.toFixed(1) + ' · ' + data.length + ' avaliações'
    } else {
      document.getElementById('proof-stars').parentElement.style.display = 'none'
    }
  } catch(e) {}
}

async function carregarTestemunhos(consultorId) {
  const { data } = await sb.from('avaliacoes')
    .select('geral,positivo,destino,created_at')
    .eq('consultor_id', consultorId).gte('geral', 4).not('positivo','is',null)
    .order('created_at', {ascending:false}).limit(5)

  if(!data || !data.length) return
  document.getElementById('section-testemunhos').style.display = 'block'
  document.getElementById('testemunhos-list').innerHTML = data.map(t => `
    <div class="test-card">
      <div class="test-stars">${'★'.repeat(t.geral||5)}${'☆'.repeat(5-(t.geral||5))}</div>
      <div class="test-text">"${escapeHtml(t.positivo)}"</div>
      ${t.destino ? `<div class="test-name">Viagem a ${escapeHtml(t.destino)}</div>` : ''}
    </div>
  `).join('')
}

init()
</script>
</body>
</html>
