<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultor · APM Viagens</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#E8395A;--coral-light:#FFF0F3;
  --blue:#3B5BDB;--blue-light:#EEF2FF;
  --text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;
  --bg:#f8f7f4;--surface:#fff;
  --gold:#c9a84c;--gold-light:#fdf8ec;
  --green:#2E9E5B;
  --font:'Inter',sans-serif;--heading:'Poppins',sans-serif;
  --radius:16px;--shadow:0 2px 14px rgba(0,0,0,.06);
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:14px 20px;text-align:center}
.topbar img{height:32px}

/* LOADING / ERROR */
.center-msg{max-width:420px;margin:80px auto;text-align:center;padding:0 20px;color:var(--muted)}
.center-msg .ico{font-size:2.4rem;margin-bottom:12px}

/* HERO */
.hero{background:linear-gradient(160deg,#1A1D2E 0%,#2a2f47 100%);padding:48px 20px 90px;text-align:center;position:relative}
.hero-avatar{width:108px;height:108px;border-radius:50%;border:4px solid #fff;object-fit:cover;background:#fff;box-shadow:0 6px 24px rgba(0,0,0,.25);margin-bottom:16px}
.hero-avatar-fallback{width:108px;height:108px;border-radius:50%;border:4px solid #fff;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--heading);font-weight:800;font-size:2.2rem;margin:0 auto 16px;box-shadow:0 6px 24px rgba(0,0,0,.25)}
.hero h1{font-family:var(--heading);color:#fff;font-size:1.6rem;font-weight:700;margin-bottom:4px}
.hero .role{color:#FF8FA3;font-size:.85rem;font-weight:600;letter-spacing:.02em}
.hero .bio{color:#cbd0e0;font-size:.875rem;max-width:420px;margin:14px auto 0;line-height:1.7}

/* CARD WRAP (overlaps hero) */
.wrap{max-width:640px;margin:0 auto;padding:0 16px 60px}
.float-card{background:#fff;border-radius:var(--radius);box-shadow:0 10px 32px rgba(0,0,0,.1);margin-top:-56px;padding:20px;position:relative;z-index:2}

/* STATS (optional) */
.stats-row{display:flex;gap:10px;margin-bottom:6px}
.stat{flex:1;text-align:center;padding:12px 8px;background:var(--bg);border-radius:12px}
.stat .v{font-family:var(--heading);font-weight:800;font-size:1.3rem;color:var(--coral)}
.stat .l{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-top:2px}

/* CTA */
.cta-row{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:13px;border-radius:11px;font-family:var(--heading);font-weight:600;font-size:.875rem;text-align:center;cursor:pointer;border:none;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn-coral{background:var(--coral);color:#fff;box-shadow:0 4px 14px rgba(232,57,90,.28)}
.btn-outline{background:#fff;color:var(--text);border:1.5px solid var(--border)}

/* SECTION */
.section{margin-top:28px}
.section-title{font-family:var(--heading);font-size:1.05rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ARTICLES GRID */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.cards-grid{grid-template-columns:1fr}}
.art-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .15s;display:block}
.art-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.art-card img{width:100%;height:140px;object-fit:cover;display:block;background:var(--border)}
.art-card .body{padding:12px 14px}
.art-card .t{font-size:.875rem;font-weight:700;line-height:1.35;margin-bottom:4px}
.art-card .s{font-size:.76rem;color:var(--muted);line-height:1.4}

/* POSTS GRID (social) */
.post-card{position:relative;border-radius:14px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;aspect-ratio:1/1;background:var(--border)}
.post-card img{width:100%;height:100%;object-fit:cover;display:block}
.post-card .badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;font-size:.95rem;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}

/* TESTIMONIALS (optional) */
.test-card{background:#fff;border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:10px}
.test-stars{color:var(--gold);font-size:.95rem;margin-bottom:6px;letter-spacing:1px}
.test-text{font-size:.85rem;color:var(--text);line-height:1.6;font-style:italic}
.test-name{font-size:.75rem;color:var(--muted);margin-top:8px;font-weight:600}

.empty{text-align:center;padding:30px 12px;color:var(--muted);font-size:.85rem;background:#fff;border-radius:14px}

/* STICKY CTA */
.sticky-cta{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:12px 16px;box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:20;display:none}
.sticky-cta.show{display:block}
.sticky-cta .btn{max-width:640px;margin:0 auto;display:block}
body.has-sticky{padding-bottom:76px}

footer{text-align:center;padding:24px 20px;font-size:.72rem;color:var(--muted)}
</style>
</head>
<body>

<div class="topbar">
  <img src="https://ezycourse.b-cdn.net/3064/cmbzo7qfw08hhth9nfjwpb7sw.png" alt="APM Viagens">
</div>

<div id="app"></div>

<div class="sticky-cta" id="sticky-cta">
  <a href="#" id="sticky-cta-link" class="btn btn-coral">✈️ Pedir orçamento</a>
</div>

<footer>© 2026 APM Viagens · RNAVT 12286</footer>

<script>
const sb = supabase.createClient(
  'https://uiaorfcgvqwxjezgisps.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpYW9yZmNndnF3eGplemdpc3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTE1MzAsImV4cCI6MjA5MTk4NzUzMH0.2AzDuZHLXsQ9NAK96b26ovu29I5xRh-UzNSNph02YhU'
)

const params = new URLSearchParams(window.location.search)
const consultorId = params.get('c') || params.get('ref')
const app = document.getElementById('app')

const PLATFORM_ICON = { instagram:'📷', facebook:'📘', tiktok:'🎵', youtube:'▶️', linkedin:'💼', outro:'🔗' }

function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))
}

function iniciais(nome) {
  return (nome||'?').split(' ').map(n=>n[0]).filter(Boolean).slice(0,2).join('').toUpperCase()
}

async function init() {
  if(!consultorId) {
    app.innerHTML = `<div class="center-msg"><div class="ico">🔍</div><p>Perfil não encontrado. Verifica o link que recebeste.</p></div>`
    return
  }

  app.innerHTML = `<div class="center-msg"><div class="ico">✈️</div><p>A carregar perfil...</p></div>`

  const { data: perfil, error } = await sb.from('perfis').select('*').eq('id', consultorId).maybeSingle()

  if(error || !perfil) {
    app.innerHTML = `<div class="center-msg"><div class="ico">😕</div><p>Não foi possível encontrar este consultor.</p></div>`
    return
  }

  renderPerfil(perfil)
  carregarArtigos(perfil.id)
  carregarPublicacoes(perfil.id)
  if(perfil.mostrar_avaliacoes) carregarTestemunhos(perfil.id)
}

function renderPerfil(p) {
  const codigo = p.codigo_afiliado || p.id
  p.link_orcamento = 'pedir-orcamento.html?c=' + codigo

  const avatarHtml = p.foto_perfil
    ? `<img class="hero-avatar" src="${p.foto_perfil}" alt="${escapeHtml(p.nome)}">`
    : `<div class="hero-avatar-fallback">${iniciais(p.nome)}</div>`

  const redes = p.redes_sociais || {}
  const redesLinks = Object.entries(redes)
    .filter(([k,v]) => v && v.ativo && v.url)
    .map(([k,v]) => `<a href="${escapeHtml(v.url)}" target="_blank" rel="noopener" class="btn btn-outline" style="flex:0 0 auto;padding:13px 18px">${PLATFORM_ICON[k]||'🔗'}</a>`)
    .join('')

  let statsHtml = ''
  if(p.mostrar_estatisticas) {
    statsHtml = `
    <div class="stats-row" id="stats-row">
      <div class="stat"><div class="v" id="stat-viagens">—</div><div class="l">Viagens vendidas</div></div>
      <div class="stat"><div class="v" id="stat-destinos">—</div><div class="l">Destinos</div></div>
      <div class="stat"><div class="v" id="stat-anos">${p.anos_experiencia||'—'}</div><div class="l">Anos exp.</div></div>
    </div>`
  }

  app.innerHTML = `
    <div class="hero">
      ${avatarHtml}
      <h1>${escapeHtml(p.nome||'Consultor APM')}</h1>
      <div class="role">Consultor de Viagens · APM Viagens</div>
      ${p.bio ? `<div class="bio">${escapeHtml(p.bio)}</div>` : ''}
    </div>

    <div class="wrap">
      <div class="float-card">
        ${statsHtml}
        <div class="cta-row">
          <a href="${escapeHtml(p.link_orcamento)}" class="btn btn-coral">✈️ Pedir orçamento</a>
        </div>
        <div class="cta-row" style="margin-top:8px">
          ${p.telefone ? `<a href="https://wa.me/351${(p.telefone||'').replace(/\D/g,'')}" target="_blank" rel="noopener" class="btn btn-outline">💬 WhatsApp</a>` : ''}
          ${redesLinks}
        </div>
      </div>

      <div class="section" id="section-artigos" style="display:none">
        <div class="section-title">📰 Artigos e destinos</div>
        <div class="cards-grid" id="artigos-grid"></div>
      </div>

      <div class="section" id="section-publicacoes" style="display:none">
        <div class="section-title">📸 Publicações recentes</div>
        <div class="cards-grid" id="publicacoes-grid"></div>
      </div>

      <div class="section" id="section-testemunhos" style="display:none">
        <div class="section-title">⭐ O que dizem os clientes</div>
        <div id="testemunhos-list"></div>
      </div>
    </div>
  `

  if(p.mostrar_estatisticas) carregarEstatisticas(p.id)

  // Sticky CTA: aparece depois de passar o cartão principal
  document.getElementById('sticky-cta-link').href = p.link_orcamento
  const stickyEl = document.getElementById('sticky-cta')
  const floatCard = document.querySelector('.float-card')
  window.addEventListener('scroll', () => {
    const triggerY = floatCard.getBoundingClientRect().bottom + window.scrollY
    if(window.scrollY > triggerY) {
      stickyEl.classList.add('show')
      document.body.classList.add('has-sticky')
    } else {
      stickyEl.classList.remove('show')
      document.body.classList.remove('has-sticky')
    }
  })
}

async function carregarArtigos(consultorId) {
  const { data } = await sb.from('artigos_consultores')
    .select('id,titulo,subtitulo,hero_img,categoria')
    .eq('consultor_id', consultorId)
    .eq('publicado', true)
    .order('atualizado_em', {ascending:false})
    .limit(6)

  const section = document.getElementById('section-artigos')
  const grid = document.getElementById('artigos-grid')
  if(!data || !data.length) return // mantém secção escondida

  section.style.display = 'block'
  grid.innerHTML = data.map(a => `
    <a class="art-card" href="blog-artigo.html?id=${a.id}&ref=${consultorId}" target="_blank" rel="noopener">
      ${a.hero_img ? `<img src="${a.hero_img}" alt="${escapeHtml(a.titulo)}">` : `<div style="height:140px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:2rem">✈️</div>`}
      <div class="body">
        <div class="t">${escapeHtml(a.titulo)}</div>
        ${a.subtitulo ? `<div class="s">${escapeHtml(a.subtitulo)}</div>` : ''}
      </div>
    </a>
  `).join('')
}

async function carregarPublicacoes(consultorId) {
  const { data } = await sb.from('publicacoes_perfil')
    .select('*')
    .eq('consultor_id', consultorId)
    .eq('ativo', true)
    .order('criado_em', {ascending:false})
    .limit(9)

  const section = document.getElementById('section-publicacoes')
  const grid = document.getElementById('publicacoes-grid')
  if(!data || !data.length) return

  section.style.display = 'block'
  grid.innerHTML = data.map(post => `
    <a class="post-card" href="${escapeHtml(post.url)}" target="_blank" rel="noopener">
      <img src="${post.imagem_url}" alt="Publicação">
      <div class="badge">${PLATFORM_ICON[post.plataforma]||'🔗'}</div>
    </a>
  `).join('')
}

async function carregarEstatisticas(consultorId) {
  try {
    const { data: reservas } = await sb.from('reservas')
      .select('destino')
      .eq('consultor_id', consultorId)
      .neq('estado', 'Cancelada')

    if(reservas) {
      const totalViagens = reservas.length
      const destinosUnicos = new Set(reservas.map(r => (r.destino||'').trim().toLowerCase()).filter(Boolean)).size
      const elV = document.getElementById('stat-viagens')
      const elD = document.getElementById('stat-destinos')
      if(elV) elV.textContent = totalViagens
      if(elD) elD.textContent = destinosUnicos
    }
  } catch(e) { /* silencioso — estatísticas são opcionais */ }
}

async function carregarTestemunhos(consultorId) {
  const { data } = await sb.from('avaliacoes')
    .select('geral,positivo,destino,created_at')
    .eq('consultor_id', consultorId)
    .gte('geral', 4)
    .not('positivo', 'is', null)
    .order('created_at', {ascending:false})
    .limit(5)

  const section = document.getElementById('section-testemunhos')
  const list = document.getElementById('testemunhos-list')
  if(!data || !data.length) return

  section.style.display = 'block'
  list.innerHTML = data.map(t => `
    <div class="test-card">
      <div class="test-stars">${'★'.repeat(t.geral||5)}${'☆'.repeat(5-(t.geral||5))}</div>
      <div class="test-text">"${escapeHtml(t.positivo)}"</div>
      ${t.destino ? `<div class="test-name">Viagem a ${escapeHtml(t.destino)}</div>` : ''}
    </div>
  `).join('')
}

init()
</script>
</body>
</html>
