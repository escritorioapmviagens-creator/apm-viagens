<script>

const params = new URLSearchParams(location.search)

// Converter texto com links [texto](url) em HTML, adicionando ?ref= a links APM
function processarTexto(texto) {
  if (!texto) return ''
  // Converter [texto](url)
  let html = texto.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, linkText, url) => {
    let finalUrl = url
    // Se é link APM, adicionar ref
    if (url.includes('escritorioapmviagens-creator.github.io') || url.includes('blog-artigo.html')) {
      const sep = url.includes('?') ? '&' : '?'
      if (ref) finalUrl = url + sep + 'ref=' + ref
    }
    return `<a href="${finalUrl}" target="_blank" rel="noopener">${linkText}</a>`
  })
  // Parágrafos: quebras duplas
  html = html.split(/\n\n+/).map(p => p.trim() ? `<p>${p.replace(/\n/g,'<br>')}</p>` : '').join('')
  return html || `<p>${texto}</p>`
}

function renderArtigo(a) {
  const orcUrl = BLOG_BASE + 'pedir-orcamento.html' + refStr

  // Secções dinâmicas — suporta tipo texto e tipo cards
  function renderSecao(s) {
    if(!s.titulo && !s.texto && !s.cards?.length) return ''

    if(s.tipo === 'cards' && s.cards?.length) {
      const cardsHtml = s.cards.map(c => {
        const cardUrl = BLOG_BASE + 'blog-artigo.html?id=' + c.id + (ref ? '&ref=' + ref : '')
        return `<a class="article-card" href="${cardUrl}">
          ${c.img ? `<img src="${c.img}" alt="${c.titulo||''}" onerror="this.style.display='none'">` : '<div style="aspect-ratio:16/9;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:2rem">✈</div>'}
          <div class="ac-body">
            <div class="ac-title">${c.titulo}</div>
            ${c.subtitulo ? `<div class="ac-sub">${c.subtitulo}</div>` : ''}
            <span class="ac-btn">Ler artigo →</span>
          </div>
        </a>`
      }).join('')
      return `
      <div class="section-block">
        ${s.titulo ? `<div class="section-title">${s.titulo}</div>` : ''}
        <div class="cards-grid">${cardsHtml}</div>
      </div>`
    }

    // Tipo texto (default)
    if(!s.titulo && !s.texto) return ''
    return `
    <div class="section-block">
      ${s.img ? `<img class="section-img" src="${s.img}" alt="${s.titulo||''}" onerror="this.style.display='none'">` : ''}
      ${s.titulo ? `<div class="section-title">${s.titulo}</div>` : ''}
      <div>${processarTexto(s.texto)}</div>
    </div>`
  }

  const seccoes = a.seccoes?.length
    ? a.seccoes
    : [
        {tipo:'texto', titulo:a.s1_titulo, texto:a.s1_texto, img:a.s1_img},
        {tipo:'texto', titulo:a.s2_titulo, texto:a.s2_texto, img:a.s2_img},
        {tipo:'texto', titulo:a.s3_titulo, texto:a.s3_texto, img:a.s3_img},

  // Suporte a carrossel: hero_imgs (array) ou hero_img (string legacy)
  const heroImgs = a.hero_imgs?.length ? a.hero_imgs
    : a.hero_img ? [a.hero_img]
    : []

  document.getElementById('main-content').innerHTML = `
    <div class="hero" id="hero-carousel">
      <div class="carousel-track" id="carousel-track">
        ${heroImgs.length ? heroImgs.map(u => `<div class="carousel-slide" style="background-image:url('${u}')"></div>`).join('') : `<div class="carousel-slide" style="background:linear-gradient(135deg,#0d0a1a,#1a1035)"></div>`}
      </div>
      ${heroImgs.length > 1 ? `
        <button class="carousel-btn prev" onclick="carouselMove(-1)" aria-label="Anterior">‹</button>
        <button class="carousel-btn next" onclick="carouselMove(1)" aria-label="Seguinte">›</button>
        <div class="carousel-dots" id="carousel-dots">
          ${heroImgs.map((_,i) => `<button class="carousel-dot${i===0?' active':''}" onclick="carouselGo(${i})"></button>`).join('')}
        </div>` : ''}
      <div class="hero-logo">
        <img src="https://ezycourse.b-cdn.net/3064/cmbzo7qfw08hhth9nfjwpb7sw.png" alt="APM Viagens">
      </div>
    </div>
    <div class="hero-content">
      <div class="hero-tag">✈ Destinos</div>
      ${a.regiao ? `<div class="hero-region">${a.regiao}</div>` : ''}
      <div class="hero-title"><em>${a.titulo}</em></div>
      ${a.subtitulo ? `<div class="hero-sub">${a.subtitulo}</div>` : ''}
      <div class="hero-meta">
        <span class="author-badge"><span class="author-avatar">${(a.consultor_nome||'A').charAt(0).toUpperCase()}</span>Artigo de: ${a.consultor_nome?.split(' ')[0] || a.consultor_nome}</span>
          <span>·</span><span>5 min de leitura</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="article-body">
      ${seccoes.map(s => renderSecao(s)).join('')}
    </div>

    <div class="divider"></div>

    ${a.categoria !== 'recrutamento' ? `

        <a href="${'https://escritorioapmviagens-creator.github.io/apm-viagens/consultores/index.html' + (ref ? '?ref=' + ref : '')}" style="display:inline-flex;align-items:center;gap:6px;background:#E8395A;color:#fff;text-decoration:none;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:8px 18px;border-radius:4px">Saber mais →</a>
      </div>
    </div>
    ` : ''}

        </div>
      </div>
      <label class="wa-label" id="wa-label">
        <input type="checkbox" id="wa-cb" onchange="toggleWA(this)">
        <span>Aceito receber novidades e dicas de viagem da APM Viagens via WhatsApp. Posso sair do grupo a qualquer momento.</span>
      </label>
      <button id="wa-btn" onclick="entrarGrupo()" disabled class="wa-btn">
        ${waIconSVG(18)} Entrar no grupo de WhatsApp
      </button>
      <div class="wa-note">🔒 Podes sair do grupo a qualquer momento</div>
    </div>

    <div class="cta-section">
      <div class="cta-pretitle">Pronto para a próxima aventura?</div>
      <div class="cta-title">Pede o teu orçamento gratuito</div>
      <div class="cta-sub">O teu consultor APM Viagens trata de tudo — voos, hotel, transfers e seguro.<br>Proposta personalizada, sem compromisso.</div>

    <div class="site-footer">
      <img src="https://ezycourse.b-cdn.net/3064/cmbzo7qfw08hhth9nfjwpb7sw.png" alt="APM Viagens">
      <p>© 2026 APM Viagens · Andar nas Praias do Mundo Lda · Odivelas, Lisboa</p>
    </div>
  `

  // Meta
  // Meta tags básicas
  document.title = 'APM Viagens · ' + a.titulo
  const setMeta = (id, attr, val) => { const el=document.getElementById(id); if(el&&val) el.setAttribute(attr,'val'.replace('val',val)) }

  // Descrição
  const desc = a.subtitulo || a.titulo
  document.getElementById('meta-desc')?.setAttribute('content', desc)

  // Open Graph — título com prefixo APM Viagens
  const ogTitle = 'APM Viagens · ' + a.titulo
  document.getElementById('og-title')?.setAttribute('content', ogTitle)
  document.getElementById('og-desc')?.setAttribute('content', desc)
  document.getElementById('og-url')?.setAttribute('content', location.href)
  document.getElementById('tw-title')?.setAttribute('content', ogTitle)
  document.getElementById('tw-desc')?.setAttribute('content', desc)

  // Imagem OG — primeira imagem do carrossel ou hero_img
  const ogImg = a.hero_imgs?.[0] || a.hero_img || ''
  if(ogImg) {
    document.getElementById('og-image')?.setAttribute('content', ogImg)
    document.getElementById('tw-image')?.setAttribute('content', ogImg)
  }
}

function renderErro(msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="error-state">
      <div class="icon">✈</div>
      <div style="font-weight:700;margin-bottom:8px">Artigo não encontrado</div>
      <div style="font-size:13px">${msg || 'Este artigo não existe ou foi removido.'}</div>
      <a href="${BLOG_BASE}blog-index.html${refStr}" style="display:inline-block;margin-top:20px;color:#E8395A;font-size:13px">← Voltar ao blog</a>
    </div>
  `
}

// ── CARROSSEL ──────────────────────────────────────────────────────────────
let _carIdx = 0
let _carTotal = 0
let _carTimer = null

function carouselInit() {
  const track = document.getElementById('carousel-track')
  if(!track) return
  _carTotal = track.children.length
  _carIdx = 0
  if(_carTotal > 1) {
    _carTimer = setInterval(() => carouselMove(1), 4000)
  }
}

function carouselMove(dir) {
  _carIdx = (_carIdx + dir + _carTotal) % _carTotal
  carouselRender()
}

function carouselGo(idx) {
  _carIdx = idx
  clearInterval(_carTimer)
  _carTimer = setInterval(() => carouselMove(1), 4000)
  carouselRender()
}

function carouselRender() {
  const track = document.getElementById('carousel-track')
  if(track) track.style.transform = `translateX(-${_carIdx * 100}%)`
  document.querySelectorAll('.carousel-dot').forEach((d,i) => {
    d.classList.toggle('active', i === _carIdx)
  })
}

// ── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  if (!artigoId) { renderErro('Nenhum ID de artigo especificado.'); return }
  const { data, error } = await sb
    .from('artigos_consultores')
    .select('*')
    .eq('id', artigoId)
    .eq('publicado', true)
    .single()
  if (error || !data) { renderErro(); return }

  renderArtigo(data)
  setTimeout(carouselInit, 50)
}

function toggleWA(cb) {
  const btn = document.getElementById('wa-btn')
  const lbl = document.getElementById('wa-label')
  if (!btn || !lbl) return
  btn.disabled = !cb.checked
  cb.checked ? lbl.classList.add('checked') : lbl.classList.remove('checked')
}

function partilharFB() { window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(location.href), '_blank') }
function copiar() { navigator.clipboard.writeText(location.href).then(() => toast('✅ Link copiado!')) }
function toast(m) { const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3000) }

init()
