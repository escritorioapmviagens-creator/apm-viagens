<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artigo · APM Viagens</title>
<meta id="meta-desc" name="description" content="Artigo de viagem APM Viagens">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;font-family:'Poppins',sans-serif;color:#1a1a2e}
.wrap{max-width:680px;margin:0 auto;background:#fff}
.site-nav{background:#fff;padding:16px 40px;border-bottom:3px solid #E8395A;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.site-nav img{height:40px}
.nav-links{display:flex;align-items:center;gap:12px}
.nav-back{color:#6b7280;text-decoration:none;font-size:12px;font-weight:500;transition:color .2s}
.nav-back:hover{color:#E8395A}
.nav-cta{background:#E8395A;color:#fff;text-decoration:none;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 20px;border-radius:4px}
.nav-cta:hover{background:#d42e4f}
.hero{position:relative;overflow:hidden;min-height:360px;display:flex;align-items:flex-end}
.hero-bg{position:absolute;inset:0;background:#1a1a2e;background-size:cover;background-position:center}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,26,.9) 0%,rgba(13,13,26,.3) 60%,transparent 100%)}
.hero-content{position:relative;z-index:1;padding:48px 40px}
.hero-tag{display:inline-block;background:#E8395A;color:#fff;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:5px 12px;border-radius:4px;margin-bottom:16px}
.hero-region{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px}
.hero-title{font-family:'Poppins',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;color:#fff;line-height:1.15;margin-bottom:12px}
.hero-title em{color:#E8395A;font-style:normal}
.hero-sub{font-size:13px;color:rgba(255,255,255,.65);line-height:1.75;max-width:480px;margin-bottom:16px}
.hero-meta{font-size:11px;color:rgba(255,255,255,.4);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.author-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:11px;color:rgba(255,255,255,.8);font-weight:500}
.divider{height:4px;background:linear-gradient(90deg,#E8395A 0%,#3B5BDB 100%)}
.article-body{padding:32px 40px}
.article-body p{font-size:13px;color:#4b5563;line-height:1.85;margin-bottom:20px}
.article-body p strong{color:#1a1a2e;font-weight:600}
.article-body a{color:#3B5BDB;text-decoration:underline;text-decoration-color:rgba(59,91,219,.3);transition:text-decoration-color .2s}
.article-body a:hover{text-decoration-color:#3B5BDB}
.section-block{margin-bottom:36px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:#1a1a2e;margin-bottom:10px;line-height:1.25}
.section-title::before{content:'';display:inline-block;width:3px;height:1em;background:#E8395A;margin-right:10px;vertical-align:middle;border-radius:2px}
.section-img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:8px;margin-bottom:14px;background:#f0f0f0}
.section-img.hidden{display:none}
.wa-box{background:#fff;border:1.5px solid #e5e7eb;border-radius:10px;padding:24px;margin:0 40px 32px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.wa-box-inner{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.wa-icon{width:52px;height:52px;min-width:52px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wa-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:3px}
.wa-desc{font-size:12px;color:#6b7280;line-height:1.5}
.wa-label{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:12px;background:#f8fffe;border-radius:8px;border:1.5px solid #e5e7eb;transition:border-color .2s;margin-bottom:14px;font-size:12px;color:#6b7280;line-height:1.6}
.wa-label input{width:16px;height:16px;min-width:16px;margin-top:2px;accent-color:#E8395A;cursor:pointer}
.wa-label.checked{border-color:#25D366;background:#f0fdf4}
.wa-btn{width:100%;padding:13px;background:#25D366;color:#fff;border:none;border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;cursor:not-allowed;opacity:.5;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px}
.wa-btn:not([disabled]){cursor:pointer;opacity:1}
.wa-btn:not([disabled]):hover{background:#1da851}
.wa-note{text-align:center;font-size:11px;color:#9ca3af;margin-top:8px}
.cta-section{background:#1a1a2e;padding:48px 40px;text-align:center}
.cta-pretitle{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#E8395A;font-weight:700;margin-bottom:14px}
.cta-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:#fff;margin-bottom:10px;line-height:1.2}
.cta-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:28px;line-height:1.7}
.cta-btn{display:inline-block;background:#E8395A;color:#fff;text-decoration:none;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:15px 44px;border-radius:4px;transition:background .2s}
.cta-btn:hover{background:#d42e4f}
.share-section{padding:28px 40px;border-top:1px solid #f0f0f0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.share-label{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em}
.share-btn{padding:7px 16px;border:1.5px solid #e5e7eb;background:#fff;border-radius:4px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;color:#6b7280;cursor:pointer;transition:all .2s;text-decoration:none}
.share-btn:hover{border-color:#E8395A;color:#E8395A}
.site-footer{background:#f5f5f5;padding:24px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.site-footer img{height:30px;opacity:.5}
.site-footer p{font-size:11px;color:#9ca3af}
.error-state{padding:80px 40px;text-align:center;color:#6b7280}
.error-state .icon{font-size:3rem;margin-bottom:16px}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:#1a1a2e;color:#fff;border-radius:8px;padding:12px 18px;font-size:.82rem;transform:translateY(60px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<div class="wrap" id="wrap">

<nav class="site-nav">
  <img src="https://ezycourse.b-cdn.net/3064/cmbzo7qfw08hhth9nfjwpb7sw.png" alt="APM Viagens">
  <div class="nav-links">
    <a href="#" class="nav-back" id="back-link">← Todos os destinos</a>
    <a href="#" class="nav-cta" id="nav-orcamento">✈ Pedir orçamento</a>
  </div>
</nav>

<div id="main-content">
  <!-- Preenchido via JS -->
  <div style="padding:80px 40px;text-align:center;color:#9ca3af">
    <div class="skeleton" style="height:360px;border-radius:0;margin:-40px -40px 0"></div>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://uiaorfcgvqwxjezgisps.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpYW9yZmNndnF3eGplemdpc3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTE1MzAsImV4cCI6MjA5MTk4NzUzMH0.2AzDuZHLXsQ9NAK96b26ovu29I5xRh-UzNSNph02YhU'
const BLOG_BASE = 'https://escritorioapmviagens-creator.github.io/apm-viagens/'
const { createClient } = supabase
const sb = createClient(SUPA_URL, SUPA_KEY)

const params = new URLSearchParams(location.search)
const artigoId = params.get('id')
const ref = params.get('ref') || ''
const refStr = ref ? '?ref=' + ref : ''

document.getElementById('back-link').href = BLOG_BASE + 'blog-index.html' + refStr
document.getElementById('nav-orcamento').href = BLOG_BASE + 'pedir-orcamento.html' + refStr

// Converter texto com links [texto](url) em HTML, adicionando ?ref= a links APM
function processarTexto(texto) {
  if (!texto) return ''
  // Converter [texto](url)
  let html = texto.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, linkText, url) => {
    let finalUrl = url
    // Se é link APM, adicionar ref
    if (url.includes('escritorioapmviagens-creator.github.io') || url.includes('blog-artigo.html')) {
      const sep = url.includes('?') ? '&' : '?'
      if (ref) finalUrl = url + sep + 'ref=' + ref
    }
    return `<a href="${finalUrl}" target="_blank" rel="noopener">${linkText}</a>`
  })
  // Parágrafos: quebras duplas
  html = html.split(/\n\n+/).map(p => p.trim() ? `<p>${p.replace(/\n/g,'<br>')}</p>` : '').join('')
  return html || `<p>${texto}</p>`
}

function waIconSVG(size=26) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`
}

function renderArtigo(a) {
  const orcUrl = BLOG_BASE + 'pedir-orcamento.html' + refStr

  // Secções dinâmicas
  function secao(titulo, texto, img) {
    if (!titulo && !texto) return ''
    return `
    <div class="section-block">
      ${img ? `<img class="section-img" src="${img}" alt="${titulo||''}">` : ''}
      ${titulo ? `<div class="section-title">${titulo}</div>` : ''}
      <div>${processarTexto(texto)}</div>
    </div>`
  }

  const heroStyle = a.hero_img
    ? `background-image:url('${a.hero_img}');background-size:cover;background-position:center`
    : `background:linear-gradient(135deg,#0d0a1a 0%,#1a1035 50%,#2d1520 100%)`

  document.getElementById('main-content').innerHTML = `
    <div class="hero">
      <div class="hero-bg" style="${heroStyle}"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-tag">✈ Destinos</div>
        ${a.regiao ? `<div class="hero-region">${a.regiao}</div>` : ''}
        <div class="hero-title"><em>${a.titulo}</em></div>
        ${a.subtitulo ? `<div class="hero-sub">${a.subtitulo}</div>` : ''}
        <div class="hero-meta">
          <span class="author-badge">✍ Artigo de: ${a.consultor_nome}</span>
          <span>·</span><span>5 min de leitura</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="article-body">
      ${secao(a.s1_titulo, a.s1_texto, a.s1_img)}
      ${secao(a.s2_titulo, a.s2_texto, a.s2_img)}
      ${secao(a.s3_titulo, a.s3_texto, a.s3_img)}
    </div>

    <div class="divider"></div>

    <div class="wa-box">
      <div class="wa-box-inner">
        <div class="wa-icon">${waIconSVG(26)}</div>
        <div>
          <div class="wa-title">Fica a par das melhores ofertas</div>
          <div class="wa-desc">Recebe promoções, novidades e dicas de viagem directamente no teu WhatsApp.</div>
        </div>
      </div>
      <label class="wa-label" id="wa-label">
        <input type="checkbox" id="wa-cb" onchange="toggleWA(this)">
        <span>Aceito receber novidades e dicas de viagem da APM Viagens via WhatsApp. Posso sair do grupo a qualquer momento.</span>
      </label>
      <button id="wa-btn" onclick="entrarGrupo()" disabled class="wa-btn">
        ${waIconSVG(18)} Entrar no grupo de WhatsApp
      </button>
      <div class="wa-note">🔒 Podes sair do grupo a qualquer momento</div>
    </div>

    <div class="cta-section">
      <div class="cta-pretitle">Pronto para a próxima aventura?</div>
      <div class="cta-title">Pede o teu orçamento gratuito</div>
      <div class="cta-sub">O teu consultor APM Viagens trata de tudo — voos, hotel, transfers e seguro.<br>Proposta personalizada, sem compromisso.</div>
      <a href="${orcUrl}" class="cta-btn">Pedir orçamento ✈</a>
    </div>

    <div class="share-section">
      <span class="share-label">Partilhar</span>
      <a href="#" class="share-btn" onclick="partilharWA();return false">💬 WhatsApp</a>
      <a href="#" class="share-btn" onclick="partilharFB();return false">📘 Facebook</a>
      <a href="#" class="share-btn" onclick="copiar();return false">🔗 Copiar link</a>
    </div>

    <div class="site-footer">
      <img src="https://ezycourse.b-cdn.net/3064/cmbzo7qfw08hhth9nfjwpb7sw.png" alt="APM Viagens">
      <p>© 2026 APM Viagens · Andar nas Praias do Mundo Lda · Odivelas, Lisboa</p>
    </div>
  `

  // Meta
  document.title = a.titulo + ' · APM Viagens'
  const md = document.getElementById('meta-desc')
  if (md && a.subtitulo) md.setAttribute('content', a.subtitulo)
}

function renderErro(msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="error-state">
      <div class="icon">✈</div>
      <div style="font-weight:700;margin-bottom:8px">Artigo não encontrado</div>
      <div style="font-size:13px">${msg || 'Este artigo não existe ou foi removido.'}</div>
      <a href="${BLOG_BASE}blog-index.html${refStr}" style="display:inline-block;margin-top:20px;color:#E8395A;font-size:13px">← Voltar ao blog</a>
    </div>
  `
}

async function init() {
  if (!artigoId) { renderErro('Nenhum ID de artigo especificado.'); return }
  const { data, error } = await sb
    .from('artigos_consultores')
    .select('*')
    .eq('id', artigoId)
    .eq('publicado', true)
    .single()
  if (error || !data) { renderErro(); return }
  renderArtigo(data)
}

function toggleWA(cb) {
  const btn = document.getElementById('wa-btn')
  const lbl = document.getElementById('wa-label')
  if (!btn || !lbl) return
  btn.disabled = !cb.checked
  cb.checked ? lbl.classList.add('checked') : lbl.classList.remove('checked')
}
function entrarGrupo() { window.open('https://chat.whatsapp.com/LVYNdfwRjcWBwtKASreRbG', '_blank') }
function partilharWA() { window.open('https://wa.me/?text=' + encodeURIComponent('Olha este artigo incrível! ✈ ') + encodeURIComponent(location.href), '_blank') }
function partilharFB() { window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(location.href), '_blank') }
function copiar() { navigator.clipboard.writeText(location.href).then(() => toast('✅ Link copiado!')) }
function toast(m) { const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3000) }

init()
</script>
</body>
</html>
