<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#E8395A;
  --blue:#3B5BDB;
  --bg:#f8f7f4;
  --surface:#fff;
  --border:#e5e7eb;
  --text:#1a1a2e;
  --muted:#6b7280;
  --font:'DM Sans',sans-serif;
  --display:'Playfair Display',serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;flex-direction:column;height:100vh}

/* HEADER */
.header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:#fff;border-bottom:1px solid var(--border);box-shadow:0 1px 6px rgba(0,0,0,.04);flex-shrink:0;z-index:10}
.header img.logo{height:30px}
.header-div{width:1px;height:22px;background:var(--border)}
.c-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--coral);flex-shrink:0}
.c-initials{width:38px;height:38px;border-radius:50%;background:var(--coral);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.c-name{font-size:13px;font-weight:700;color:var(--text)}
.c-role{font-size:10px;color:var(--muted)}
.online{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 5px #22c55e;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* PROGRESS */
.prog{height:3px;background:var(--border);flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--coral),var(--blue));border-radius:2px;transition:width .5s ease}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;min-height:0;max-width:640px;width:100%;margin:0 auto;padding:16px 16px 0}
.msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* MESSAGES */
.msg{display:flex;gap:8px;animation:in .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse;max-width:75%}
.av{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid var(--coral)}
.av-i{width:30px;height:30px;border-radius:50%;background:var(--coral);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.bub{padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.6}
.msg.bot .bub{background:#fff;border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.msg.user .bub{background:linear-gradient(135deg,var(--coral),#c02040);border-bottom-right-radius:4px;color:#fff}
.typing .bub{display:flex;gap:4px;align-items:center;padding:13px 16px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:ty 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* QUICK REPLIES */
.qrs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding-left:38px}
.qr{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:13px;cursor:pointer;font-family:var(--font);font-weight:500;transition:all .15s;white-space:nowrap}
.qr:hover{border-color:var(--coral);color:var(--coral);background:rgba(232,57,90,.05)}

/* INPUT */
.input-row{padding:10px 0 18px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
textarea.inp{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:11px 16px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;resize:none;min-height:42px;max-height:100px;line-height:1.5;transition:border-color .2s}
textarea.inp::placeholder{color:var(--muted)}
textarea.inp:focus{border-color:var(--coral)}
.send{width:42px;height:42px;border-radius:50%;background:var(--coral);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;box-shadow:0 2px 8px rgba(232,57,90,.3)}
.send:hover{transform:scale(1.08)}
.send:disabled{opacity:.35;cursor:not-allowed;transform:none}
.send svg{width:17px;height:17px;fill:#fff}

/* INTRO */
.intro{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:14px;background:var(--bg)}
.intro-av{width:88px;height:88px;border-radius:50%;object-fit:cover;border:3px solid var(--coral);box-shadow:0 4px 20px rgba(232,57,90,.25)}
.intro-av-i{width:88px;height:88px;border-radius:50%;background:var(--coral);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;box-shadow:0 4px 20px rgba(232,57,90,.25)}
.intro h1{font-family:var(--display);font-size:clamp(1.4rem,5vw,1.9rem);font-weight:700;line-height:1.25;color:var(--text)}
.intro p{font-size:14px;color:var(--muted);max-width:300px;line-height:1.65}
.start{padding:13px 32px;background:var(--coral);color:#fff;border:none;border-radius:30px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);box-shadow:0 6px 20px rgba(232,57,90,.35);transition:transform .15s,box-shadow .15s}
.start:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(232,57,90,.45)}
.badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.badge{padding:4px 12px;border-radius:20px;border:1px solid var(--border);font-size:11px;color:var(--muted);background:#fff}

/* FOOTER */
.foot{text-align:center;padding:6px;font-size:10px;color:var(--muted);flex-shrink:0}
.foot a{color:var(--muted);text-decoration:none}

/* DONE STATE */
.done-card{background:linear-gradient(135deg,var(--coral),#c02040);color:#fff;border-radius:16px;padding:20px;margin-top:8px;text-align:center}
.done-card h3{font-family:var(--display);font-size:18px;margin-bottom:8px}
.done-card p{font-size:13px;opacity:.9;line-height:1.6}

@media(max-width:480px){.chat{padding:12px 12px 0}.intro{padding:20px}.intro h1{font-size:1.35rem}}
</style>
</head>

<!-- CHAT -->
<div class="chat" id="chat" style="display:none">

      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="foot" id="foot" style="display:none">
  <a href="https://www.apmviagens.pt" target="_blank">APM Viagens · Andar nas Praias do Mundo</a>
</div>

<script>
const SUPA_URL = 'https://uiaorfcgvqwxjezgisps.supabase.co'
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpYW9yZmNndnF3eGplemdpc3BzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MTE1MzAsImV4cCI6MjA5MTk4NzUzMH0.2AzDuZHLXsQ9NAK96b26ovu29I5xRh-UzNSNph02YhU'
const PEXELS = 'cbnYFhaUvlz1hVKRkRSoYqUQi1rXPdK5XYJgW6bJpAewcBVeTPm8hpHV'
const { createClient } = supabase
const sb = createClient(SUPA_URL, SUPA_KEY)

// ─── STATE ───────────────────────────────────────────────────
let consultor = null
let etapa = 0
let dados = {}
let aguarda = false

// ─── FLUXO DE CONVERSA ───────────────────────────────────────
// Cada etapa: { msg, campo, tipo, qrs?, validar?, proxima? }
const FLUXO = [
  {
    msg: () => `Olá! 👋 Bem-vindo/a à APM Viagens${consultor?.nome ? `, atendimento com ${consultor.nome.split(' ')[0]}` : ''}.\n\nQue tipo de viagem está a planear?`,
    campo: 'tipo_viagem',
    qrs: ['👨‍👩‍👧‍👦 Família','💑 Casal','🧳 Individual','💍 Lua-de-mel','👫 Grupo de amigos','🎒 Grupo escolar','👴 Sénior']
  },
  {
    msg: () => gerarMsgDestino(),
    campo: 'destino',
    qrs: () => dados.tipo_viagem?.includes('Lua-de-mel')
      ? ['🏝️ Maldivas','🌺 Bali','🏖️ Caraíbas','🌍 Outro destino']
      : dados.tipo_viagem?.includes('Família') || dados.tipo_viagem?.includes('escolar')
      ? ['🌞 Algarve','🏖️ Cabo Verde','🌴 Canárias','☀️ Tunísia - Djerba','🌊 Caraíbas','✈️ Outro destino']
      : ['🗼 Paris','🌞 Algarve','🏖️ Cabo Verde','☀️ Tunísia - Djerba','🌴 Maiorca','✈️ Outro destino']
  },
  {
    msg: () => `Óptima escolha! ${dados.destino} é mesmo especial. ✨\n\nJá há datas em mente? Se sim, qual seria a data de partida?`,
    campo: 'data_partida',
    tipo: 'data',
    qrs: ['📅 Ainda não tenho datas','Próximas semanas','Próximo mês','Daqui a 2-3 meses','Daqui a 6+ meses']
  },
  {
    msg: () => dados.data_partida === 'Ainda não tenho datas'
      ? `Sem problema, trabalha-se com isso! 😊\n\nQuantos dias de viagem são ideais?`
      : `Perfeito! E quanto tempo dura a viagem — quantas noites ou dias?`,
    campo: 'duracao',
    qrs: ['3-4 noites','5-7 noites','8-10 noites','11-14 noites','Mais de 2 semanas']
  },
  {
    msg: () => `Anotado! Agora precisamos de saber o grupo.\n\nQuantos adultos viajam? (a partir dos 12 anos conta como adulto)`,
    campo: 'adultos',
    qrs: ['1','2','3','4','5','6+']
  },
  {
    msg: () => `E viajam crianças com menos de 12 anos?`,
    campo: 'criancas',
    qrs: ['Não, só adultos','1 criança','2 crianças','3 crianças','4+ crianças'],
    proxima: (v) => v === 'Não, só adultos' ? etapa + 2 : etapa + 1
  },
  {
    msg: () => `Que idades têm as crianças? (Lembre-se: a partir dos 12 anos já conta como adulto)`,
    campo: 'idades_criancas',
    placeholder: 'ex: 3, 7, 11'
  },
  {
    msg: () => `Obrigado pela informação! 🙏\n\nQue tipo de alojamento prefere?`,
    campo: 'alojamento',
    qrs: ['⭐⭐⭐ 3 estrelas','⭐⭐⭐⭐ 4 estrelas','⭐⭐⭐⭐⭐ 5 estrelas','🏡 Apartamento','Sem preferência']
  },
  {
    msg: () => `E em relação ao regime de refeições?`,
    campo: 'regime',
    qrs: ['🍳 Pequeno-almoço','🍽️ Meia pensão','🍴 Pensão completa','🏖️ Tudo incluído','Sem preferência']
  },
  {
    msg: () => `Há preferência em relação ao voo?`,
    campo: 'voo',
    qrs: ['✈️ Voo directo','🔄 Escala é aceitável','🏠 Só alojamento (sem voo)','Sem preferência']
  },
  {
    msg: () => `Estamos quase! 💪\n\nPara conseguirmos encontrar as melhores opções, qual é o orçamento aproximado por pessoa?`,
    campo: 'orcamento',
    qrs: ['Até €500','€500 – €800','€800 – €1200','€1200 – €2000','Mais de €2000','Prefiro não indicar']
  },
  {
    msg: () => `Há algum pedido especial ou informação que queira partilhar? (alergias, aniversário, preferências, etc.)`,
    campo: 'notas',
    qrs: ['Não, está tudo dito! ✓']
  },
  {
    msg: () => `Por último, para enviarmos o orçamento, qual é o nome?`,
    campo: 'nome_cliente'
  },
  {
    msg: () => `E o contacto — número de telemóvel ou email?`,
    campo: 'contacto'
  }
]

// ─── INIT ────────────────────────────────────────────────────
const params = new URLSearchParams(location.search)
const cParam = params.get('c') || params.get('consultor')

async function init() {
  if(cParam) {
    const isUUID = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(cParam)
    try {
      const q = isUUID
        ? sb.from('perfis').select('id,nome,foto_perfil,meta_pixel_id').eq('id', cParam).single()
        : sb.from('perfis').select('id,nome,foto_perfil,meta_pixel_id').ilike('nome', '%'+cParam+'%').limit(1).single()
      const { data } = await q
      consultor = data
    } catch(e) {}
  }

  // Pixel consultor
  if(consultor?.meta_pixel_id) {
    try { fbq('init', consultor.meta_pixel_id); fbq('track','PageView') } catch(e){}
  }

  // Intro avatar
  const nome = consultor?.nome || 'APM Viagens'
  const av = document.getElementById('intro-av')
  if(consultor?.foto_perfil) {
    av.innerHTML = `<img src="${consultor.foto_perfil}" class="intro-av" alt="${nome}">`
  } else {
    const ini = nome.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase()
    av.innerHTML = `<div class="intro-av-i">${ini}</div>`
  }
  document.getElementById('intro-txt').textContent =
    consultor?.nome
      ? `Olá! Sou ${consultor.nome.split(' ')[0]} e estou aqui para encontrar a viagem perfeita. Responda a algumas perguntas rápidas e preparamos um orçamento personalizado.`
      : `Atendimento personalizado para encontrar a viagem perfeita, ao melhor preço.`
}

function iniciar() {
  document.getElementById('intro').style.display = 'none'
  document.getElementById('hdr').style.display = 'flex'
  document.getElementById('prog').style.display = 'block'
  document.getElementById('foot').style.display = 'block'
  const c = document.getElementById('chat')
  c.style.display = 'flex'
  c.style.flex = '1'

  // Header
  const nome = consultor?.nome || 'APM Viagens'
  document.getElementById('h-nome').textContent = nome
  const hav = document.getElementById('h-av')
  if(consultor?.foto_perfil) {
    hav.innerHTML = `<img src="${consultor.foto_perfil}" class="c-avatar" alt="${nome}">`
  } else {
    const ini = nome.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase()
    hav.innerHTML = `<div class="c-initials">${ini}</div>`
  }

  try { fbq('trackCustom','ChatIniciado',{consultor:nome}) } catch(e){}
  avancar()
}

// ─── FLUXO ───────────────────────────────────────────────────
function gerarMsgDestino() {
  const tv = dados.tipo_viagem || ''
  if(tv.includes('Lua-de-mel')) return `Uma lua-de-mel... que momento especial! 💍✨\n\nJá há algum destino dos sonhos em mente, ou prefere sugestões românticas?`
  if(tv.includes('Família')) return `Férias em família são sempre inesquecíveis! 👨‍👩‍👧‍👦\n\nJá há um destino pensado, ou prefere sugestões adequadas para famílias?`
  if(tv.includes('escolar')) return `Que aventura vai ser! 🎒\n\nJá há um destino definido para o grupo?`
  return `Ótimo! 🌍\n\nJá há um destino em mente, ou prefere algumas sugestões?`
}

async function avancar(proximaOverride) {
  if(typeof proximaOverride === 'number') etapa = proximaOverride
  if(etapa >= FLUXO.length) { await concluir(); return }

  const passo = FLUXO[etapa]
  const msg = typeof passo.msg === 'function' ? passo.msg() : passo.msg
  const qrs = typeof passo.qrs === 'function' ? passo.qrs() : passo.qrs
  const prog = Math.round((etapa / FLUXO.length) * 85)

  document.getElementById('prog-fill').style.width = prog + '%'

  await delay(400)
  const typing = addTyping()
  await delay(700 + Math.random() * 400)
  removeTyping(typing)
  addBot(msg, qrs, passo.placeholder)
}

async function responder(valor, label) {
  if(aguarda) return
  aguarda = true
  setSend(false)

  const passo = FLUXO[etapa]
  dados[passo.campo] = valor

  addUser(label || valor)

  // Determinar próxima etapa
  let proxima = etapa + 1
  if(passo.proxima) proxima = passo.proxima(valor)

  etapa = proxima
  aguarda = false
  setSend(true)
  await avancar()
}

async function enviar() {
  const inp = document.getElementById('inp')
  const val = inp.value.trim()
  if(!val || aguarda) return
  inp.value = ''; inp.style.height = 'auto'
  await responder(val, val)
}

// ─── CONCLUSÃO ───────────────────────────────────────────────
async function concluir() {
  document.getElementById('prog-fill').style.width = '100%'
  document.getElementById('inp').disabled = true
  document.getElementById('send-btn').disabled = true
  document.getElementById('inp').placeholder = 'Pedido enviado ✓'

  // Parse contacto
  const ct = dados.contacto || ''
  const email = ct.includes('@') ? ct : null
  const tel = !ct.includes('@') ? ct.replace(/\D/g,'') : null

  // Guardar no Supabase
  try {
    await sb.from('pedidos_orcamento').insert({
      consultor_id: consultor?.id || null,
      nome_cliente: dados.nome_cliente || null,
      email_cliente: email,
      tel_cliente: tel,
      destino: dados.destino || null,
      tipo_viagem: (dados.tipo_viagem||'').replace(/^[^\s]+ /,''),
      num_adultos: isNaN(parseInt(dados.adultos)) ? 1 : parseInt(dados.adultos),
      num_criancas: dados.criancas === 'Não, só adultos' ? 0 : parseInt((dados.criancas||'0').replace(/\D/g,'')) || 0,
      idades_criancas: dados.idades_criancas || null,
      observacoes: [
        dados.alojamento ? 'Alojamento: ' + dados.alojamento : '',
        dados.regime ? 'Regime: ' + dados.regime : '',
        dados.voo ? 'Voo: ' + dados.voo : '',
        dados.duracao ? 'Duração: ' + dados.duracao : '',
        dados.data_partida ? 'Partida: ' + dados.data_partida : '',
        dados.notas && dados.notas !== 'Não, está tudo dito! ✓' ? 'Notas: ' + dados.notas : ''
      ].filter(Boolean).join(' | ') || null,
      orcamento: dados.orcamento !== 'Prefiro não indicar' ? dados.orcamento : null,
      canal_origem: 'chatbot',
      estado: 'novo'
    })
  } catch(e) { console.warn('Supabase:', e) }

  try {
    fbq('track','Lead')
    fbq('trackCustom','PedidoOrcamento',{destino:dados.destino,consultor:consultor?.nome})
  } catch(e) {}

  const typing = addTyping()
  await delay(1200)
  removeTyping(typing)

  const nomePrimeiro = consultor?.nome?.split(' ')[0] || 'a equipa APM Viagens'
  addBot(`🎉 **Pedido recebido com sucesso!**\n\nMuito obrigado pela confiança. ${nomePrimeiro} vai analisar o pedido e entrar em contacto em breve com um orçamento personalizado.\n\nBoa viagem! ✈️`)

  // Resumo
  await delay(800)
  const resumo = `📋 **Resumo do pedido:**\n• Destino: ${dados.destino||'–'}\n• Tipo: ${(dados.tipo_viagem||'–').replace(/^[^\s]+ /,'')}\n• Partida: ${dados.data_partida||'–'}\n• Duração: ${dados.duracao||'–'}\n• Adultos: ${dados.adultos||'–'} · Crianças: ${dados.criancas === 'Não, só adultos' ? '0' : (dados.criancas||'0').replace(/\D/g,'')}\n• Orçamento p/p: ${dados.orcamento||'–'}`
  const t2 = addTyping()
  await delay(900)
  removeTyping(t2)
  addBot(resumo)
}

// ─── UI HELPERS ───────────────────────────────────────────────
function getAvHTML() {
  if(consultor?.foto_perfil) return `<img src="${consultor.foto_perfil}" class="av" alt="">`
  const ini = (consultor?.nome||'APM').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase()
  return `<div class="av-i">${ini}</div>`
}

function addBot(texto, qrs, placeholder) {
  const msgs = document.getElementById('msgs')
  const div = document.createElement('div')
  div.className = 'msg bot'
  const html = texto.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')
  let qrHTML = ''
  if(qrs?.length) {
    qrHTML = `<div class="qrs">${qrs.map(q=>`<button class="qr" onclick="selecionarQR(this,'${q.replace(/'/g,"&#39;")}')">${q}</button>`).join('')}</div>`
  }
  if(placeholder) {
    document.getElementById('inp').placeholder = placeholder
  } else {
    document.getElementById('inp').placeholder = 'Escreva aqui...'
  }
  div.innerHTML = `${getAvHTML()}<div><div class="bub">${html}</div>${qrHTML}</div>`
  msgs.appendChild(div)
  scroll()
}

function addUser(texto) {
  const msgs = document.getElementById('msgs')
  const div = document.createElement('div')
  div.className = 'msg user'
  div.innerHTML = `<div class="bub">${texto}</div>`
  msgs.appendChild(div)
  scroll()
}

function addTyping() {
  const msgs = document.getElementById('msgs')
  const id = 'ty-'+Date.now()
  const div = document.createElement('div')
  div.className = 'msg bot typing'
  div.id = id
  div.innerHTML = `${getAvHTML()}<div class="bub"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`
  msgs.appendChild(div)
  scroll()
  return id
}

function removeTyping(id) { document.getElementById(id)?.remove() }

function selecionarQR(btn, val) {
  btn.closest('.qrs')?.querySelectorAll('.qr').forEach(b=>b.disabled=true)
  btn.style.background = 'var(--coral)'
  btn.style.color = '#fff'
  btn.style.borderColor = 'var(--coral)'
  responder(val, val)
}

function scroll() { const m=document.getElementById('msgs'); setTimeout(()=>m.scrollTop=m.scrollHeight,50) }
function setSend(on) { document.getElementById('send-btn').disabled = !on }
function delay(ms) { return new Promise(r=>setTimeout(r,ms)) }

// ─── START ────────────────────────────────────────────────────
init()
</script>
</body>
</html>
